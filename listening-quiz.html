<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>MOCKS CAMBRIDGE — Listening (A2 · B1 · B2 · C1)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>

<style>
  :root{
    --bg:#0f172a; --card:#fff; --ink:#0f172a; --muted:#475569;
    --brand:#0ea5e9; --ok:#16a34a; --bad:#dc2626; --warn:#f59e0b;
    --line:#e2e8f0; --soft:#f1f5f9;
    --shadow:0 8px 24px rgba(15,23,42,.08), 0 2px 6px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 60%,#fff 100%);
    min-height:100vh;
  }
  header{
    background:#0b1220; color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px;
    box-shadow:var(--shadow); position:sticky; top:0; z-index:10;
  }
  header .logo{font-weight:800; letter-spacing:.3px}
  header .sub{color:#9ca3af; font-size:13px}
  main{max-width:880px; margin:0 auto; padding:18px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px; box-shadow:var(--shadow); margin-bottom:16px;
  }
  h1{font-size:22px; margin:0 0 6px}
  h2{font-size:17px; margin:0 0 10px}
  h3{font-size:15px; margin:0 0 8px; color:var(--muted)}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:4px}
  input[type=text]{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    font:inherit; background:#fff;
  }
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .row > *{flex:1 1 220px}
  .levels{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-top:10px}
  .level{
    border:2px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; background:#fff;
    transition:all .15s ease; text-align:center;
  }
  .level:hover{border-color:var(--brand); transform:translateY(-1px)}
  .level .tag{font-weight:800; font-size:22px}
  .level .name{color:var(--muted); margin-top:4px; font-size:13px}
  .level .cef{font-size:11px; color:#64748b; margin-top:2px}
  .btn{
    appearance:none; border:0; border-radius:10px; padding:11px 16px; font:inherit; font-weight:700;
    background:var(--brand); color:#fff; cursor:pointer; box-shadow:var(--shadow);
  }
  .btn.secondary{background:#fff; color:var(--brand); border:2px solid var(--brand)}
  .btn.ghost{background:transparent; color:var(--muted); box-shadow:none}
  .btn.small{padding:6px 10px; font-size:13px}
  .btn:disabled{opacity:.6; cursor:not-allowed}
  .audioblock{background:var(--soft); border-radius:12px; padding:12px; margin:10px 0}
  audio{width:100%; margin-top:6px}
  .tts-controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .tts-status{font-size:13px; color:var(--muted); margin-top:6px}
  .speed{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted)}
  .speed input{width:120px}
  .q{padding:14px 0; border-top:1px solid var(--line)}
  .q:first-child{border-top:0}
  /* ===== Inspera-style shell (matches Reading/Writing) ===== */
  body.exam-mode > header{display:none}
  .ins-shell{position:fixed; inset:0; display:flex; flex-direction:column; background:#fff; z-index:50}
  .ins-hdr{display:flex; align-items:center; gap:16px; padding:10px 20px; border-bottom:1px solid #cbd5e1; background:#fff; flex-shrink:0}
  .ins-hdr .ins-brand img{height:32px; width:auto; display:block}
  .ins-hdr .ins-cand{font-size:.9rem; color:#64748b}
  .ins-hdr .ins-right{margin-left:auto; display:flex; align-items:center; gap:10px}
  .ins-audio{font-size:.85rem; color:#0f766e; font-weight:700}
  .ins-hdr button{background:#fff; color:#475569; border:1px solid #cbd5e1; padding:7px 14px; border-radius:8px; font-weight:600; cursor:pointer; font-size:.85rem}
  .ins-hdr button.ins-fin{background:#4987c6; color:#fff; border-color:#4987c6}
  .ins-main{flex:1; overflow-y:auto; padding:18px 22px 28px}
  .ins-inner{max-width:1000px; margin:0 auto}
  .ins-title h1{font-size:1.3rem; margin:0 0 10px; color:#0f172a}
  .ins-pane{display:none}
  .ins-pane.active{display:block}
  .ins-instr{background:#fff; border:1px solid #cbd5e1; border-radius:10px; padding:14px 18px; margin:8px 0 14px}
  .ins-instr strong{display:block; color:#0f172a; font-size:1rem; margin-bottom:4px}
  .ins-instr p{margin:0; color:#475569; font-size:.92rem}
  .ins-player{background:#f1f5f9; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; margin-bottom:14px}
  .ins-ftr{display:flex; align-items:stretch; gap:8px; border-top:1px solid #cbd5e1; padding:8px 14px; background:#fff; overflow-x:auto; flex-shrink:0}
  .ins-tabs{display:flex; gap:6px; flex:1}
  .ins-tab{padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; background:#f1f5f9; cursor:pointer; min-width:92px; text-align:center; flex-shrink:0; display:flex; flex-direction:column; gap:3px}
  .ins-tab .tn{font-weight:700; font-size:.82rem; color:#0f172a}
  .ins-tab .tp{font-size:.76rem; color:#64748b}
  .ins-tab.active{background:#fff; border-color:#4987c6; box-shadow:0 0 0 2px #d1d2ea}
  .ins-tab.active .tn{color:#4987c6}
  .ins-tab .tq{display:none; gap:4px; justify-content:center; flex-wrap:wrap; margin-top:2px}
  .ins-tab.active .tq{display:flex}
  .ins-tab.active .tp{display:none}
  .lqn{width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; border:1px solid #cbd5e1; border-radius:5px; background:#fff; color:#475569; font-size:.78rem; font-weight:700; cursor:pointer; padding:0}
  .lqn:hover{border-color:#4987c6; color:#4987c6}
  .lqn.done{background:#4987c6; border-color:#4987c6; color:#fff}
  .lqn.cur{box-shadow:0 0 0 2px #d1d2ea; border-color:#4987c6}
  .ins-arrows{display:flex; gap:6px; align-items:center; padding-left:8px; border-left:1px solid #e2e8f0}
  .ins-arrows button{background:#4987c6; color:#fff; border:none; padding:9px 16px; border-radius:8px; font-weight:700; cursor:pointer; min-width:46px}
  .ins-arrows button:disabled{background:#cbd5e1; cursor:not-allowed}
  .ins-content .q{background:#fafafa; border:1px solid #e2e8f0; border-radius:10px; padding:14px 18px; margin:12px 0; border-top:1px solid #e2e8f0}
  .ins-content .paged-q{display:none}
  .ins-content .paged-q.show{display:block}
  .q-audio{margin:0 0 12px}
  .q-audio audio{width:100%}
  .q-flash{animation:lqflash 1.2s ease}
  @keyframes lqflash{0%{box-shadow:0 0 0 3px #fcd34d}100%{box-shadow:0 0 0 3px transparent}}
  /* ===== Sign-in / level screens (match Reading/Writing) ===== */
  body.signin-mode > header{display:none}
  body.signin-mode{background:linear-gradient(180deg,#dfe3f7 0%,#eef1fb 35%,#f4f6fb 100%)}
  .signin-wrap{max-width:780px; margin:0 auto; padding:48px 22px}
  .signin-wrap .crumb{color:#64748b; font-size:14px; margin-bottom:10px}
  .signin-wrap h1{font-size:2rem; margin:0 0 6px; color:#0f172a}
  .signin-wrap .sub{color:#475569; margin:0 0 22px; font-size:1.05rem; line-height:1.5}
  .signin-card{background:#fff; border-radius:16px; box-shadow:0 24px 60px rgba(15,23,42,.12); padding:28px 30px}
  .signin-card label{display:block; font-weight:700; color:#0f172a; font-size:.95rem; margin:16px 0 6px}
  .signin-card label:first-child{margin-top:0}
  .signin-card input{width:100%; padding:13px 14px; border:1px solid #e2e8f0; border-radius:10px; font:inherit; font-size:1rem; background:#fff}
  .signin-card input:focus{outline:none; border-color:#4987c6; box-shadow:0 0 0 3px #d1d2ea}
  .signin-actions{display:flex; gap:12px; margin-top:22px; flex-wrap:wrap}
  .signin-actions button, .signin-actions a{font:inherit; font-weight:700; padding:13px 22px; border-radius:10px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid transparent}
  .signin-actions .primary{background:#4987c6; color:#fff}
  .signin-actions .secondary2{background:#fff; color:#0f172a; border-color:#cbd5e1}
  .level-pick{max-width:780px; margin:0 auto; padding:34px 22px}
  .level-pick h1{font-size:1.7rem; margin:0 0 4px; color:#0f172a}
  .level-pick .sub{color:#475569; margin:0 0 18px}
  /* ===== Results screen (match Reading/Writing report) ===== */
  body.result-mode > header{display:none}
  body.result-mode{background:linear-gradient(180deg,#dfe3f7 0%,#eef1fb 35%,#f4f6fb 100%)}
  .res-wrap{max-width:900px; margin:0 auto; padding:34px 22px}
  .res-wrap .crumb{color:#64748b; font-size:14px; margin-bottom:8px}
  .res-wrap h1{font-size:2rem; margin:0 0 4px; color:#0f172a}
  .res-wrap .res-sub{color:#475569; margin:0 0 18px}
  .motivation-card{background:linear-gradient(135deg,#4987c6 0%,#0ea5e9 100%); color:#fff; border-radius:18px; padding:24px; margin-bottom:18px; text-align:center; box-shadow:0 12px 30px rgba(15,23,42,.18)}
  .motivation-card h2{color:#fff; font-size:1.4rem; margin:0 0 6px}
  .motivation-card p{margin:6px 0; font-size:1rem; line-height:1.5; opacity:.95}
  .pdf-actions{display:flex; gap:10px; justify-content:center; margin:8px 0 12px; flex-wrap:wrap}
  .pdf-actions button{background:#4987c6; color:#fff; border:none; padding:12px 22px; border-radius:10px; font-weight:700; cursor:pointer; font-size:.95rem; font:inherit; font-weight:700}
  .pdf-actions button.email{background:#0ea5e9}
  .pdf-actions button:disabled{background:#cbd5e1; cursor:not-allowed}
  .send-status{text-align:center; margin:6px 0 14px; color:#16a34a; font-weight:700}
  .send-status.err{color:#dc2626}
  #pdfTarget{background:#fff; border-radius:16px; padding:22px; box-shadow:0 12px 40px rgba(15,23,42,.10)}
  .pdf-brand{text-align:center; padding:6px 0 12px; border-bottom:2px solid #4987c6; margin-bottom:14px}
  .pdf-brand img{height:46px; width:auto}
  .pdf-brand .rep{color:#64748b; font-size:.78rem; letter-spacing:1px; margin-top:4px; font-weight:700}
  .res-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; font-size:.92rem; margin-bottom:16px}
  @media(max-width:520px){.res-grid{grid-template-columns:1fr}}
  .res-grid > div{padding:10px 12px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px}
  .res-grid label{display:block; color:#64748b; font-size:.7rem; letter-spacing:.6px; text-transform:uppercase; margin-bottom:4px; font-weight:700}
  .score-card{background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:26px; text-align:center; margin-bottom:16px}
  .score-card .big{font-size:3rem; font-weight:800; line-height:1}
  .score-card .big.pass{color:#16a34a}
  .score-card .big.fail{color:#dc2626}
  .score-card .pct{font-size:1.2rem; color:#4987c6; font-weight:700; margin-top:2px}
  .score-card .verdict{margin-top:8px; color:#475569}
  .part-bar{background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px 16px; margin:8px 0; display:grid; grid-template-columns:1fr auto; gap:6px 14px; align-items:center}
  .part-bar .pname{font-weight:700; color:#0f172a}
  .part-bar .meta{font-size:.82rem; color:#64748b}
  .part-bar .pctn{font-weight:800; font-family:Consolas,monospace}
  .part-bar .barw{grid-column:1/-1; background:#e2e8f0; border-radius:6px; height:8px; overflow:hidden}
  .part-bar .barf{height:100%; background:#4987c6}
  .res-card{background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:18px; margin:14px 0}
  .res-card h2{margin:0 0 8px; font-size:1.1rem}
  .res-line{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-top:1px solid #f1f5f9}
  .res-ans{font-size:.85rem; color:#64748b; padding:0 0 8px}
  .res-ok{color:#16a34a; font-weight:700}
  .res-bad{color:#dc2626; font-weight:700}
  .q .stem{font-weight:600; margin-bottom:6px}
  .q .meta{font-size:12px; color:var(--muted); margin-bottom:8px; display:flex; gap:8px; align-items:center}
  .pill{display:inline-block; padding:2px 8px; background:#eef2ff; color:#3730a3; border-radius:999px; font-size:11px; font-weight:700}
  .pill.tf{background:#fef3c7; color:#92400e}
  .pill.inf{background:#dcfce7; color:#166534}
  .pill.seq{background:#fce7f3; color:#9d174d}
  .opts{display:grid; gap:6px}
  .opt{
    display:flex; gap:10px; align-items:flex-start; padding:9px 12px; border:1px solid var(--line);
    border-radius:10px; cursor:pointer; background:#fff;
  }
  .opt:hover{background:var(--soft)}
  .opt input{margin-top:3px}
  /* Part 1 picture options (choose the correct image) */
  .pic-opts{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
  .pic-opt{flex-direction:column; align-items:center; gap:8px; text-align:center}
  .pic-opt .pic{display:block; width:100%}
  .pic-opt .pic svg{width:100%; height:auto; background:#fff; border-radius:8px}
  .pic-opt .pic img.pic-img{width:100%; height:150px; object-fit:cover; background:#fff; border-radius:8px; display:block; border:1px solid #e2e8f0}
  .opt input:checked ~ .pic img.pic-img{outline:3px solid #4987c6; outline-offset:1px}
  @media(max-width:560px){.pic-opts{grid-template-columns:1fr}}
  /* Gap-fill input + matching select */
  .gapinput{width:100%; max-width:340px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:1rem}
  .matchsel{padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:1rem; min-width:200px}
  .seqlist{display:grid; gap:6px}
  .seqitem{display:flex; gap:10px; align-items:center; padding:8px 10px; border:1px solid var(--line); border-radius:10px; background:#fff}
  .seqitem select{padding:6px 10px; border:1px solid var(--line); border-radius:8px; font:inherit}
  .progress{height:8px; background:var(--soft); border-radius:999px; overflow:hidden; margin:6px 0}
  .progress > div{height:100%; background:linear-gradient(90deg,var(--brand),#22d3ee); width:0%}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
  .score{font-size:32px; font-weight:800}
  .score .ok{color:var(--ok)}
  .score .bad{color:var(--bad)}
  .footer{color:var(--muted); font-size:12px; text-align:center; padding:12px 0 32px}
  .right{text-align:right}
  details summary{cursor:pointer; font-weight:700; padding:6px 0}
  .reveal{background:#f8fafc; padding:10px; border-radius:8px; margin-top:6px; font-size:13px}
  .reveal.correct{background:#dcfce7; color:#166534}
  .reveal.wrong{background:#fee2e2; color:#991b1b}
  .badge-level{padding:4px 10px; background:#0ea5e9; color:#fff; border-radius:999px; font-size:12px; font-weight:700}
  .warn{background:#fef9c3; border:1px solid #fde68a; padding:10px; border-radius:10px; color:#92400e; font-size:13px}
  .hint{font-size:12px; color:var(--muted); margin-top:4px}
  .seg-list{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
  .seg{padding:4px 10px; border-radius:999px; background:#fff; border:1px solid var(--line); font-size:12px; color:var(--muted)}
  .seg.playing{background:#0ea5e9; color:#fff; border-color:#0ea5e9}
  .seg.done{background:#dcfce7; color:#166534; border-color:#86efac}
  @media (max-width:520px){
    main{padding:12px}
    .card{padding:14px}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nis-bridge.js"></script>

<header>
  <div class="logo">🎧 MOCKS CAMBRIDGE · Listening</div>
  <div class="sub">NIS English · A2 / B1 / B2 / C1</div>
  <div style="margin-left:auto" id="hdrRight"></div>
</header>
<main id="app"></main>

<script>
/* ========================================================================
   CONFIG
   ======================================================================== */
const CONFIG = {
  AUDIO_BASE: "./mp3/",                // for B2 / C1 mp3 files
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzwn09Be0ZfKxGpwgkjLdp7nIs7awq8h7SVKkMlWN4EjekkOFqpLmnChzGHN_bB6kN-/exec",
  TEACHER_EMAIL: "pbaca@nordic-school.edu.pe",
  CLASS_LABEL: "NIS English 2026"
};

/* ========================================================================
   QUIZ DATA — 4 levels × 40 questions (=160 total)

   A2 & B1: TTS playback (browser voice) of Cambridge-calibrated scripts.
            KET = A2 official, PET = B1 official. No mp3 file needed.
   B2 & C1: real TOEFL mp3 audio files in ./mp3/
   ======================================================================== */

/* Simple original SVG icons for A2/B1 Part 1 "choose the picture" questions.
   Self-contained (no external/licensed images). Swap for nicer art anytime. */
const LPIC_WRAP = (inner) => `<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg" stroke="#1f2937" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
function clockFace_(hx, hy, mx, my){ return LPIC_WRAP(`<circle cx="60" cy="50" r="34"/><circle cx="60" cy="50" r="2.5" fill="#1f2937"/><line x1="60" y1="50" x2="${hx}" y2="${hy}"/><line x1="60" y1="50" x2="${mx}" y2="${my}"/>`); }
/* Digital clock icon: rectangular display with large digits (e.g. 8:00). */
function digitalClock_(t){
  return `<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="24" width="104" height="52" rx="9" fill="#0f172a" stroke="#1f2937" stroke-width="2.4"/>
    <rect x="14" y="30" width="92" height="40" rx="5" fill="#0b1220"/>
    <text x="60" y="61" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-weight="800" font-size="32" fill="#34d399" letter-spacing="2">${t}</text>
  </svg>`;
}
const LPICS = {
  book:    LPIC_WRAP(`<path d="M30 28 q30 -8 60 0 v44 q-30 -8 -60 0 z"/><line x1="60" y1="24" x2="60" y2="72"/>`),
  ball:    LPIC_WRAP(`<circle cx="60" cy="52" r="26"/><path d="M40 44 q20 12 40 0"/><path d="M44 66 q16 -10 32 0"/>`),
  cake:    LPIC_WRAP(`<rect x="36" y="46" width="48" height="28" rx="3"/><path d="M36 56 q12 8 24 0 q12 8 24 0"/><line x1="60" y1="30" x2="60" y2="46"/><circle cx="60" cy="28" r="3" fill="#f59e0b" stroke="none"/>`),
  park:    LPIC_WRAP(`<line x1="20" y1="78" x2="100" y2="78"/><polygon points="42,40 30,66 54,66" fill="#dcfce7"/><line x1="42" y1="66" x2="42" y2="78"/><circle cx="78" cy="44" r="12" fill="#dcfce7"/><line x1="78" y1="56" x2="78" y2="78"/>`),
  cafe:    LPIC_WRAP(`<path d="M38 46 h34 v14 a17 17 0 0 1 -34 0 z"/><path d="M72 50 h8 a6 6 0 0 1 0 12 h-8"/><line x1="44" y1="34" x2="44" y2="42"/><line x1="56" y1="34" x2="56" y2="42"/>`),

/* ========================================================================
   TTS engine — Web Speech API
   Prefers Microsoft Edge Neural voices ("Online (Natural)") when available.
   Parses dialog scripts and uses different voices per speaker (Woman/Man,
   Lisa/Interviewer, etc.) for natural two-voice playback.
   ======================================================================== */
const TTS = {
  synth: window.speechSynthesis,
  voices: [],
  femaleVoice: null,
  maleVoice: null,
  rate: 0.95,
  cancelled: false,
  isReady: false,
  _readyCallbacks: [],

  init(){
    if(!('speechSynthesis' in window)) return false;
    const load = ()=>{
      this.voices = this.synth.getVoices();
      if(this.voices.length > 0){
        this.selectBestVoices();
        if(!this.isReady){
          this.isReady = true;
          this._readyCallbacks.splice(0).forEach(cb=>cb());
        }
      }
    };
    load();
    this.synth.onvoiceschanged = load;
    return true;
  },

  onReady(cb){
    if(this.isReady) cb();
    else this._readyCallbacks.push(cb);
  },

  selectBestVoices(){
    const v = this.voices;
    const isNeural = name => /Online \(Natural\)/i.test(name);
    // Edge Neural female names (en-US first preference)
    const femName = /\b(Aria|Jenny|Michelle|Ana|Emma|Sonia|Libby|Olivia|Maisie)\b/i;
    const maleName = /\b(Guy|Christopher|Eric|Roger|Steffan|Ryan|Tony|Brian|Andrew|Jacob|William)\b/i;

    // FEMALE priority chain: Neural en-US → Neural en-GB → Neural any en → standard Zira → any en-US → any en
    this.femaleVoice =
         v.find(x => isNeural(x.name) && x.lang.startsWith('en-US') && femName.test(x.name))
      || v.find(x => isNeural(x.name) && x.lang.startsWith('en-GB') && femName.test(x.name))
      || v.find(x => isNeural(x.name) && x.lang.startsWith('en') && femName.test(x.name))
      || v.find(x => isNeural(x.name) && x.lang.startsWith('en'))
      || v.find(x => /Zira/i.test(x.name) && x.lang.startsWith('en'))
      || v.find(x => /Hazel|Susan|Catherine/i.test(x.name) && x.lang.startsWith('en'))
      || v.find(x => x.lang.startsWith('en-US'))
      || v.find(x => x.lang.startsWith('en'))
      || v[0] || null;

    // MALE priority chain
    this.maleVoice =
         v.find(x => isNeural(x.name) && x.lang.startsWith('en-US') && maleName.test(x.name))
      || v.find(x => isNeural(x.name) && x.lang.startsWith('en-GB') && maleName.test(x.name))
      || v.find(x => isNeural(x.name) && x.lang.startsWith('en') && maleName.test(x.name))
      || v.find(x => /David|Mark/i.test(x.name) && x.lang.startsWith('en'))
      || v.find(x => /George|Daniel|James/i.test(x.name) && x.lang.startsWith('en'))
      || v.find(x => x.lang.startsWith('en-US') && x !== this.femaleVoice)
      || v.find(x => x.lang.startsWith('en') && x !== this.femaleVoice)
      || this.femaleVoice;
  },

  voiceLabel(voice){
    if(!voice) return 'default';
    const m = voice.name.match(/Microsoft\s+(\w+)/);
    const base = m ? m[1] : voice.name.split(' ')[0];
    const neural = /Online \(Natural\)/i.test(voice.name) ? ' Neural' : '';
    const lang = voice.lang ? ` ${voice.lang}` : '';
    return base + neural + lang;
  },

  status(){
    return {
      ready: this.isReady,
      female: this.voiceLabel(this.femaleVoice),
      male: this.voiceLabel(this.maleVoice),
      distinct: !!(this.femaleVoice && this.maleVoice && this.femaleVoice !== this.maleVoice),
      neural: /Online \(Natural\)/i.test((this.femaleVoice && this.femaleVoice.name)||'')
           && /Online \(Natural\)/i.test((this.maleVoice && this.maleVoice.name)||'')
    };
  },

  // Parse script into segments by speaker label
  parseDialog(text){
    const re = /\b([A-Z][a-zA-Z.]+(?:\s[A-Z][a-zA-Z.]+){0,2}?):\s+/g;
    const matches = [];
    let m;
    while((m = re.exec(text)) !== null){
      matches.push({ idx: m.index, label: m[1].trim(), endIdx: m.index + m[0].length });
    }
    if(matches.length === 0) return [{ speaker: null, text }];
    const segments = [];
    if(matches[0].idx > 0){
      const prefix = text.slice(0, matches[0].idx).trim();
      if(prefix) segments.push({ speaker: null, text: prefix });
    }
    for(let i=0; i<matches.length; i++){
      const cur = matches[i];
      const next = matches[i+1];
      const end = next ? next.idx : text.length;
      const segText = text.slice(cur.endIdx, end).trim();
      if(segText) segments.push({ speaker: cur.label, text: segText });
    }
    return segments;
  },

  // Build a speaker -> voice profile map for ONE script.
  // Guarantees the two main speakers always sound different:
  // distinct voices when available, or pitch-shifted fallback when the
  // system only has one English voice installed.
  assignVoices(speakers){
    const twoVoices = !!(this.femaleVoice && this.maleVoice && this.femaleVoice !== this.maleVoice);
    const profA = twoVoices ? {voice:this.femaleVoice, pitch:1.0, rateMul:1.0}
                            : {voice:this.femaleVoice, pitch:1.22, rateMul:1.0};
    const profB = twoVoices ? {voice:this.maleVoice,   pitch:1.0, rateMul:1.0}
                            : {voice:this.femaleVoice, pitch:0.74, rateMul:0.97};
    const femRe = /(^|\b)(woman|girl|female|she|her|lisa|emma|kate|sarah|sandy|maria|sonia|jenny|mia|amy|chloe|olivia|yuki|hannah|mum|mother|female student|female narrator)(\b|$)/i;
    const malRe = /(^|\b)(man|boy|male|he|his|jake|marco|tom|sam|david|mark|alex|daniel|nico|jim|brian|jacob|professor|father|dad|male student|male narrator)(\b|$)/i;
    const map = {};

    // Interview pattern: Interviewer + one guest -> always opposite voices
    const interviewer = speakers.find(s=>/interviewer|host|presenter|reporter/i.test(s));
    if(interviewer && speakers.length === 2){
      const guest = speakers.find(s=>s!==interviewer);
      const guestFemale = femRe.test(guest) && !malRe.test(guest);
      map[guest] = guestFemale ? profA : profB;
      map[interviewer] = guestFemale ? profB : profA;
    } else {
      speakers.forEach((sp,idx)=>{
        if(femRe.test(sp) && !malRe.test(sp)) map[sp] = profA;
        else if(malRe.test(sp)) map[sp] = profB;
        else map[sp] = (idx % 2 === 0) ? profA : profB;
      });
      // Safety net: exactly 2 speakers must never share a voice
      if(speakers.length === 2 && map[speakers[0]] === map[speakers[1]]){
        map[speakers[1]] = (map[speakers[0]] === profA) ? profB : profA;
      }
    }
    map._narrator = profA;
    return map;
  },

  speak(text, profile, onEnd){
    const u = new SpeechSynthesisUtterance(text);
    const voice = profile && profile.voice;
    u.lang = (voice && voice.lang) || 'en-US';
    u.rate = Math.max(0.5, Math.min(1.5, this.rate * ((profile && profile.rateMul) || 1)));
    u.pitch = (profile && profile.pitch) || 1;
    u.volume = 1;
    if(voice) u.voice = voice;
    u.onend = ()=>{ if(onEnd) onEnd(); };
    u.onerror = ()=>{ if(onEnd) onEnd(); };
    this.synth.speak(u);
  },

  playScript(script, onDone){
    const segments = this.parseDialog(script);
    const speakers = [...new Set(segments.map(s=>s.speaker).filter(Boolean))];
    const vmap = this.assignVoices(speakers);
    let i = 0;
    const next = ()=>{
      if(this.cancelled || i >= segments.length){ if(onDone) onDone(); return; }
      const seg = segments[i++];
      const profile = seg.speaker ? (vmap[seg.speaker] || vmap._narrator) : vmap._narrator;
      this.speak(seg.text, profile, next);
    };
    next();
  },

  speakSequence(scripts, {onSegment, onDone, gap=1800}={}){
    this.cancelled = false;
    let i = 0;
    const next = ()=>{
      if(this.cancelled || i >= scripts.length){ if(onDone) onDone(); return; }
      const idx = i++;
      if(onSegment) onSegment(idx);
      this.playScript(scripts[idx], ()=>setTimeout(next, gap));
    };
    next();
  },

  pause(){ if(this.synth.speaking && !this.synth.paused) this.synth.pause(); },
  resume(){ if(this.synth.paused) this.synth.resume(); },
  stop(){ this.cancelled = true; this.synth.cancel(); }
};
TTS.init();

function shuffle(a){
  const b = a.slice();
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

/* ---------- VIEW: Quiz ---------- */
function viewQuiz(){
  const lev = currentQuiz()[state.level];
  document.body.classList.remove('signin-mode','result-mode');
  document.body.classList.add('exam-mode');
  // per-part starting question number
  let counter = 1;
  const pInfo = lev.audios.map(a=>{ const o={start:counter, count:a.questions.length}; counter += a.questions.length; return o; });
  state.curPart = 0;

  const paneHTML = lev.audios.map((a,i)=>{
    const info = pInfo[i];
    const range = info.count>1 ? `${info.start}–${info.start+info.count-1}` : `${info.start}`;
    const playerBlock = a.paged ? ''
      : `<div class="ins-player">${(a.kind==='tts') ? renderTTSPlayer(a) : `<audio controls preload="none" src="${CONFIG.AUDIO_BASE}${a.file}"></audio>`}</div>`;
    return `<section class="ins-pane${i===0?' active':''}" data-part="${i}">
      <div class="ins-instr"><strong>Questions ${range}</strong><p>${a.intro||''}</p></div>
      ${playerBlock}
      <div class="ins-content" id="qs-${a.id}"></div>
    </section>`;
  }).join('');

  const tabsHTML = lev.audios.map((a,i)=>{
    const info = pInfo[i];
    let qn='';
    for(let j=0;j<info.count;j++){ qn += `<button class="lqn" id="lqn-${i}-${j}" onclick="event.stopPropagation();window._lGoQ(${i},${j})">${info.start+j}</button>`; }
    return `<div class="ins-tab${i===0?' active':''}" data-part="${i}" onclick="window._lGoPart(${i})">
      <div class="tn">Part ${i+1}</div><div class="tp" id="lprog-${i}">0 of ${info.count}</div><div class="tq">${qn}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="ins-shell">
      <header class="ins-hdr">
        <div class="ins-brand"><img src="nordic-logo-h.svg" alt="Nordic"></div>
        <div class="ins-cand">Candidate: <strong>${state.name}</strong> · ${state.klass}</div>
        <div class="ins-right">
          <span class="ins-audio">🔊 Listening</span>
          <button id="insExit">Exit</button>
          <button class="ins-fin" id="insSubmit">Submit ✓</button>
        </div>
      </header>
      <main class="ins-main"><div class="ins-inner">
        <div class="ins-title"><h1>${lev.label} — Listening</h1></div>
        ${paneHTML}
      </div></main>
      <footer class="ins-ftr">
        <div class="ins-tabs">${tabsHTML}</div>
        <div class="ins-arrows"><button id="lprev">◀</button><button id="lnext">▶</button></div>
      </footer>
    </div>`;

  lev.audios.forEach(a=>{ if(a.kind==='tts') bindTTSPlayer(a); renderQuestions(a, $(`#qs-${a.id}`)); });

  // Views: paged parts expose one view per question; other parts one view each.
  const views = [];
  lev.audios.forEach((a,pi)=>{ if(a.paged){ a.questions.forEach((q,qi)=>views.push({part:pi,q:qi})); } else views.push({part:pi,q:null}); });
  state.curView = 0;
  function pauseAllAudio(){ document.querySelectorAll('.ins-shell audio').forEach(a=>{ try{a.pause();}catch(e){} }); try{ TTS.stop(); }catch(e){} }

  window._lGoView = function(vi, autoplay){
    const n = views.length; vi = Math.max(0, Math.min(n-1, vi)); state.curView = vi;
    const v = views[vi], part = v.part;
    document.querySelectorAll('.ins-pane').forEach((p,k)=>p.classList.toggle('active', k===part));
    document.querySelectorAll('.ins-tab').forEach((t,k)=>t.classList.toggle('active', k===part));
    pauseAllAudio();
    document.querySelectorAll('.lqn.cur').forEach(b=>b.classList.remove('cur'));
    const pane = document.querySelector('.ins-pane[data-part="'+part+'"]');
    if(lev.audios[part].paged){
      const qs = pane.querySelectorAll('.paged-q');
      qs.forEach((el,qi)=>el.classList.toggle('show', qi===v.q));
      const btn = document.getElementById('lqn-'+part+'-'+v.q); if(btn) btn.classList.add('cur');
      if(autoplay){ const cur = qs[v.q]; const au = cur && cur.querySelector('audio'); if(au){ try{ au.currentTime=0; const p=au.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){} } }
    }
    const pv=$('#lprev'), nx=$('#lnext'); if(pv) pv.disabled=(vi===0); if(nx) nx.disabled=(vi===n-1);
    const m=document.querySelector('.ins-main'); if(m) m.scrollTo({top:0});
  };
  window._lGoPart = function(i){ window._lGoView(views.findIndex(v=>v.part===i), false); };
  window._lGoQ = function(part, local){
    if(lev.audios[part].paged){ window._lGoView(views.findIndex(v=>v.part===part && v.q===local), true); return; }
    window._lGoView(views.findIndex(v=>v.part===part), false);
    document.querySelectorAll('.lqn.cur').forEach(b=>b.classList.remove('cur'));
    const btn=document.getElementById('lqn-'+part+'-'+local); if(btn) btn.classList.add('cur');
    const a=lev.audios[part]; const el=document.getElementById('lq_'+a.id+'__'+local);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.remove('q-flash'); void el.offsetWidth; el.classList.add('q-flash'); setTimeout(()=>el.classList.remove('q-flash'),1200); }
  };
  window._lNav = function(d){ window._lGoView(state.curView + d, true); };
  $('#lprev').onclick=()=>window._lNav(-1);
  $('#lnext').onclick=()=>window._lNav(1);
  window._lGoView(0, false);

  $('#insExit').onclick=()=>{ if(confirm('¿Salir? Perderás tus respuestas actuales.')){ try{TTS.stop();}catch(e){} document.body.classList.remove('exam-mode'); viewWelcome(); } };
  $('#insSubmit').onclick=onSubmit;

  updateProgress();
}

function renderTTSPlayer(audio){
  const isMulti = audio.scripts.length > 1;
  return `
    <div class="audioblock" data-audio="${audio.id}">
      <div class="tts-controls">
        <button class="btn small" data-act="play">▶ Play</button>
        <button class="btn small secondary" data-act="pause">⏸ Pause</button>
        <button class="btn small secondary" data-act="resume">▶ Resume</button>
        <button class="btn small ghost" data-act="stop">⏹ Stop</button>
        <div class="speed">
          <span>Speed</span>
          <input type="range" data-act="speed" min="0.7" max="1.1" step="0.05" value="0.95">
          <span data-out="speed">0.95×</span>
        </div>
      </div>
      <div class="seg-list" data-segs>
        ${(audio.segments||[]).map((s,i)=>`<span class="seg" data-seg="${i}">${i+1}. ${s}</span>`).join("")}
      </div>
      <div class="tts-status" data-status>Listo. Click <b>Play</b> para empezar.</div>
      <div class="hint" data-voiceinfo style="display:none">🔊 Cargando voces…</div>
      <div class="hint">${isMulti ? "Vas a oír "+audio.scripts.length+" conversaciones cortas con una pausa entre cada una." : "Audio de unos 90 segundos. Puedes pausar y continuar."}</div>
    </div>`;
}

function bindTTSPlayer(audio){
  const root = document.querySelector(`[data-audio="${audio.id}"]`);
  if(!root) return;
  const status = root.querySelector('[data-status]');
  const segs = root.querySelectorAll('[data-seg]');
  const voiceInfo = root.querySelector('[data-voiceinfo]');
  TTS.onReady(()=>{
    if(!voiceInfo) return;
    // Teacher-only debug indicator. Hidden from students.
    // Reveal by adding ?debug to the URL (e.g. ...listening-quiz.html?debug)
    const teacherMode = /[?&](debug|teacher|voz)\b/i.test(location.search);
    if(!teacherMode){ voiceInfo.style.display = 'none'; return; }
    voiceInfo.style.display = '';
    const s = TTS.status();
    const badge = s.neural
      ? '<span style="background:#dcfce7;color:#166534;padding:1px 8px;border-radius:999px;font-weight:700">🌟 Edge Neural</span>'
      : '<span style="background:#fef3c7;color:#92400e;padding:1px 8px;border-radius:999px;font-weight:700">Standard voice</span>';
    const mode = s.distinct
      ? `🗣️ Diálogo a 2 personas: ♀ <b>${s.female}</b> · ♂ <b>${s.male}</b>`
      : `🗣️ Diálogo a 2 personas (1 voz, tono diferenciado: ♀ agudo / ♂ grave) — <b>${s.female}</b>`;
    voiceInfo.innerHTML = `${mode} &nbsp; ${badge}`;
    if(!s.neural){
      voiceInfo.innerHTML += `<br><span style="color:#92400e">💡 Para 2 voces reales y mejor calidad, abre en <b>Microsoft Edge</b> con internet (Aria + Guy Neural).</span>`;
    }
  });
  const setSeg = (i, cls)=>{
    segs.forEach(s=>s.classList.remove('playing'));
    if(cls === 'playing'){
      const s = root.querySelector(`[data-seg="${i}"]`);
      if(s){ s.classList.add('playing'); }
    }
  };
  const markDone = (i)=>{
    const s = root.querySelector(`[data-seg="${i}"]`);
    if(s){ s.classList.remove('playing'); s.classList.add('done'); }
  };
  root.querySelector('[data-act="play"]').onclick = ()=>{
    TTS.stop();
    segs.forEach(s=>{s.classList.remove('playing'); s.classList.remove('done');});
    status.textContent = "Reproduciendo…";
    TTS.speakSequence(audio.scripts, {
      onSegment:(i)=>{
        setSeg(i,'playing');
        if(audio.scripts.length>1) status.textContent = `Conversación ${i+1} de ${audio.scripts.length}: ${audio.segments[i]||''}`;
      },
      onDone:()=>{ status.textContent = "✅ Reproducción terminada."; segs.forEach(s=>{s.classList.remove('playing'); s.classList.add('done');}); }
    });
  };
  root.querySelector('[data-act="pause"]').onclick = ()=>{ TTS.pause(); status.textContent = "⏸ Pausado."; };
  root.querySelector('[data-act="resume"]').onclick = ()=>{ TTS.resume(); status.textContent = "▶ Reproduciendo…"; };
  root.querySelector('[data-act="stop"]').onclick = ()=>{ TTS.stop(); status.textContent = "⏹ Detenido."; segs.forEach(s=>s.classList.remove('playing')); };
  const speed = root.querySelector('[data-act="speed"]');
  const speedOut = root.querySelector('[data-out="speed"]');
  speed.oninput = ()=>{ TTS.rate = parseFloat(speed.value); speedOut.textContent = TTS.rate.toFixed(2)+"×"; };
}

function renderQuestions(audio, container){
  audio.questions.forEach((q, qi)=>{
    const key = `${audio.id}__${qi}`;
    const el = document.createElement("div");
    el.className = audio.paged ? "q paged-q" : "q";
    el.id = "lq_" + key;
    let typePill = `<span class="pill">Comprensión</span>`;
    if(q.type==="tf") typePill = `<span class="pill tf">Verdadero / Falso</span>`;
    if(q.type==="inf") typePill = `<span class="pill inf">Inferencia</span>`;
    if(q.type==="seq") typePill = `<span class="pill seq">Secuencia</span>`;

    if(q.type==="mc" || q.type==="inf"){
      el.innerHTML = `
        <div class="meta">${typePill} <span>Pregunta ${qi+1}</span></div>
        <div class="stem">${q.q}</div>
        <div class="opts" data-key="${key}">
          ${q.o.map((opt,oi)=>`
            <label class="opt"><input type="radio" name="${key}" value="${oi}"> <span>${opt}</span></label>
          `).join("")}
        </div>`;
    }
    else if(q.type==="tf"){
      el.innerHTML = `
        <div class="meta">${typePill} <span>Pregunta ${qi+1}</span></div>
        <div class="stem">${q.q}</div>
        <div class="opts" data-key="${key}">
          <label class="opt"><input type="radio" name="${key}" value="true"> <span>True (Verdadero)</span></label>
          <label class="opt"><input type="radio" name="${key}" value="false"> <span>False (Falso)</span></label>
        </div>`;
    }
    else if(q.type==="seq"){
      const shuffled = shuffle(q.items.map((it,idx)=>({it,idx})));
      state.seqOrder[key] = shuffled.map(s=>s.idx);
      el.innerHTML = `
        <div class="meta">${typePill} <span>Pregunta ${qi+1}</span></div>
        <div class="stem">${q.q}</div>
        <div class="seqlist" data-key="${key}">
          ${shuffled.map((s,si)=>`
            <div class="seqitem">
              <select data-pos="${si}">
                <option value="">—</option>
                ${q.items.map((_,oi)=>`<option value="${oi+1}">${oi+1}</option>`).join("")}
              </select>
              <span>${s.it}</span>
            </div>
          `).join("")}
        </div>
        <div class="hint">Asigna 1, 2, 3, 4 según el orden en que ocurrieron.</div>`;
    }
    else if(q.type==="pic"){
      el.innerHTML = `
        <div class="meta"><span class="pill">Imagen</span> <span>Pregunta ${qi+1}</span></div>
        <div class="stem">${q.q}</div>
        <div class="opts pic-opts" data-key="${key}">
          ${q.imgs.map((k,oi)=>`<label class="opt pic-opt"><input type="radio" name="${key}" value="${oi}"><span class="pic">${picMarkup(k)}</span></label>`).join("")}
        </div>`;
    }
    else if(q.type==="gap"){
      el.innerHTML = `
        <div class="meta"><span class="pill">Completar</span> <span>Pregunta ${qi+1}</span></div>
        <div class="stem">${q.label||q.q||""}</div>
        <div class="gapwrap" data-key="${key}"><input type="text" class="gapinput" autocomplete="off" placeholder="una palabra, número, fecha u hora"></div>`;
    }
    else if(q.type==="match"){
      const bank = q.bank || audio.bank || [];
      el.innerHTML = `
        <div class="meta"><span class="pill">Emparejar</span> <span>Pregunta ${qi+1}</span></div>
        ${q.taskLabel?`<div class="stem" style="color:#4987c6">${q.taskLabel}</div>`:''}
        <div class="stem">${q.person}</div>
        <select class="matchsel" data-key="${key}"><option value="">— elige —</option>${bank.map(b=>`<option value="${b}">${b}</option>`).join("")}</select>`;
    }
    if(audio.paged && q.audio){
      el.innerHTML = `<div class="q-audio"><audio controls preload="none" src="${CONFIG.AUDIO_BASE}${q.audio}"></audio></div>` + el.innerHTML;
    }
    container.appendChild(el);
  });

  container.querySelectorAll('.opts').forEach(o=>{
    const key = o.dataset.key;
    o.addEventListener("change", e=>{
      if(e.target.type === "radio"){
        const v = e.target.value;
        if(v==="true") state.answers[key]=true;
        else if(v==="false") state.answers[key]=false;
        else state.answers[key] = parseInt(v,10);
        updateProgress();
      }
    });
  });
  container.querySelectorAll('.seqlist').forEach(o=>{
    const key = o.dataset.key;
    o.addEventListener("change", ()=>{
      const ans = {};
      o.querySelectorAll('select').forEach(sel=>{
        const pos = parseInt(sel.dataset.pos, 10);
        const v = sel.value ? parseInt(sel.value, 10) : null;
        ans[pos] = v;
      });
      state.answers[key] = ans;
      updateProgress();
    });
  });
  container.querySelectorAll('.gapwrap input').forEach(inp=>{
    const key = inp.closest('.gapwrap').dataset.key;
    inp.addEventListener("input", ()=>{ state.answers[key] = inp.value; updateProgress(); });
  });
  container.querySelectorAll('.matchsel').forEach(sel=>{
    const key = sel.dataset.key;
    sel.addEventListener("change", ()=>{ state.answers[key] = sel.value; updateProgress(); });
  });
}

function updateProgress(){
  const lev = currentQuiz()[state.level];
  let pointsAnswered = 0;
  let pointsTotal = 0;
  lev.audios.forEach(a=>{
    a.questions.forEach((q,qi)=>{
      const key = `${a.id}__${qi}`;
      if(q.type==="seq"){
        pointsTotal += q.items.length;
        const ans = state.answers[key];
        if(ans){
          Object.values(ans).forEach(v=>{ if(v!=null) pointsAnswered++; });
        }
      } else {
        pointsTotal++;
        var _av = state.answers[key];
        if(_av!==undefined && _av!=="") pointsAnswered++;
      }
    });
  });
  const _pi_done = {};
  lev.audios.forEach((a,pi)=>{
    let done=0;
    a.questions.forEach((q,qi)=>{
      const key=`${a.id}__${qi}`; const v=state.answers[key];
      const ans = (q.type==="seq") ? !!(v && Object.values(v).some(x=>x!=null)) : (v!==undefined && v!=="");
      if(ans) done++;
      const b=document.getElementById('lqn-'+pi+'-'+qi); if(b) b.classList.toggle('done', !!ans);
    });
    const p=document.getElementById('lprog-'+pi); if(p) p.textContent = done+' of '+a.questions.length;
  });
}

/* ---------- SCORING ---------- */
function computeScore(){
  const lev = currentQuiz()[state.level];
  let total = 0, correct = 0;
  const breakdown = [];
  lev.audios.forEach(a=>{
    a.questions.forEach((q, qi)=>{
      const key = `${a.id}__${qi}`;
      if(q.type==="mc" || q.type==="inf"){
        total++;
        const given = state.answers[key];
        const ok = given === q.c;
        if(ok) correct++;
        breakdown.push({audio:a.title, type:q.type, q:q.q, given:given==null?"(sin responder)":q.o[given], correct:q.o[q.c], ok});
      }
      else if(q.type==="tf"){
        total++;
        const given = state.answers[key];
        const ok = given === q.c;
        if(ok) correct++;
        breakdown.push({audio:a.title, type:q.type, q:q.q, given:given==null?"(sin responder)":(given?"True":"False"), correct:q.c?"True":"False", ok});
      }
      else if(q.type==="seq"){
        const shown = state.seqOrder[key] || [];
        const ans = state.answers[key] || {};
        shown.forEach((origIdx, pos)=>{
          total++;
          const correctNumber = origIdx + 1;
          const givenNumber = ans[pos];
          const ok = givenNumber === correctNumber;
          if(ok) correct++;
          breakdown.push({audio:a.title, type:"seq", q:`${q.q} → "${q.items[origIdx]}"`, given:givenNumber==null?"(sin responder)":String(givenNumber), correct:String(correctNumber), ok});
        });
      }
      else if(q.type==="pic"){
        total++;
        const given = state.answers[key];
        const ok = given === q.c;
        if(ok) correct++;
        breakdown.push({audio:a.title, type:"pic", q:q.q, given:given==null?"(sin responder)":("Imagen "+(given+1)), correct:"Imagen "+(q.c+1), ok});
      }
      else if(q.type==="gap"){
        total++;
        const given = state.answers[key];
        const ok = (q.accept||[]).some(x=>gapNorm_(x)===gapNorm_(given));
        if(ok) correct++;
        breakdown.push({audio:a.title, type:"gap", q:q.label||q.q||"", given:(given==null||given==="")?"(sin responder)":given, correct:(q.accept||[]).join(" / "), ok});
      }
      else if(q.type==="match"){
        total++;
        const given = state.answers[key];
        const ok = given === q.c;
        if(ok) correct++;
        breakdown.push({audio:a.title, type:"match", q:q.person, given:(given==null||given==="")?"(sin responder)":given, correct:q.c, ok});
      }
    });
  });
  return {total, correct, breakdown};
}

/* ---------- SUBMIT ---------- */
function onSubmit(){
  const lev = currentQuiz()[state.level];
  let unanswered = 0;
  lev.audios.forEach(a=>a.questions.forEach((q,qi)=>{
    const key = `${a.id}__${qi}`;
    if(q.type==="seq"){
      const ans = state.answers[key] || {};
      const shown = state.seqOrder[key] || [];
      shown.forEach((_,pos)=>{ if(ans[pos]==null) unanswered++; });
    } else { var _v = state.answers[key]; if(_v===undefined || _v==="") unanswered++; }
  }));
  if(unanswered>0){
    if(!confirm(`Tienes ${unanswered} ítems sin responder. ¿Enviar de todas formas?`)) return;
  }
  TTS.stop();
  const score = computeScore();
  const elapsedMin = Math.round((Date.now()-state.startTime)/60000);
  const payload = {
    name: state.name,
    klass: state.klass,
    email: state.email,
    skill: "Listening",
    level: state.level,
    examType: state.examType,
    mock: state.examType === 'mock03' ? 'MOCK 3' : state.examType === 'mock02' ? 'MOCK 2' : state.examType === 'practice' ? 'Practice' : 'MOCK 1',
    score: score.correct,
    total: score.total,
    elapsed_min: elapsedMin,
    when: new Date().toISOString(),
    answers: state.answers,
    breakdown: score.breakdown
  };

  state.lastPayload = payload;
  try{ if(window.NIS) window.NIS.save({skill:payload.skill, level:payload.level, examType:payload.examType, score:payload.score, total:payload.total, duration_min:payload.elapsed_min, answers:payload.answers, breakdown:payload.breakdown}); }catch(e){}
  viewResult(payload);
}

/* POST result to the Apps Script (no-cors). The script saves it to the Sheet and
   emails the teacher AND the student. Returns a promise (resolves even on no-cors). */
function sendResultToWebhook(payload){
  if(!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith("PEGA_AQUI")) return Promise.resolve({skipped:true});
  return fetch(CONFIG.APPS_SCRIPT_URL, {
    method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  }).then(()=>({ok:true})).catch(()=>({ok:false}));
}

function downloadResultPDF(filename){
  const el = document.getElementById('pdfTarget');
  if(!window.html2pdf || !el){ alert('PDF library still loading — try again in a moment.'); return; }
  html2pdf().set({margin:8, filename:filename, image:{type:'jpeg',quality:0.95},
    html2canvas:{scale:2, useCORS:true}, jsPDF:{unit:'mm', format:'a4', orientation:'portrait'},
    pagebreak:{mode:['css','legacy']}}).from(el).save();
}

function saveLocal(prefilled){
  const score = prefilled || (function(){
    const s = computeScore();
    return {
      name: state.name, klass: state.klass, level: state.level,
      score: s.correct, total: s.total,
      when: new Date().toISOString(), answers: state.answers, breakdown: s.breakdown
    };
  })();
  const blob = new Blob([JSON.stringify(score,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safeName = (state.name||"alumno").replace(/[^a-z0-9]+/gi,"_");
  a.href = url; a.download = `listening_${state.level}_${safeName}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}

/* ---------- VIEW: Result ---------- */
function viewResult(payload){
  document.body.classList.remove('exam-mode'); document.body.classList.remove('signin-mode');
  document.body.classList.add('result-mode');
  hdrRight.innerHTML = "";
  const pct = payload.total ? Math.round(100 * payload.score / payload.total) : 0;
  const pass = pct >= 60;
  const first = (payload.name||'Student').split(' ')[0];
  const verdict = pct>=80 ? `Outstanding work, ${first}! A very strong performance.`
                : pct>=60 ? `Well done, ${first}! That's a pass (Cambridge standard ≈ 60%).`
                : pct>=40 ? `Good effort, ${first}. Review the parts you found hardest and try again.`
                : `Don't be discouraged, ${first}. Every attempt sharpens your skills — review and try again soon.`;
  // per-part breakdown (grouped by audio/part title)
  const pm = {}, parts = [];
  payload.breakdown.forEach(b=>{ if(!pm[b.audio]){ pm[b.audio]={name:b.audio, ok:0, tot:0}; parts.push(pm[b.audio]); } pm[b.audio].tot++; if(b.ok) pm[b.audio].ok++; });
  parts.forEach(p=>p.pct = p.tot ? Math.round(100*p.ok/p.tot) : 0);
  const partsHTML = parts.map(p=>`<div class="part-bar">
      <div><div class="pname">${p.name}</div><div class="meta">${p.ok} of ${p.tot} correct</div></div>
      <div class="pctn" style="color:${p.pct>=75?'#16a34a':p.pct>=50?'#f59e0b':'#dc2626'}">${p.pct}%</div>
      <div class="barw"><div class="barf" style="width:${p.pct}%;background:${p.pct>=75?'#16a34a':p.pct>=50?'#f59e0b':'#dc2626'}"></div></div>
    </div>`).join('');
  const detailHTML = payload.breakdown.map(b=>`
      <div class="res-line"><span>${(b.q||'').replace(/<[^>]+>/g,'')}</span><span class="${b.ok?'res-ok':'res-bad'}">${b.ok?'✓':'✗'}</span></div>
      <div class="res-ans">Your answer: <b>${b.given}</b> &nbsp;|&nbsp; Correct: <b style="color:#16a34a">${b.correct}</b></div>`).join('');

  app.innerHTML = `
    <div class="res-wrap">
      <div class="crumb">Results</div>
      <h1>Exam results</h1>
      <p class="res-sub">${QUIZ[payload.level] ? QUIZ[payload.level].label : payload.level} — Listening · ${payload.mock||'MOCK 1'}</p>
      <div class="motivation-card">
        <h2>${pass?'🎉 Congratulations':'Keep going'}, ${first}!</h2>
        <p>${verdict}</p>
      </div>
      <div class="pdf-actions">
        <button onclick="downloadResultPDF('NIS-Listening-${payload.level}-${(payload.name||'').replace(/\\s+/g,'_')}.pdf')">⬇ Download PDF</button>
        <button class="email" id="lSendEmail">📧 Send to my email</button>
      </div>
      <div class="send-status" id="lSendStatus" style="display:none"></div>
      <div id="pdfTarget">
        <div class="pdf-brand"><img src="nordic-logo-h.svg" alt="Nordic"><div class="rep">CAMBRIDGE-FORMAT LISTENING REPORT</div></div>
        <div class="res-grid">
          <div><label>Student</label>${payload.name||''}</div>
          <div><label>Email</label>${payload.email||'—'}</div>
          <div><label>Grade / Class</label>${payload.klass||''}</div>
          <div><label>Level</label>${payload.level||''}</div>
          <div><label>Skill</label>Listening</div>
          <div><label>Time spent</label>${payload.elapsed_min||0} min</div>
        </div>
        <div class="score-card">
          <div class="big ${pass?'pass':'fail'}">${payload.score} / ${payload.total}</div>
          <div class="pct">${pct}%</div>
          <div class="verdict">${pass?'Pass':'Below the Cambridge passing standard (≈ 60%)'}</div>
        </div>
        <div class="res-card"><h2>Score by part</h2>${partsHTML}</div>
        <div class="res-card"><h2>Detailed question review</h2>${detailHTML}</div>
      </div>
      <div class="row" style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        <a class="btn" style="text-decoration:none" href="https://bacman2000.github.io/nis-portal/">🏫 Volver al Portal → siguiente destreza</a>
        <button class="btn secondary" id="lAgain">Try another level</button>
        <a class="btn secondary" style="text-decoration:none" href="quizzes.html">All quizzes ↗</a>
      </div>
    </div>`;
  $("#lAgain").onclick = viewWelcome;

  // Auto-send to the webhook (saves to Sheet + emails teacher AND student)
  const st = document.getElementById('lSendStatus');
  st.style.display='block'; st.textContent='Sending your result…';
  sendResultToWebhook(payload).then(res=>{
    if(res.skipped){ st.classList.add('err'); st.textContent='⚠ No webhook configured — use ⬇ Download PDF.'; }
    else { st.classList.remove('err'); st.textContent='✓ Result sent. Check your email shortly for your report.'; }
  });
  document.getElementById('lSendEmail').onclick = async ()=>{
    const b=document.getElementById('lSendEmail'); b.disabled=true; b.textContent='Sending…';
    const res=await sendResultToWebhook(payload); b.disabled=false; b.textContent='📧 Send to my email';
    if(res.skipped){ st.classList.add('err'); st.textContent='⚠ No webhook configured.'; }
    else { st.classList.remove('err'); st.textContent='✓ Sent. Check your email shortly.'; }
  };
}

function sendByEmail(payload){
  const pct = Math.round(100*payload.score/payload.total);
  const byType = {mc:[0,0], tf:[0,0], inf:[0,0], seq:[0,0]};
  payload.breakdown.forEach(b=>{
    if(byType[b.type]){
      byType[b.type][1]++;
      if(b.ok) byType[b.type][0]++;
    }
  });
  const summary = [
    `=== LISTENING QUIZ — RESULTADOS ===`,
    ``,
    `Alumno: ${payload.name}`,
    `Grado: ${payload.klass}`,
    `Nivel: ${payload.level}`,
    `Score: ${payload.score} / ${payload.total} (${pct}%)`,
    `Tiempo: ${payload.elapsed_min} min`,
    `Fecha: ${new Date(payload.when).toLocaleString()}`,
    ``,
    `--- Por tipo de pregunta ---`,
    `Comprensión MC: ${byType.mc[0]}/${byType.mc[1]}`,
    `Verdadero/Falso: ${byType.tf[0]}/${byType.tf[1]}`,
    `Inferencia: ${byType.inf[0]}/${byType.inf[1]}`,
    `Secuencia: ${byType.seq[0]}/${byType.seq[1]}`,
    ``,
    `--- Detalle pregunta por pregunta ---`,
    ...payload.breakdown.map((b,i)=>`${i+1}. [${b.type.toUpperCase()}] ${b.q.replace(/<[^>]+>/g,'')}\n   Mi respuesta: ${b.given}\n   Correcta: ${b.correct}\n   Resultado: ${b.ok?'✓ correcto':'✗ incorrecto'}`)
  ];
  const body = summary.join('\n');
  const subject = `Listening Quiz · ${payload.name} · ${payload.level} · ${payload.score}/${payload.total} (${pct}%)`;
  const mailto = `mailto:${CONFIG.TEACHER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // Some mailto bodies are too long; trim if needed
  if(mailto.length > 7800){
    const shortBody = summary.slice(0,16).join('\n') + '\n\n(Detalle completo en el archivo JSON descargado.)';
    window.location.href = `mailto:${CONFIG.TEACHER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shortBody)}`;
  } else {
    window.location.href = mailto;
  }
}

/* ---------- START ---------- */
/* If the student is already logged into Portal NIS (same origin → shared
   session), skip the sign-in card and go straight to choosing the level. */
(async function(){
  try{
    if(window.NIS){
      const s = await window.NIS.currentStudent();
      if(s){ state.name = s.full_name || s.first_name || ''; state.klass = s.grade || ''; state.email = s.email || ''; viewLevelSelect(); return; }
    }
  }catch(e){}
  viewWelcome();
})();
