<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Auto-version: always load the latest deployed version without the student
     having to clear the browser cache. On load we read version.json (never
     cached) and, if the page's ?v= does not match, reload pointing at the
     current version — a fresh URL the browser cannot have cached. -->
<script>
(function(){
  try{
    var params = new URLSearchParams(location.search);
    var loadedV = params.get('v');
    fetch('version.json?t=' + Date.now(), {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(data){
        if(!data || !data.version) return;
        if(loadedV !== data.version){
          params.set('v', data.version);
          location.replace(location.pathname + '?' + params.toString() + location.hash);
        }
      })
      .catch(function(){ /* offline or no version.json — just use the cached page */ });
  }catch(e){}
})();
</script>
<title>MOCKS CAMBRIDGE — Reading &amp; Use of English (A2 · B1 · B2 · C1)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Anti-translate: tells Chrome/Edge not to offer page translation -->
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="en">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
  :root{
    --bg:#f8fafc; --card:#ffffff; --accent:#4987c6; --accent2:#2d5a8d;
    --good:#16a34a; --bad:#ef4444; --text:#0f172a; --muted:#636465; --line:#e2e8f0;
    --soft:#d1d2ea;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Montserrat","Segoe UI",system-ui,sans-serif}
  body{background:linear-gradient(180deg,#d1d2ea 0%,#f8fafc 60%,#fff 100%);color:var(--text);min-height:100vh;padding:24px;line-height:1.55}
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:1.7rem;margin-bottom:4px}
  h2{font-size:1.25rem;margin:22px 0 10px;color:var(--accent2)}
  h3{font-size:1.05rem;margin:14px 0 8px}
  .sub{color:var(--muted);margin-bottom:22px}
  .card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  label{display:block;margin:12px 0 6px;font-weight:600}
  input,select,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:#ffffff;color:var(--text);font-size:1rem;font-family:inherit}
  /* Touch devices (iPad, tablets, phones, touchscreen laptops): make answer
     fields tap-responsive and fully editable so the on-screen keyboard opens. */
  input,select,textarea{touch-action:manipulation;-webkit-user-select:text;user-select:text;-webkit-tap-highlight-color:rgba(73,135,198,.18)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--soft)}
  textarea{min-height:90px;resize:vertical}
  button{cursor:pointer;border:none;border-radius:10px;padding:12px 20px;font-size:1rem;font-weight:600;background:var(--accent);color:#06283d;transition:transform .08s, opacity .15s}
  button:hover{transform:translateY(-1px)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  button.warn{background:#f59e0b;color:#1a1300}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:640px){.grid2,.grid4{grid-template-columns:1fr 1fr}}
  .tile{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:30px 16px;text-align:center;cursor:pointer;transition:.15s}
  .tile:hover{border-color:var(--accent);transform:translateY(-3px)}
  .tile .ico{font-size:3.2rem;display:block;margin-bottom:10px}
  .tile h3{font-size:1.2rem}
  .tile p{color:var(--muted);font-size:.85rem;margin-top:6px}
  .lvl{font-size:1.6rem;font-weight:800;color:var(--accent2)}
  .badge{display:inline-block;background:#f8fafc;border:1px solid var(--line);padding:4px 10px;border-radius:999px;font-size:.78rem;color:var(--muted)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
  .crumbs{color:var(--muted);font-size:.88rem}
  .passage{background:#f8fafc;border:1px solid var(--line);border-left:4px solid var(--accent);padding:16px;border-radius:8px;line-height:1.65;margin:8px 0 16px;white-space:pre-line;font-family:Georgia,"Times New Roman",serif;color:var(--text)}
  .notice{background:#fef3c7;border:1px dashed #f59e0b;color:#7c2d12;padding:10px 14px;border-radius:8px;margin-bottom:8px;font-style:italic}
  .player{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;margin:6px 0 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .player .lbl{flex:1;color:var(--muted);font-size:.9rem}
  .q{border-top:1px dashed var(--line);padding:14px 0;margin:0}
  .q:first-of-type{border-top:none}
  .q .stem{font-weight:600;margin-bottom:8px}
  .opt{display:block;padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin:6px 0;cursor:pointer}
  .opt:hover{border-color:var(--accent)}
  .opt input{width:auto;margin-right:10px}
  .gapinput{display:inline-block;width:130px;padding:4px 8px;margin:0 4px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--text)}
  .transrow{display:grid;grid-template-columns:1fr 110px 1fr;gap:8px;align-items:center;margin:10px 0}
  .transrow .kw{text-align:center;font-weight:700;color:var(--accent2);background:#f8fafc;border:1px solid var(--line);border-radius:6px;padding:6px}
  .bank{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:8px 0 14px}
  .bank ul{list-style:none;display:grid;grid-template-columns:1fr;gap:8px}
  .result-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b;gap:8px}
  .correct{color:var(--good)} .wrong{color:var(--bad)}
  .score{font-size:2.4rem;font-weight:800;text-align:center;margin:10px 0}
  a.link{color:var(--accent)}
  .official{background:#f8fafc;border:1px dashed #475569;border-radius:12px;padding:18px;margin-top:12px}
  .partbox{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;margin:14px 0}
  .partbox > .parthead{font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;font-size:.85rem}
  .miss{color:var(--muted);font-style:italic}
  /* Stimulus cards for Part 1 — mimic the look of the Cambridge sample PDFs */
  .stim{margin:4px 0 14px;max-width:460px}
  .stim-context{color:var(--muted);font-size:.92rem;margin:8px 0 6px;font-style:italic}
  .stim-cap{font-size:.72rem;letter-spacing:1px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase}
  /* Source rows with avatar (A2 Part 2 etc.) */
  .source-row{display:flex;gap:14px;background:#f8fafc;border-left:4px solid var(--accent);padding:14px;border-radius:8px;margin:8px 0;line-height:1.6;font-family:Georgia,"Times New Roman",serif;align-items:flex-start;white-space:pre-line}
  .source-row .avatar{flex:0 0 72px;width:72px;height:72px;border-radius:8px;overflow:hidden;border:2px solid var(--line);background:#fff}
  .source-row .avatar svg,.source-row .avatar img{display:block;width:100%;height:100%;object-fit:cover}
  /* Word-formation two-column layout: each row is a line of text; root word appears in the right column on the line containing the gap */
  .wordform-grid{display:grid;grid-template-columns:auto max-content;justify-content:start;gap:2px 14px;background:#f8fafc;border-left:4px solid var(--accent);padding:18px 22px;border-radius:8px;margin:8px 0;font-family:Georgia,"Times New Roman",serif;line-height:1.85;align-items:baseline}
  .wordform-grid > .wf-text{min-height:1.6em}
  .wordform-grid > .wf-root{text-align:left;font-weight:700;color:var(--accent2);font-family:"Montserrat","Segoe UI",sans-serif;letter-spacing:1.2px;font-size:.92rem;white-space:nowrap}
  .wordform-grid input.gap-inline{display:inline-block;width:150px;margin:0 4px;padding:2px 8px;border:none;border-bottom:1.5px dashed var(--muted);background:transparent;color:var(--text);font-family:inherit;font-size:1rem;text-align:center}
  .wordform-grid input.gap-inline:focus{outline:none;border-bottom-color:var(--accent)}
  @media(max-width:560px){.wordform-grid{grid-template-columns:auto max-content;gap:2px 10px}.wordform-grid input.gap-inline{width:110px}}
  /* Key-word transformation: stem, key word alone on its own line, then the second sentence with the inline gap */
  .transform-q{font-family:Georgia,"Times New Roman",serif;line-height:1.75}
  .transform-q > .stem{font-family:inherit;font-weight:400;margin-bottom:8px}
  .kw-line{font-weight:700;letter-spacing:1.5px;color:var(--accent2);margin:8px 0;padding-left:28px;font-family:"Montserrat","Segoe UI",sans-serif;font-size:1rem}
  .transform-second{padding-left:0}
  .transform-second input.gap-inline-wide{display:inline-block;width:240px;margin:0 6px;padding:4px 8px;border:none;border-bottom:1.5px dashed var(--muted);background:transparent;color:var(--text);font-family:inherit;font-size:1rem;text-align:center}
  .transform-second input.gap-inline-wide:focus{outline:none;border-bottom-color:var(--accent)}
  .transform-hint{font-family:"Montserrat","Segoe UI",sans-serif;font-size:.82rem;color:var(--muted);margin-top:8px}
  .source-row .source-body{flex:1;white-space:pre-line}
  .stim-sign{border:3px double #f1f5f9;background:#f8fafc;color:#f1f5f9;padding:20px 18px;text-align:center;font-weight:700;letter-spacing:.6px;font-family:Impact,"Arial Narrow",sans-serif;line-height:1.4;max-width:380px}
  .stim-sign .stim-cap{color:#94a3b8;text-align:center}
  .stim-notice{border:2px solid #cbd5e1;background:#f8fafc;color:#f1f5f9;padding:16px 18px;text-align:center;line-height:1.55;max-width:420px}
  .stim-notice .stim-cap{text-align:center;color:#94a3b8}
  .stim-phone{background:#0f172a;border:3px solid #cbd5e1;border-radius:24px;padding:14px;max-width:280px;position:relative}
  .stim-phone:before{content:"";display:block;width:46px;height:5px;background:#475569;border-radius:3px;margin:-4px auto 8px}
  .stim-phone .stim-cap{color:#cbd5e1;text-align:center;border-bottom:1px solid #475569;padding-bottom:6px;margin-bottom:8px;letter-spacing:.5px}
  .stim-phone .bubble{background:#1e3a8a;color:#fff;border-radius:14px;padding:10px 12px;line-height:1.4}
  .stim-note{background:#fde68a;color:#1a1300;padding:16px 18px;max-width:320px;box-shadow:3px 5px 12px rgba(0,0,0,.45);transform:rotate(-1.2deg);font-family:"Comic Sans MS","Segoe Script",cursive,sans-serif;line-height:1.5}
  .stim-note .stim-cap{color:#854d0e}
  .stim-email{background:#ffffff;color:#111;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;max-width:460px}
  .stim-email .hdr{background:#f1f5f9;padding:10px 12px;border-bottom:1px solid #cbd5e1;font-size:.88rem}
  .stim-email .hdr div{display:flex;gap:8px;margin:2px 0}
  .stim-email .hdr strong{min-width:64px;color:#475569;font-weight:600}
  .stim-email .body{padding:14px;line-height:1.55}
  /* Welcome / hero screen */
  .hero{background:var(--card);border-radius:18px;padding:36px 28px;text-align:center;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  .hero .hero-logo{display:block;margin:0 auto 10px;height:72px;width:auto}
  .hero .logo{font-size:3.4rem;line-height:1;margin-bottom:8px}
  .hero h1{font-size:2rem;margin-bottom:6px}
  .hero .qr{display:inline-block;background:#fff;padding:10px;border-radius:14px;margin:14px 0}
  .hero .qr img{display:block;width:200px;height:200px}
  .hero .qr-help{color:var(--muted);font-size:.88rem;max-width:340px;margin:6px auto 18px}
  .hero .opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:520px;margin:18px auto 0}
  @media(max-width:540px){.hero .opts{grid-template-columns:1fr}}
  /* Sticky exam timer */
  .timer-bar{position:sticky;top:0;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px;z-index:10;margin-bottom:14px}
  .timer-bar .label{color:var(--muted);font-size:.88rem}
  .timer{font-family:"Segoe UI Mono",Consolas,monospace;font-size:1.5rem;font-weight:800;color:var(--accent);background:#0f172a;border:2px solid var(--accent);border-radius:10px;padding:6px 16px;letter-spacing:3px;min-width:120px;text-align:center}
  .timer.warn{color:#f59e0b;border-color:#f59e0b}
  .timer.danger{color:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  /* Results redesign */
  .result-header{background:var(--card);border-radius:16px;padding:18px;margin-bottom:18px}
  .result-header .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.95rem}
  @media(max-width:520px){.result-header .grid{grid-template-columns:1fr}}
  .result-header .grid > div{padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid var(--line)}
  .result-header label{display:block;color:var(--muted);font-size:.72rem;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;font-weight:700}
  .score-card{background:var(--card);border-radius:18px;padding:32px 24px;text-align:center;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  .score-card .big{font-size:3.8rem;font-weight:800;line-height:1;letter-spacing:-1px}
  .score-card .pct{color:var(--muted);font-size:1.25rem;margin-top:2px}
  .score-card .cefr{display:inline-block;font-weight:800;padding:8px 22px;border-radius:999px;letter-spacing:2px;margin-top:14px;font-size:1.05rem}
  .score-card .cefr.good{background:var(--good);color:#062a14}
  .score-card .cefr.warn{background:#f59e0b;color:#1a1300}
  .score-card .cefr.bad{background:var(--bad);color:#2a0606}
  .score-card .verdict{margin-top:14px;color:var(--text);line-height:1.5;max-width:560px;margin-left:auto;margin-right:auto}
  .part-bar{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:10px 0;display:grid;grid-template-columns:1fr auto;gap:6px 14px;align-items:center}
  .part-bar .name{font-weight:700}
  .part-bar .meta{font-size:.82rem;color:var(--muted);margin-top:2px}
  .part-bar .pct-num{font-family:Consolas,monospace;font-weight:800;font-size:1.15rem}
  .part-bar .bar-wrap{grid-column:1/-1;background:#1e293b;border-radius:6px;overflow:hidden;height:8px;margin-top:6px}
  .part-bar .bar{height:100%;background:var(--accent);transition:width .6s}
  .part-bar.good .pct-num,.part-bar.good .name{color:var(--good)}
  .part-bar.good .bar{background:var(--good)}
  .part-bar.warn .pct-num,.part-bar.warn .name{color:#f59e0b}
  .part-bar.warn .bar{background:#f59e0b}
  .part-bar.bad .pct-num,.part-bar.bad .name{color:var(--bad)}
  .part-bar.bad .bar{background:var(--bad)}
  .chip{display:inline-block;background:#f8fafc;border:1px solid var(--line);padding:5px 12px;border-radius:999px;font-size:.85rem;margin:3px 4px 3px 0}
  .chip.good{border-color:var(--good);color:var(--good)}
  .chip.bad{border-color:var(--bad);color:var(--bad)}
  /* ============================================================
     INSPERA-STYLE EXAM RUNNER (light theme, single-part display
     with bottom Part navigation — mirrors the visual layout of the
     official Cambridge digital exam player).
  ============================================================ */
  .inspera-shell{position:fixed;inset:0;background:#f1f5f9;color:#0f172a;z-index:1000;font-family:"Montserrat","Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column}
  .inspera-shell *{box-sizing:border-box}
  .inspera-header{background:#fff;border-bottom:1px solid #cbd5e1;padding:12px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .inspera-header .brand{display:inline-flex;align-items:center;text-decoration:none}
  .inspera-header .brand img{display:block;height:36px;width:auto}
  .inspera-header .candidate{color:#64748b;font-size:.85rem}
  .inspera-header .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .inspera-header .timer{font-family:Consolas,"Segoe UI Mono",monospace;font-size:1.05rem;font-weight:800;color:#4987c6;background:#d1d2ea;padding:6px 14px;border-radius:8px;letter-spacing:2px;min-width:90px;text-align:center}
  .inspera-header .timer.warn{color:#b45309;background:#fef3c7}
  .inspera-header .timer.danger{color:#b91c1c;background:#fee2e2;animation:pulse 1s infinite}
  .inspera-header .timer.overtime{color:#ffffff;background:#dc2626;border-color:#b91c1c;animation:pulse 1.2s infinite}
  .inspera-header button{background:#fff;color:#475569;border:1px solid #cbd5e1;padding:6px 14px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer}
  .inspera-header button.finish-btn{background:#4987c6;color:#fff;border-color:#4987c6}
  .inspera-header button:hover{filter:brightness(0.97)}
  .inspera-main{flex:1;overflow-y:auto;padding:18px 22px 30px;width:100%}
  .inspera-main-inner{max-width:1000px;margin:0 auto}
  .inspera-title{margin:6px 0 10px}
  .inspera-title h1{font-size:1.35rem;margin:0;font-weight:700;color:#0f172a}
  .inspera-title p{color:#64748b;font-size:.9rem;margin:4px 0 0}
  .inspera-instruction{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:14px 18px;margin:14px 0}
  .inspera-instruction strong{display:block;color:#0f172a;font-size:1rem;margin-bottom:4px;font-weight:700}
  .inspera-instruction p{color:#475569;font-size:.92rem;margin:0;line-height:1.5}
  .inspera-content{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:24px 28px;font-family:Georgia,"Times New Roman",serif;line-height:1.85;color:#0f172a;font-size:1rem}
  /* Two-column layout: passage(s) on the left, questions on the right, each scrolls independently. */
  .inspera-content.two-col{padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden}
  .inspera-content.two-col > .col-left{padding:22px 24px;border-right:1px solid #e2e8f0;overflow-y:auto;max-height:calc(100vh - 290px)}
  .inspera-content.two-col > .col-right{padding:22px 24px;overflow-y:auto;max-height:calc(100vh - 290px);background:#fafafa}
  @media(max-width:780px){.inspera-content.two-col{display:block}.inspera-content.two-col > .col-left{border-right:none;border-bottom:1px solid #e2e8f0;max-height:none}.inspera-content.two-col > .col-right{max-height:none}}
  .inspera-content h3{font-family:"Montserrat","Segoe UI",sans-serif;font-size:1.18rem;margin:0 0 14px;font-weight:700;color:#0f172a}
  .inspera-content .passage{background:transparent;border:none;padding:0;border-radius:0;color:#0f172a;font-family:Georgia,"Times New Roman",serif;font-size:1rem;line-height:1.85;white-space:pre-line;margin:0 0 18px}
  .inspera-content .notice{background:#f8fafc;border:1px solid #e2e8f0;color:#475569;padding:10px 14px;border-radius:8px;font-style:italic;margin-bottom:12px;font-size:.92rem;font-family:"Montserrat","Segoe UI",sans-serif}
  .inspera-content .partbox{background:transparent;border:none;border-radius:0;padding:0;margin:0}
  .inspera-content .parthead{display:none}
  /* Writing parts: Cambridge two-column layout — task on the left, writing box on the right */
  .writing-task{color:#0f172a;font-size:var(--exam-fs,1rem);line-height:1.6}
  .writing-task p{margin:0 0 14px}
  .writing-task ul{margin:6px 0 14px 22px;padding:0}
  .writing-task li{margin:5px 0}
  textarea.writing-box{width:100%;min-height:360px;resize:vertical;padding:16px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#0f172a;font-family:inherit;font-size:1rem;line-height:1.6}
  textarea.writing-box:focus{outline:none;border-color:#4987c6;box-shadow:0 0 0 3px #d1d2ea}
  .writing-wrap{margin-top:4px}
  .word-count{text-align:right;font-size:.85rem;color:#64748b;margin-top:6px;font-family:"Montserrat","Segoe UI",sans-serif}
  /* Picture-story (Part 7): three drawings in a row above the writing box */
  .story-pics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:6px 0 18px}
  .story-pics figure{margin:0;border:1px solid #cbd5e1;border-radius:8px;background:#fff;overflow:hidden}
  .story-pics svg{display:block;width:100%;height:auto;background:#fff}
  .story-pics figcaption{font-size:.75rem;color:#94a3b8;text-align:center;padding:4px 0;font-family:"Montserrat","Segoe UI",sans-serif}

/* Timer machinery. Counts DOWN to zero, then keeps counting UP as
   overtime (+MM:SS in red) until the student presses Submit. The exam
   is never auto-submitted; the timer is informational. */
let timerInterval = null;
function startTimer(minutes, onExpire){
  stopTimer();
  let remaining = minutes * 60;
  let expiredFired = false;
  const el = document.getElementById('timer');
  function paint(){
    if(!el) return;
    const over = remaining < 0;
    const abs = Math.abs(remaining);
    const m = Math.floor(abs/60), s = abs%60;
    const txt = (over ? '+' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    el.textContent = txt;
    el.classList.toggle('warn', !over && remaining <= 5*60 && remaining > 60);
    el.classList.toggle('danger', !over && remaining <= 60 && remaining > 0);
    el.classList.toggle('overtime', over);
  }
  paint();
  timerInterval = setInterval(()=>{
    remaining--;
    paint();
    if(remaining === 0 && !expiredFired){
      expiredFired = true;
      if(typeof onExpire === 'function') onExpire();
    }
  }, 1000);
}
function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }

  C1:"C1 Advanced (Advanced)"
};
function interpret(level, pct){
  const name = LEVEL_NAMES[level] || level;
  if(pct >= 80) return {tier:'good', label:'Strong pass — '+level, text:'Strong performance at '+name+'. You are comfortably at this level and ready to begin practising at the next one.'};
  if(pct >= 60) return {tier:'good', label:'Pass — '+level, text:'Pass at '+name+' (Cambridge passing standard is approximately 60%). Solid performance — keep practising to consolidate.'};
  if(pct >= 40) return {tier:'warn', label:'Approaching '+level, text:'You are approaching '+name+'. Keep practising at this level — focus on the weakest parts below.'};
  return {tier:'bad', label:'Below '+level, text:'Below '+name+'. More practice is recommended at this level before attempting the official exam.'};
}

      { type:"mc", part:"Part 5", instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The strange comfort of bad weather

There is a particular kind of pleasure, which I suspect is more common than people admit, in being safely indoors while the weather outside is doing its worst. A storm against the window seems to push the walls of any room slightly closer, and a quiet pleasure — almost a kind of smugness — settles over those of us lucky enough to be inside. We did not invite the storm, of course; but once it has arrived, we are quite happy for it to stay.

Writers have noticed this feeling for centuries, even if they have rarely tried to give it a name. The English language has at least a hundred words for fine weather and a generous supply for terrible weather, but nothing precise for that quiet, contented mood of being warm and dry while everything outside is cold and wet. It is, perhaps, too small a feeling to deserve a single word.

What interests me is how unreliable this pleasure has become in the modern home. Storms used to be loud, and houses were thin; the contrast between inside and outside was unmistakable. Today, with well-sealed windows and central heating, even the most violent weather sounds like a polite cough on the other side of the glass. We have removed, almost by accident, the very thing that made the contrast pleasurable in the first place. The pleasure depends on hearing what we are escaping.

I have noticed, perhaps a little guiltily, that my own appreciation of bad weather grows stronger whenever I visit my parents, who still live in their old, drafty house. There, the storm is not background music; it is a performer that takes the room hostage for an hour or two. Tea tastes better. Books read more slowly. The conversation, once everyone has stopped complaining, becomes the kind of conversation that no one really has any more.

Perhaps this is why my visits there always end with a small reluctance to leave. It is not, I should be clear, the house I miss, which is in many ways uncomfortable and increasingly hard for my parents to heat. It is the rare experience of being unable to ignore the weather, and of having no good reason to try. A storm against the windows of my own modern flat is, by comparison, a faint memory of itself — present in principle, but mostly walled out, like a guest who has been allowed only as far as the doormat.`,

          {label:"A", name:"Ines", text:"I worked on an organic farm in the south of France. I went for one month and stayed for ten, which was completely unexpected. The physical work was harder than I had imagined; for the first three weeks every muscle hurt in the evening. The biggest surprise was how much I enjoyed cooking for the other volunteers — I had never cooked for more than two people before. By the end I felt healthier than I had in years, but I also realised that this kind of life suits me only in short doses. The owners of the farm, a couple in their seventies, were extremely kind but obviously exhausted by the year-round demands of the place, and the more time I spent with them the more clearly I could see that I would not, on a permanent basis, want either their tiredness or their freedom. I went home grateful for the experience and quietly relieved that it had been finite."},
          {label:"B", name:"Tariq", text:"I spent my year working in a community library in a small town very far from home. I had imagined long, quiet days behind a desk. Instead, the library was the busiest place in town, and the librarians treated me like a junior colleague from the first day. I made several mistakes — I once filed three months of newspapers in completely the wrong order — but no one ever made me feel foolish about them. I went home with the impression that I had finally been treated as an adult. Looking back, what surprised me most was not the work itself but the way decisions were made: I was actually asked, in real meetings, what I thought, and on at least two occasions the suggestion I made was the one the team eventually adopted. Nothing in my previous education had prepared me to expect that."},

      { type:"mc", part:"Part 5",
        instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The discreet authority of the chair

Few objects in a home work harder, or attract less notice, than the chair. We sit on them, drag them, lean back in them, and only rarely consider what they imply. Yet anthropologists have long argued that a society's chairs, more than its tables, reveal who is expected to speak and who is expected merely to listen.

Consider the office chair, that small bureaucratic throne. Its height can be adjusted, its back can be tilted, its arms folded discreetly out of the way. None of these features exists for the comfort of a visitor; the visitor's chair, you will notice, has no such options. A meeting between unequals begins long before anyone has spoken, and is half-decided by the time both parties sit down.

The history of the chair, viewed from this angle, becomes a quiet history of authority. In medieval halls, only the host was actually entitled to sit; everyone else stood or perched on benches. The arrival of the personal chair was, in effect, the arrival of personal status. To this day, the language of seating — taking the chair, vacating the chair, addressing the chair — preserves traces of this old idea, though most speakers have entirely forgotten it.

What complicates the picture is that the chair, having begun as a marker of difference, was eventually democratised. Mass production in the nineteenth century made the individual chair almost universal. One might think that this would have stripped the object of its symbolic charge, but the opposite has happened. The fact that everyone now has a chair only makes the slight differences between them — the unspoken hierarchy of leather and plastic, ergonomic and rigid, soft and hard — more, not less, meaningful. We have not abolished the throne; we have multiplied it, and made its grading harder to read.

This grading is most clearly visible in the workplace, where chairs continue to perform their old role with very little embarrassment. The executive chair, in any large company, is taller, deeper and more adjustable than the chair given to the junior employee, even when the two people will spend roughly the same number of hours sitting in them. Visitors, by contrast, are usually offered something low and rigid, on which the act of leaning back is physically awkward. None of these distinctions is ever explained, and indeed most of us would deny that we register them at all. They are nonetheless registered, and they quietly shape what we feel able to say.

Outside the office, the same logic operates in subtler ways. The dining-room chair at the head of the table is, almost always, slightly larger than the others. The armchair in the family room, the one positioned to give a clear view of both the television and the door, is occupied — sometimes silently, sometimes by long habit — by whoever, in the household, is treated as the senior figure. To say that this person has chosen the best chair is to invert the relationship. The chair, by repetition, has come to mean that person, and visitors who, without thinking, sit there are committing a small, mostly unconscious transgression. It is in such moments, easily missed and never named, that the chair quietly does its oldest work.`,

        sources:[
          {label:"A", text:"Opinion A. Handwriting, as a daily skill, is finished, and any energy spent defending it would be better spent improving how we teach typing. The argument that handwriting somehow helps memory has been wildly oversold; the few studies that suggest it tend to compare typing on distraction-filled laptops with handwriting in silent classrooms, which is hardly a fair contest. Children who grow up typing are, on average, capable of producing longer and more coherent pieces of writing than children of equivalent age twenty years ago. The nostalgia for handwriting is, in truth, a nostalgia for the classrooms in which most adults learned, rather than evidence of its lasting value. Until we are willing to compare typing taught well with handwriting taught well, the entire debate consists of unfair experiments dressed up as evidence."},
          {label:"B", text:"Opinion B. To insist that handwriting belongs to the past is to make exactly the kind of confident prediction that the history of technology has repeatedly mocked. We were told the radio would kill print, then television would kill radio, then the internet would kill television; in every case, the older medium survived and changed. Handwriting, similarly, will survive — but as a specialised skill, used for ceremonies, drafts, signatures and intimate notes. Its quiet authority in those situations actually grows as it becomes rarer. A handwritten condolence card in 2030 will carry, almost by virtue of its medium, a weight that no digital alternative can replicate, however thoughtful the words inside it happen to be."},
          {label:"C", text:"Opinion C. The interesting question is not whether handwriting is useful in adult life, but what it does to a child's developing brain. The act of forming a letter with a pen requires the brain to plan and execute a precise sequence of motor movements that typing simply does not demand. Recent imaging studies have suggested that the same brain regions involved in this physical activity are also recruited when children later try to recognise unfamiliar shapes and patterns. Whatever we decide about adult uses, removing handwriting from primary education is more risky than its critics acknowledge. The decision is, in effect, a wager about the developmental cost of an absence we cannot easily measure until the children in question are well into their twenties."},
          {label:"D", text:"Opinion D. Defenders of handwriting often appeal to memory, beauty and identity, but these are weak arguments dressed up as strong ones. The handwriting of most adults is, in fact, both unattractive and only intermittently legible. The reason we cling to it is not aesthetic but emotional: we remember writing as the place where, as small children, we first felt able to leave a personal mark on the world. That memory is precious, but it should not dictate the curriculum. Schools have only so many hours, and those hours must train children for the world that exists, not the one their teachers remember. The honest cost of an extra hour of handwriting each week is an hour subtracted from something else — coding, second-language practice, statistical reasoning — and the case for the subtraction has, in my view, simply not been made."}

          {label:"B", text:"Reviewer B. There is, no question, beautiful writing here, but the book as a whole suffers from a curious confusion of purpose. Is it a memoir, a polemic, or a quiet travelogue? Carter tries to do all three and, in trying, sacrifices the cumulative power that each would have on its own. The final political chapters, which other reviewers have found weak, struck me as the only sections in which her arguments achieved any real edge. The descriptive writing, which has been generally praised, is technically faultless and yet leaves curiously little behind. It is the kind of prose one admires while one is reading it and forgets, in detail, within an hour of putting the book down — an experience worth flagging because it has become, for me, the central limitation of an otherwise very gifted writer."},

      passage:
`Why writing improves thinking

There is a peculiar relationship between writing things down and being able to think clearly about them. Many people have noticed it without quite knowing what to do about it: a problem that feels insoluble while you turn it over in your head suddenly becomes manageable once you try to put it on paper. Some psychologists go further. They argue that, for many kinds of complex thought, writing is not merely a record of thinking but the thinking itself. When you write a sentence, you are forced to choose between several possible phrasings, and the act of choosing requires that you commit, however briefly, to one specific version of an idea. Speaking aloud, by contrast, leaves the idea half-formed, ready to be revised the moment a friend looks confused.

This view is not particularly new. Roman teachers, two thousand years ago, were already telling their students that one should "have a slate" for any serious problem. What is new is the experimental evidence. When students are asked to read an article and then either tell someone about it or write a paragraph about it, those who write tend to retain the content significantly longer. The effect is robust even when the writing is done quickly and is not particularly polished.

There is, however, a complication. The thinking benefits of writing are blunted, and may even be reversed, when the writing is done in conversation with a screen that produces instant suggestions. Several studies have found that students using grammar and style assistants produce smoother paragraphs but remember significantly less of what they wrote. The act of struggling with one's own words, it appears, is part of the point. Tidy assistance, however well-intentioned, lets us off the cognitive hook.

The practical lesson is not to avoid screens, which would be unrealistic, but to choose more carefully when to invite them in. There is a place for assistance — at the polishing stage of a piece. There is also, however, a stage, much earlier, when no help is the best help. Many writing teachers now ask their students to spend the first ten minutes of any assignment writing by hand or with the assistant switched off. The complaints are initially loud. The results, on the page and in later tests of memory, are surprisingly consistent.

There is, finally, a cultural dimension that the laboratory studies cannot quite capture. In communities where note-taking by hand is treated as a daily habit rather than an emergency activity at exam time, students appear to read more slowly, return to old notes more often, and report feeling less dependent on online searches for information they have, in some sense, already met. Whether the slowness of the hand causes the slowness of the reading, or the reading culture causes both, is hard to disentangle. What is clear is that, at least for those who can manage it, the patience of the pen and the patience of the careful reader tend to travel together.`,

        {label:"A", name:"Lena", text:"I spent my year volunteering at a children's hospital, in a country where I didn't speak the language at first. The first month was honestly very hard — homesick, frustrated, often crying after my shifts. By the third month something had shifted; the language was coming, the work was less frightening, and I was no longer counting the days. I came home with a clearer sense of what kind of work I wanted to do, although it was not the kind I had originally imagined. By the time I left, I had also developed a strong preference for a particular field — paediatric psychology rather than medicine, which had been my original assumption. The decision was not made by reflection so much as by repetition: after watching, week after week, how the same few staff members managed to calm frightened children using nothing but patience and timing, I realised that what I admired most was a skill, not a profession, and that the skill had a name I had simply not encountered in school."},
        {label:"B", name:"Cameron", text:"Mine was less dramatic. I stayed at home and worked two part-time jobs — a café and a bookshop — and read all the books I had pretended to read in school. The work itself was not particularly interesting, but the year gave me space to make a few decisions calmly. By the end I had changed my mind completely about what to study; my original choice had been my parents' choice, not mine. The bookshop, in particular, was useful in a way I had not anticipated. When you spend forty hours a week recommending novels to other people, you discover, fairly quickly, which kinds of book you can talk about with conviction and which you cannot, and that distinction turned out to be a more reliable guide to my interests than any school subject had ever been. By December I had quietly written to the university and changed my course."},
        {label:"C", name:"Tessa", text:"I had imagined a year of travel. In fact, I spent eight months living in one small Spanish town, doing very little. I taught a few English classes to children of family friends, took long walks, and read. The slowness was uncomfortable for the first two months because I felt I should be doing something. After that, the slowness became the point. I returned faster, in a way, by having gone slower. What helped, I think, was that nobody in the town had any expectation of me. I was, in everyone's quiet judgement, a young foreigner waiting for her real life to begin, and that low expectation was unexpectedly liberating. I read books I would never have finished at home, learned to cook three dishes properly, and ended my year noticeably less anxious than I had begun it — though I would have struggled, at the time, to explain to my parents what exactly I had been doing."},
        {label:"D", name:"Marcus", text:"I worked full-time on a construction site for the first time in my life. My hands ached every evening for six weeks. What surprised me was how much I respected the people I worked with — many of them with less formal education than my school friends, and most of them sharper, in a practical sense, than anyone I had known. The experience made it impossible for me, later, to talk about manual work the way other students sometimes did. One evening, after a particularly long day pouring concrete, an older colleague who had left school at fourteen explained to me, on the back of an envelope, why a supervisor's instruction earlier that day had been quietly nonsensical. The reasoning was so clear that I was honestly embarrassed not to have noticed it myself. I came home from that conversation with the feeling that the kind of intelligence I had been trained to recognise was only one variety, and probably not the most useful one."}

    { type:"mc", part:"Part 5",

      passage:
`The slow art of attention

Even those of us who congratulate ourselves on having survived the era of constant interruption have, on close inspection, internalised many of its habits. A book that requires more than ninety minutes of continuous reading now strikes most adults as an unusual demand on their week, rather than the default condition of a serious novel. The change happened quietly, without anyone deciding it explicitly, and it has produced a small but persistent unhappiness in readers who suspect they are no longer fully present to the books they admire.

What is curious is how recently this state of affairs would have struck readers as strange. As late as the 1990s, most adult novels assumed an audience capable of sitting still for four or five hours at a stretch, and most readers obliged without complaint. The decline in this capacity is not, despite popular accounts, simply the fault of the smartphone. Several scholars have argued, persuasively, that the smartphone merely accelerated a habit that had been forming for a generation: the habit of treating one's own attention as a renewable resource, infinitely available, requiring no special care.

This view has uncomfortable implications. If attention is, instead, more like physical fitness — a capacity that erodes without exercise and only slowly rebuilds with effort — then the small daily concessions are not without consequence. The five minutes spent scrolling between paragraphs is not, as we sometimes flatter ourselves, a harmless break from concentration; it is concentration practising the opposite of itself. Each repetition makes the next sustained hour fractionally harder, in the way that a small daily skipped exercise eventually shows in a noticeable loss of strength.

The good news is that the recovery, while slow, does occur. Several reading clubs have begun to experiment with what they call \"long-form Sundays\", in which members commit to one continuous reading session of three hours, leaving the phone in another room. The early reports are consistent: the first two sessions are described as faintly painful, the third as oddly satisfying, and from the fourth onwards as something close to indispensable. Attention, in short, can be retrained. What is harder to retrain is the cultural expectation that the retraining is worth doing at all.

Curiously, the experience reported by long-form Sunday participants mirrors a pattern long familiar to athletes. The pain of a first run is not, in itself, a sign of failure; it is the body registering an unfamiliar demand. The athlete who treats that first pain as proof of permanent unfitness will never run again. The reader who treats the first uncomfortable hour with a book as proof that books no longer suit her will, similarly, never return to them. Some part of the recovery, in both cases, is psychological: a willingness to remain in the room long enough for the unease to pass.

There is also a quieter question worth asking, one that sits uncomfortably with the optimism of the reading clubs. The capacity to attend for long stretches was, historically, supported by a great deal of social architecture: the silent reading room, the unhurried morning train, the friend who would not interrupt by message. Much of this architecture has been quietly dismantled, and the dismantling is not entirely under the individual reader's control. Asking the modern reader to rebuild her attention through sheer willpower, while every public space around her conspires against the effort, is not unlike asking a person to grow vegetables in a desert. It can be done; but it should not be assumed to be easy, and the people who succeed are not necessarily more disciplined — they may simply have rebuilt, around themselves, the conditions that the rest of us still mostly lack.`,

        {label:"A", text:"Most arguments against phones in schools rely on a sentimental image of the lesson before phones existed, in which students supposedly attended raptly to their teachers. Anyone who actually attended such a lesson knows it is largely a myth. Phones have not introduced distraction; they have merely changed its form. What has genuinely changed is the lever of communication between teachers and students, which is no longer entirely mediated by the school itself. Whether this is a loss depends on one's view of how much control schools should exert in the first place. My own view is that the loss is real, but mostly for the institution; for the student, the same lever has quietly become a route around teachers who were never very good at their job."},
        {label:"B", text:"We have, I think, talked ourselves into a debate of unreal extremes. The interesting question is not whether phones are good or bad — they clearly do both — but at what age and in what specific contexts. Banning phones from a primary school playground is almost certainly wise; banning them from an upper-school physics lesson, where students may need to look something up, is almost certainly daft. The current swing against phones, however well-intentioned, will eventually be remembered as a period of moral panic that prevented us from making the more useful distinctions. The policies most likely to last, in my view, will be those that survive a careful audit by an unsentimental sixteen-year-old."},
        {label:"C", text:"The evidence on smartphones in classrooms is, by now, fairly clear, and it points in one direction: pupils learn less, sleep less, and report being less happy in schools that permit them than in schools that do not. None of this is particularly surprising. The instinct to look at the device is engineered, by talented people in distant offices, to be almost irresistible, and pretending that a teenager's frontal lobe can outcompete the engineering of a multi-billion-dollar industry is naive. The kindest thing any school can do for its students is to remove the temptation entirely during school hours. The schools I have personally visited that have done so report an atmosphere in the corridors which their own staff describe, with audible surprise, as 'almost noisy again'."},
        {label:"D", text:"It is striking how often the phones-in-school debate is conducted by adults who themselves spend the working day attached to a screen. The disconnect between the rules we propose for children and the lives we ourselves lead is one of the few aspects of this debate I find genuinely embarrassing. Until adults can model a healthy relationship to their own devices, I doubt that any policy aimed at children will produce more than short-term compliance. The most honest school policy I have come across simply asked all staff, parents included, to leave their devices in a tray for the duration of any visit to the classroom — and reported, as one would expect, much less enthusiasm for the policy among the adults than among the children themselves."}

`The slow vindication of the amateur

For most of the twentieth century, the word \"amateur\" carried a faint apology with it. To call someone an amateur historian or an amateur ornithologist was, in many circles, to imply that they were operating outside the legitimate machinery of professional knowledge. (41)____

In recent years, however, the picture has begun to look considerably more interesting. Several large astronomical discoveries of the last decade — including two comets and an unusually well-preserved supernova — were first identified by amateurs operating modest equipment from suburban gardens. (42)____

The pattern is not confined to astronomy. Citizen-science platforms in ecology now routinely produce datasets of a size that no academic budget could realistically generate; one large platform processes more weekly observations of wildlife in private gardens than the corresponding professional surveys carried out in an entire year. (43)____

The reasons for this shift are partly technological — a good telescope is cheaper, in real terms, than it was thirty years ago — but they are also cultural. The amateur of the 2020s is, statistically, more likely to be retired than employed, with significantly more discretionary time than the salaried specialist who supposedly outranks her. (44)____

It would be naive, however, to suggest that the boundary between amateur and professional has simply disappeared. (45)____ The most interesting development is not the abolition of the distinction but the slow reconfiguration of what each side respects in the other.

There are also limits worth being honest about. The amateur, however well-equipped, rarely has the time or the technical training required for the long, unrewarding work of replicating a difficult experiment or producing a careful literature review. (46)____ What the amateur excels at — and what no academic system has yet replicated — is the persistent, patient observation of one specific place across many years.`,

      passage:`Every day, from the moment we wake up, we make decisions. We choose what to eat, what to wear, how to respond to messages and how to prioritise our time. While these choices may seem trivial individually, researchers have found that the sheer volume of decisions we make has a measurable effect on the quality of our thinking — a phenomenon known as decision fatigue.

      passage:`We live in an era of unprecedented access to information, yet surveys consistently suggest that public trust in expert knowledge is declining. This is one of the defining paradoxes of contemporary intellectual life. The democratisation of information has, in a sense, levelled the epistemological playing field — anyone with a smartphone can now access the same journal articles as a university researcher. The effect, however, has not been greater public deference to expertise but rather a diffuse and sometimes deeply felt scepticism about it.

/* ============================================================
   ANTI-CHEAT — flat functions (no object / no 'this' binding).
   acStart() is always safe to call multiple times — it fully
   resets itself before attaching new listeners, so stale state
   from a previous exam never blocks a new one.

   Detection strategy:
   • visibilitychange ONLY — fires when the tab is hidden (switched,
     minimised, or another app covers the window). This is the only
     reliable signal that doesn't produce false positives.
     NOTE: window.blur is intentionally NOT used because native
     browser dialogs (confirm/alert) steal focus and fire blur without
     the tab actually being hidden, causing false positives every time
     a student clicks Submit or Quit.
============================================================ */
/* Touch devices only: when a field gains focus, the on-screen keyboard opens —
   scroll the field into view so it is not hidden behind the keyboard. */
(function(){
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouch) return;
  document.addEventListener('focusin', function(e){
    const t = e.target;
    if(t && /^(TEXTAREA|INPUT)$/.test(t.tagName) && t.type !== 'radio' && t.type !== 'checkbox' && t.type !== 'hidden'){
      setTimeout(function(){ try{ t.scrollIntoView({block:'center', behavior:'smooth'}); }catch(_){} }, 300);
    }
  });
})();

let _AC_on = false;
let _AC_n  = 0;    // cumulative tab/window-switch counter

function acStart(){
  acStop();                  // always tear down any previous session first
  _AC_on = true;
  _AC_n  = 0;
  state._tabSwitches = 0;

  /* Translate-blocking: add notranslate class to the live exam shell */
  const sh = document.querySelector('.inspera-shell');
  if(sh){ sh.setAttribute('translate','no'); sh.classList.add('notranslate'); }

  /* Register listeners (capture phase so nothing in the page can stop them) */
  document.addEventListener('visibilitychange', _acOnVis,  true);
  window.addEventListener  ('beforeunload',     _acOnLeave);
  document.addEventListener('contextmenu',      _acOnMenu, true);
}

function acStop(){
  _AC_on = false;
  document.removeEventListener('visibilitychange', _acOnVis,  true);
  window.removeEventListener  ('beforeunload',     _acOnLeave);
  document.removeEventListener('contextmenu',      _acOnMenu, true);
  const ov = document.getElementById('acOverlay');
  if(ov) ov.remove();
  const sh = document.querySelector('.inspera-shell');
  if(sh) sh.classList.remove('notranslate');
}

/* ① visibilitychange — fires only when the tab is truly hidden */
function _acOnVis(){
  if(!_AC_on) return;
  if(document.hidden){
    _AC_n++;
    state._tabSwitches = _AC_n;
    _acShowWarn();
  }
}

/* ② page-leave warning */
function _acOnLeave(e){ e.preventDefault(); e.returnValue = ''; }

/* ③ disable right-click on reading text (removes "Translate to…" menu).
   Answer fields are exempt so the on-screen keyboard's select/paste callout
   works normally on tablets and phones. */

  const btn = document.querySelector('.tool-btn[data-tool="highlight"]');

document.addEventListener('mouseup', function(e){
  if(!document.body.classList.contains('highlight-mode')) return;
  // Ignore clicks on form controls
  if(e.target.closest('input,select,textarea,button')) return;
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const startEl = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
  const passage = startEl && startEl.closest && startEl.closest('.passage, .source-row');
  if(!passage) return;
  const mark = document.createElement('mark');
  mark.className = 'user-highlight';
  try {
    range.surroundContents(mark);
  } catch(err){
    try {
      const frag = range.extractContents();
      mark.appendChild(frag);
      range.insertNode(mark);
    } catch(e2){ /* skip if cannot wrap */ }
  }
  sel.removeAllRanges();
});
document.addEventListener('click', function(e){
  // Clicking on a highlight always removes it — highlight mode does not need to be on.
  if(e.target && e.target.classList && e.target.classList.contains('user-highlight')){
    const node = e.target;
    const parent = node.parentNode;
    while(node.firstChild) parent.insertBefore(node.firstChild, node);
    parent.removeChild(node);
    parent.normalize(); // merge adjacent text nodes left by the removal
  }
});

/* Popup for inline cloze pills (Inspera-style): click the numbered button
   to reveal the multiple-choice options as a horizontal menu. */
window._showGap = function(btn, qidStr){
  document.querySelectorAll('.gap-popup').forEach(p=>p.remove());
  let options;
  try { options = JSON.parse(btn.dataset.options); }
  catch(e){ options = []; }
  const popup = document.createElement('div');
  popup.className = 'gap-popup';
  const closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'close-x';
  closeBtn.textContent = '✕';
  closeBtn.onclick = ()=> popup.remove();
  popup.appendChild(closeBtn);
  options.forEach((opt,j)=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = opt;
    b.onclick = (ev)=>{
      ev.stopPropagation();
      const inp = document.querySelector('input[name="'+qidStr+'"]');
      if(inp){
        inp.value = j;
        inp.dispatchEvent(new Event('change', {bubbles:true}));
      }
      btn.textContent = opt;
      btn.classList.add('answered');
      popup.remove();
    };
    popup.appendChild(b);
  });
  document.body.appendChild(popup);
  const rect = btn.getBoundingClientRect();
  // Initial position then clamp inside viewport
  let left = rect.left;
  let top = rect.bottom + 6;
  const popupRect = popup.getBoundingClientRect();
  if(left + popupRect.width > window.innerWidth - 10) left = Math.max(10, window.innerWidth - popupRect.width - 10);
  if(top + popupRect.height > window.innerHeight - 10) top = Math.max(10, rect.top - popupRect.height - 6);
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  setTimeout(()=>{
    function onOutside(e){
      if(!popup.contains(e.target) && e.target !== btn){
        popup.remove();
        document.removeEventListener('mousedown', onOutside);
      }
    }
    document.addEventListener('mousedown', onOutside);
  }, 0);
};

// Format a writing task (Cambridge style): lead text, then a bullet list for
// "Say:" / "In your email:" items, then any trailing "Write N words" line.
function formatWritingTask(t){
  if(!t) return '';
  t = String(t).trim();
  const lead = t.match(/\b(Say|In your (?:email|message)|Tell (?:him|her|them)|Ask)\s*:/i);
  if(lead){
    const cut = lead.index + lead[0].length;
    const before = t.slice(0, cut).trim();
    let rest = t.slice(cut).trim();
    let tail = '';
    const tm = rest.match(/(?:^|[.\n])\s*(Write[^.]*words?[^.]*\.?)\s*$/i);
    if(tm){ tail = tm[1].trim(); rest = rest.slice(0, tm.index).trim(); }
    const items = (rest.includes(' / ') ? rest.split(' / ') : rest.split(/\s*,\s*/))
      .map(s=>s.replace(/\.$/,'').trim()).filter(Boolean);
    let html = `<p>${before}</p>`;
    if(items.length) html += `<ul>${items.map(it=>`<li>${it}</li>`).join('')}</ul>`;
    if(tail) html += `<p>${tail}</p>`;
    return html;
  }
  return t.split(/\n+/).map(line=>`<p>${line.trim()}</p>`).join('');
}

}

function renderStoryPics(key){
  const set = STORY_PICS[key];
  if(!set) return '';
  return `<div class="story-pics">${set.map((svg,i)=>`<figure>${svg}<figcaption>${i+1}</figcaption></figure>`).join('')}</div>`;
}
function renderStim(q){
  if(!q || !q.kind) return '';
  const ctx = q.header ? `<div class="stim-context">${q.header}:</div>` : '';
  const txt = (q.text||'').replace(/\n/g,'<br>');
  if(q.kind === 'sign')    return `${ctx}<div class="stim stim-sign">${txt}</div>`;
  if(q.kind === 'notice')  return `${ctx}<div class="stim stim-notice">${txt}</div>`;
  if(q.kind === 'message') return `${ctx}<div class="stim stim-phone"><div class="bubble">${txt}</div></div>`;
  if(q.kind === 'note')    return `${ctx}<div class="stim stim-note">${txt}</div>`;
  if(q.kind === 'email')   return `<div class="stim stim-email">
      <div class="hdr">
        <div><strong>From:</strong> ${q.from||''}</div>
        <div><strong>To:</strong> ${q.to||''}</div>
        <div><strong>Subject:</strong> ${q.subject||''}</div>
      </div>
      <div class="body">${(q.body||'').replace(/\n/g,'<br>')}</div>
    </div>`;
  return '';
}

function renderPart(p, idx, startNum, twoCol, paged){
  const head = `<div class="parthead">${p.part}</div>`;
  // Instructions are shown once in the .inspera-instruction subheading, so we
  // intentionally do NOT repeat them inside the exercise box.
  const instr = '';
  let body = '';

  if(p.type === 'mc'){
    let left = '', right = '';
    if(Array.isArray(p.scripts)){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.scripts.join(' '))})">&#9658; Play all</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
      p.scripts.forEach((s,i)=>{
        left += `<div class="row" style="margin:6px 0">
          <button class="ghost" onclick="speak(${escAttr(s)})">&#9658; Play recording ${startNum+i}</button>
        </div>`;
      });
    } else if(p.script){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }
    if(p.passage){ left += `<div class="passage">${p.passage}</div>`; }

    p.questions.forEach((q,i)=>{
      const num = startNum + i;
      const cls = paged ? `q paged-q${i===0?' show':''}` : 'q';
      const dl = paged ? ` data-local="${i}"` : '';
      right += `<div class="${cls}"${dl}>${renderStim(q)}<div class="stem">${num}. ${q.stem}</div>`;
      q.options.forEach((o,j)=>{
        right += `<label class="opt"><input type="radio" name="${qid(idx,i)}" value="${j}"> ${String.fromCharCode(65+j)}) ${o}</label>`;
      });
      right += `</div>`;
    });
    if(twoCol && (p.passage || left)){
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    body = left + right;
  }

  else if(p.type === 'match'){
    let left = '', right = '';
    // Gapped-text detection: passage contains numbered (N)____ markers
    const isGappedText = p.passage && /\(\d+\)____/.test(p.passage);
    // When the part lists named people/sources, the dropdown shows their NAMES
    // (the value stays the letter, so scoring is unchanged), and the redundant
    // "Options" box at the top is omitted — the names already label each source.
    const hasSources = p.sources && p.sources.length;
    const opts = (p.bank ? p.bank.labels : []).map((l,i)=>{
      const display = hasSources ? (p.bank.texts[i] || l) : l;
      return `<option value="${l}">${display}</option>`;
    }).join('');

    if(p.script){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }

    if(isGappedText){
      // Embed inline dropdowns in the passage at each (N)____ marker
      let passageHtml = p.passage;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const qidStr = qid(idx,i);
        const sel = `<select class="gapped-select" name="${qidStr}" onchange="this.classList.toggle('answered', !!this.value); if(window._updateProgress) window._updateProgress();"><option value="">${num}</option>${opts}</select>`;
        passageHtml = passageHtml.split(placeholder).join(sel);
      });
      left += `<div class="passage">${passageHtml}</div>`;
    } else {
      if(p.passage){ left += `<div class="passage">${p.passage}</div>`; }
      if(p.sources && p.sources.length){
        p.sources.forEach(s=>{
          if(s.avatar){
            left += `<div class="source-row"><div class="avatar">${s.avatar}</div><div class="source-body"><strong>${s.label}${s.name?(' — '+s.name):''}</strong>\n${s.text}</div></div>`;
          } else {
            left += `<div class="passage"><strong>${s.label}${s.name?(' — '+s.name):''}</strong>\n${s.text}</div>`;
          }
        });
      }
    }

    // Show the "Options" bank box only when there are no named sources
    // (e.g. the gapped-text sentence bank). For people-matching it is redundant.
    if(p.bank && !hasSources){
      right += `<div class="bank"><strong>Options:</strong><ul>`;
      p.bank.labels.forEach((l,i)=>{
        right += `<li><strong>${l}</strong> — ${p.bank.texts[i]}</li>`;
      });
      right += `</ul></div>`;
    }

    // For non-gapped match parts, render separate numbered dropdowns
    if(!isGappedText){
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        right += `<div class="q"><div class="stem">${num}. ${q.stem||''}</div>
          <select name="${qid(idx,i)}"><option value="">— choose —</option>${opts}</select>
        </div>`;
      });
    }

    if(twoCol){
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    body = left + right;
  }

  else if(p.type === 'clozeMC' || p.type === 'clozeOpen' || p.type === 'wordform'){
    if(p.title){ body += `<h3>${p.title}</h3>`; }
    if(p.script){
      body += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }
    // Inspera-style inline cloze: small numbered pill that opens a popup of options.
    if(p.type === 'clozeMC' && p.body){
      let bodyHtml = p.body;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const qidStr = qid(idx,i);
        const optsJson = JSON.stringify(q.options).replace(/"/g,'&quot;');
        const btn = `<button type="button" class="gap-pill" data-options="${optsJson}" data-num="${num}" onclick="window._showGap(this, '${qidStr}')">${num}</button><input type="hidden" name="${qidStr}" value="">`;
        bodyHtml = bodyHtml.split(placeholder).join(btn);
      });
      body += `<div class="passage">${bodyHtml}</div>`;
      return `<div class="partbox">${head}${instr}${body}</div>`;
    }
    // Inspera-style inline open cloze: text inputs embedded in the text
    if(p.type === 'clozeOpen' && p.body){
      let bodyHtml = p.body;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const inp = `<input class="cloze-input" type="text" name="${qid(idx,i)}" autocomplete="off" oninput="if(window._updateProgress) window._updateProgress();">`;
        bodyHtml = bodyHtml.split(placeholder).join('('+num+') '+inp);
      });
      body += `<div class="passage">${bodyHtml}</div>`;
      return `<div class="partbox">${head}${instr}${body}</div>`;
    }
    if(p.type === 'wordform' && p.rows){
      // Two-column layout, one line per grid row. The root word appears in the
      // right column on the same line that contains the gap.
      body += `<div class="wordform-grid">`;
      let qi = 0;
      p.rows.forEach(row=>{
        const txt = row.text || '';
        const hasGap = txt.includes('____');
        if(hasGap){
          const replaced = txt.replace('____', `<input class="gap-inline" type="text" name="${qid(idx,qi)}" autocomplete="off">`);
          body += `<div class="wf-text">${replaced}</div><div class="wf-root">${row.root||''}</div>`;
          qi++;
        } else {
          body += `<div class="wf-text">${txt || '&nbsp;'}</div><div></div>`;
        }
      });
      body += `</div>`;
    } else {
      if(p.body){ body += `<div class="passage">${p.body}</div>`; }
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        if(p.type==='clozeMC'){
          body += `<div class="q"><div class="stem">${num}.</div>`;
          q.options.forEach((o,j)=>{
            body += `<label class="opt"><input type="radio" name="${qid(idx,i)}" value="${j}"> ${String.fromCharCode(65+j)}) ${o}</label>`;
          });
          body += `</div>`;
        } else if(p.type==='clozeOpen'){
          body += `<div class="q"><div class="stem">${num}.</div>
            <input class="gapinput" type="text" name="${qid(idx,i)}" autocomplete="off"></div>`;
        } else { // wordform fallback (old body format)
          body += `<div class="q"><div class="stem">${num}. &nbsp; Root: <strong>${q.root}</strong></div>
            <input class="gapinput" type="text" name="${qid(idx,i)}" autocomplete="off"></div>`;
        }
      });
    }
  }

  else if(p.type === 'transform'){
    // Shown one question at a time (Cambridge key-word transformation behaviour)
    // Word range matches the level: C1 uses 3–6 words, B2 uses 2–5.
    const wr = /three and six/i.test(p.instructions||'') ? '3–6' : '2–5';
    body += `<div class="paged-counter"></div>`;
    p.questions.forEach((q,i)=>{
      const num = startNum + i;
      const parts = q.after.split('___');
      const before = parts[0] || '';
      const after  = parts[1] || '';
      body += `<div class="q transform-q paged-q${i===0?' show':''}" data-local="${i}">
        <div class="stem">${num}. ${q.before}</div>
        <div class="kw-line">${q.keyword}</div>
        <div class="transform-second">${before}<input class="gap-inline-wide" type="text" name="${qid(idx,i)}" placeholder="${wr} words" autocomplete="off">${after}</div>
        <div class="transform-hint">Write ${wr} words, including the key word.</div>
      </div>`;
    });
  }

  else if(p.type === 'writing'){
    const box = (i)=>`<div class="writing-wrap"><textarea class="writing-box" name="${qid(idx,i)}" placeholder="Write your answer here." oninput="wcUpdate(this)"></textarea><div class="word-count">Words: 0</div></div>`;
    if(p.pictures){
      // Picture-story (Part 7): full width — drawings on top, big box below.
      let bodyW = renderStoryPics(p.pictures);
      p.prompts.forEach((pr,i)=>{
        bodyW += box(i);
      });
      return `<div class="partbox">${bodyW}</div>`;
    }
    if(writingHasBullets(p)){
      // Email task: two columns — task on the left, writing box on the right.
      let left = '', right = '';
      p.prompts.forEach((pr,i)=>{
        left += `<div class="writing-task">${formatWritingTask(writingTaskOf(p, pr))}</div>`;
        right += box(i);
      });
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    // Plain story/essay task with no pictures: full width, task on top, box below.
    let bodyW = '';
    p.prompts.forEach((pr,i)=>{
      bodyW += `<div class="writing-task">${formatWritingTask(writingTaskOf(p, pr))}</div>` + box(i);
    });
    return `<div class="partbox">${bodyW}</div>`;
  }

  return `<div class="partbox">${head}${instr}${body}</div>`;
}

/* ---------------- Writing rubric (offline auto-assessment) ----------------
   Cambridge-style subscales (Content, Organisation, Language), each 0–5.
   This is an automatic estimate based on measurable signals (coverage of the
   required points, length, sentence/linking structure, vocabulary range and
   basic accuracy). It is meant as instant feedback, not a substitute for a
   teacher's judgement. */
function getWritingBullets(p){
  const t = writingTaskOf(p);
  const lead = t.match(/\b(Say|In your (?:email|message)|Tell (?:him|her|them)|Ask)\s*:/i);
  if(!lead) return [];
  let rest = t.slice(lead.index + lead[0].length).trim();
  const tm = rest.match(/(?:^|[.\n])\s*(Write[^.]*words?[^.]*\.?)\s*$/i);
  if(tm) rest = rest.slice(0, tm.index).trim();
  return (rest.includes(' / ') ? rest.split(' / ') : rest.split(/\s*,\s*/))
    .map(s=>s.replace(/\.$/,'').trim()).filter(Boolean);
}
function scoreWriting(opts){
  const text = (opts.text||'').trim();
  const minWords = opts.minWords || 25;
  const isEmail = !!opts.isEmail;
  const bullets = opts.bulletItems || [];
  if(!text){
    return {band:0, max:5, wordCount:0, criteria:[
      {name:'Content', score:0, max:5, note:'No answer was written.'},
      {name:'Organisation', score:0, max:5, note:'—'},
      {name:'Language', score:0, max:5, note:'—'}
    ], feedback:'No response was written, so this task scores zero. Remember to attempt every part of the exam.'};
  }
  const words = text.split(/\s+/).filter(Boolean);
  const wc = words.length;
  const sentences = Math.max(1, (text.match(/[.!?]+/g)||[]).length);
  const lower = words.map(w=>w.toLowerCase().replace(/[^a-z']/g,'')).filter(Boolean);
  const variety = wc ? new Set(lower).size / wc : 0;
  const connList = ['and','then','but','because','so','after','before','when','while','first','next','finally','also','however','although','that','which'];
  const conns = connList.filter(c=>lower.includes(c)).length;

  // Content
  let content, contentNote;
  if(isEmail && bullets.length){
    let covered = 0;
    bullets.forEach(it=>{
      const keys = it.toLowerCase().split(/\s+/).filter(w=>w.length>3);
      if(keys.some(k=>text.toLowerCase().includes(k))) covered++;
    });
    content = Math.max(1, Math.round((covered/bullets.length)*5));
    contentNote = `Addressed about ${covered} of ${bullets.length} required content points.`;
  } else {
    const lengthOK = wc >= minWords;
    content = lengthOK ? (sentences>=3?5:4) : (wc >= minWords*0.6 ? 3 : 2);
    contentNote = lengthOK ? 'Develops a complete short text on the task.' : 'Shorter than expected — develop the ideas further.';
  }
  // Organisation
  let organisation = 2;
  if(sentences>=2) organisation++;
  if(conns>=1) organisation++;
  if(sentences>=3 && conns>=2) organisation = 5;
  organisation = Math.min(5, organisation);
  // Language
  let language = 2;
  if(wc>=minWords) language++;
  if(variety>=0.6) language++;
  const capStart = /^[A-Z"']/.test(text), endsPunc = /[.!?]["']?\s*$/.test(text);
  if(capStart && endsPunc) language++;
  language = Math.min(5, language);

  const band = Math.round((content+organisation+language)/3);
  const fb = [];
  if(wc < minWords) fb.push(`Aim for at least ${minWords} words (you wrote ${wc}).`);
  if(isEmail && content<5) fb.push('Make sure every required point is clearly covered.');
  if(conns<2) fb.push('Use more linking words (and, then, because, so) to join your ideas.');
  if(!capStart || !endsPunc) fb.push('Check capital letters at the start and full stops at the end.');
  if(!fb.length) fb.push('Well done — clear, complete and nicely organised.');

  return {band, max:5, wordCount:wc, criteria:[
    {name:'Content', score:content, max:5, note:contentNote},
    {name:'Organisation', score:organisation, max:5, note:`${sentences} sentence(s), ${conns} linking word(s).`},
    {name:'Language', score:language, max:5, note:`${wc} words; vocabulary variety ${Math.round(variety*100)}%.`}
  ], feedback:fb.join(' ')};
}

/* ---------------- Scorer ---------------- */
function scoreExam(ex){
  let correct=0, total=0;
  const detail=[];
  const writing=[];
  const partsMap = {};
  let counter = 1;
  ex.parts.forEach((p,idx)=>{
    if(p.type === 'writing'){
      // Writing is NOT given a final grade to the student and does NOT count
      // toward the Reading score. We still capture the answers (and a provisional
      // automatic estimate) so the teacher can mark them manually.
      const partName = p.part.replace(/\s*—\s*not auto-scored/i,'');
      const isEmail = writingHasBullets(p);
      const bullets = getWritingBullets(p);
      p.prompts.forEach((pr,i)=>{
        const num = counter + i;
        const ta = document.querySelector(`textarea[name="${qid(idx,i)}"]`);
        const text = ta ? ta.value : '';
        const task = writingTaskOf(p, pr);
        const m = task.match(/(\d+)\s*(?:[–-]\s*\d+)?\s*words?/i);
        const minWords = m ? parseInt(m[1]) : 25;
        const res = scoreWriting({text, minWords, isEmail, bulletItems:bullets});
        writing.push({part:partName, q:num, prompt:(typeof pr==='string'?pr:''), task, text, wordCount:res.wordCount, provisionalBand:res.band, max:res.max, criteria:res.criteria, feedback:res.feedback});
      });
      counter += p.prompts.length;
      return;
    }
    if(!partsMap[p.part]) partsMap[p.part] = {name:p.part, correct:0, total:0};
    p.questions.forEach((q,i)=>{
      const num = counter + i;
      total++;
      partsMap[p.part].total++;
      let user, ok, correctAns;
      if(p.type === 'mc' || p.type === 'clozeMC'){
        let val = -1;
        if(p.type === 'clozeMC'){
          // Inline gap-pill puts the chosen index in a hidden input
          const inp = document.querySelector(`input[name="${qid(idx,i)}"]`);
          if(inp && inp.value !== '') val = parseInt(inp.value);
        } else {
          const sel = document.querySelector(`input[name="${qid(idx,i)}"]:checked`);
          if(sel) val = parseInt(sel.value);
        }
        user = val;
        ok = user === q.answer;
        correctAns = `${String.fromCharCode(65+q.answer)}) ${q.options[q.answer]}`;
        user = (user===-1 ? '<em>no answer</em>' : `${String.fromCharCode(65+user)}) ${q.options[user]}`);
      } else if(p.type === 'match'){
        const sel = document.querySelector(`select[name="${qid(idx,i)}"]`);
        user = sel ? sel.value : '';
        ok = user === q.answer;
        // For people-matching parts, show the name instead of the bare letter
        const hasSources = p.sources && p.sources.length;
        const nameOf = (L)=>{ if(hasSources && p.bank){ const k=p.bank.labels.indexOf(L); if(k>=0) return p.bank.texts[k]; } return L; };
        correctAns = nameOf(q.answer);
        user = user ? nameOf(user) : '<em>no answer</em>';
      } else if(p.type === 'clozeOpen' || p.type === 'wordform' || p.type === 'transform'){
        const inp = document.querySelector(`input[name="${qid(idx,i)}"]`);
        user = inp ? inp.value : '';
        ok = openCorrect(user, q.accept);
        correctAns = q.accept.join(' / ');
        user = user || '<em>no answer</em>';
      }
      if(ok){ correct++; partsMap[p.part].correct++; }
      const stem = q.stem || q.before || '';
      detail.push({part:p.part, q:num, ok, user, correctAns, stem});
    });
    counter += p.questions.length;
  });
  const parts = Object.values(partsMap).map(p=>({
    ...p, pct: p.total ? Math.round(p.correct/p.total*100) : 0
  }));
  return {correct, total, detail, parts, writing};
}
