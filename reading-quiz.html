/* ---- Motivational message by score ---- */
function motivational(firstName, pct, level){
  if(pct >= 80) return `Outstanding work, ${firstName}! Your performance shows strong mastery at ${level}. You're ready to begin practising at the next level.`;
  if(pct >= 60) return `Well done, ${firstName}! You passed at ${level} (Cambridge passing standard ≈ 60%). Keep practising to consolidate the parts you found harder.`;
  if(pct >= 40) return `Good effort, ${firstName}. You're approaching ${level}. Focus on the weakest parts in the breakdown below — small wins there will get you over the pass mark.`;
  return `Don't be discouraged, ${firstName}. Today's score is below ${level}, but every attempt sharpens your skills. Review the parts you found hardest and try again soon.`;
}

/* Popup for inline cloze pills (Inspera-style): click the numbered button
   to reveal the multiple-choice options as a horizontal menu. */
window._showGap = function(btn, qidStr){
  document.querySelectorAll('.gap-popup').forEach(p=>p.remove());
  let options;
  try { options = JSON.parse(btn.dataset.options); }
  catch(e){ options = []; }
  const popup = document.createElement('div');
  popup.className = 'gap-popup';
  const closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'close-x';
  closeBtn.textContent = '✕';
  closeBtn.onclick = ()=> popup.remove();
  popup.appendChild(closeBtn);
  options.forEach((opt,j)=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = opt;
    b.onclick = (ev)=>{
      ev.stopPropagation();
      const inp = document.querySelector('input[name="'+qidStr+'"]');
      if(inp){
        inp.value = j;
        inp.dispatchEvent(new Event('change', {bubbles:true}));
      }
      btn.textContent = opt;
      btn.classList.add('answered');
      popup.remove();
    };
    popup.appendChild(b);
  });
  document.body.appendChild(popup);
  const rect = btn.getBoundingClientRect();
  // Initial position then clamp inside viewport
  let left = rect.left;
  let top = rect.bottom + 6;
  const popupRect = popup.getBoundingClientRect();
  if(left + popupRect.width > window.innerWidth - 10) left = Math.max(10, window.innerWidth - popupRect.width - 10);
  if(top + popupRect.height > window.innerHeight - 10) top = Math.max(10, rect.top - popupRect.height - 6);
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  setTimeout(()=>{
    function onOutside(e){
      if(!popup.contains(e.target) && e.target !== btn){
        popup.remove();
        document.removeEventListener('mousedown', onOutside);
      }
    }
    document.addEventListener('mousedown', onOutside);
  }, 0);
};

/* Build a unique input id per (partIdx, qIdx, optional sub) */
function qid(p,q,extra){ return `p${p}q${q}${extra?('_'+extra):''}`; }

/* ---------------- Part renderers ---------------- */
function escAttr(s){ return JSON.stringify(s).replace(/"/g,'&quot;'); }
// Format a writing task (Cambridge style): lead text, then a bullet list for
// "Say:" / "In your email:" items, then any trailing "Write N words" line.
function formatWritingTask(t){
  if(!t) return '';
  t = String(t).trim();
  const lead = t.match(/\b(Say|In your (?:email|message)|Tell (?:him|her|them)|Ask)\s*:/i);
  if(lead){
    const cut = lead.index + lead[0].length;
    const before = t.slice(0, cut).trim();
    let rest = t.slice(cut).trim();
    let tail = '';
    const tm = rest.match(/(?:^|[.\n])\s*(Write[^.]*words?[^.]*\.?)\s*$/i);
    if(tm){ tail = tm[1].trim(); rest = rest.slice(0, tm.index).trim(); }
    const items = (rest.includes(' / ') ? rest.split(' / ') : rest.split(/\s*,\s*/))
      .map(s=>s.replace(/\.$/,'').trim()).filter(Boolean);
    let html = `<p>${before}</p>`;
    if(items.length) html += `<ul>${items.map(it=>`<li>${it}</li>`).join('')}</ul>`;
    if(tail) html += `<p>${tail}</p>`;
    return html;
  }
  return t.split(/\n+/).map(line=>`<p>${line.trim()}</p>`).join('');
}
// Live word counter for writing boxes
function wcUpdate(el){
  const wrap = el.closest('.writing-wrap');
  const c = wrap ? wrap.querySelector('.word-count') : null;
  if(c){ const w = el.value.trim() ? el.value.trim().split(/\s+/).length : 0; c.textContent = 'Words: ' + w; }
  if(window._updateProgress) window._updateProgress();
}
// The task text of a writing part / prompt (handles both data shapes)
function writingTaskOf(p, pr){
  if(pr && typeof pr === 'object') return pr.instructions || '';
  if(p.instructions) return p.instructions;
  if(p.prompts && p.prompts[0] && typeof p.prompts[0] === 'object') return p.prompts[0].instructions || '';
  return '';
}

}

function renderStim(q){

  if(q.kind === 'message') return `${ctx}<div class="stim stim-phone"><div class="bubble">${txt}</div></div>`;

      </div>
      <div class="body">${(q.body||'').replace(/\n/g,'<br>')}</div>

}

function renderPart(p, idx, startNum, twoCol, paged){
  const head = `<div class="parthead">${p.part}</div>`;
  // Instructions are shown once in the .inspera-instruction subheading, so we
  // intentionally do NOT repeat them inside the exercise box.
  const instr = '';
  let body = '';

  if(p.type === 'mc'){
    let left = '', right = '';
    if(Array.isArray(p.scripts)){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.scripts.join(' '))})">&#9658; Play all</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
      p.scripts.forEach((s,i)=>{
        left += `<div class="row" style="margin:6px 0">
          <button class="ghost" onclick="speak(${escAttr(s)})">&#9658; Play recording ${startNum+i}</button>
        </div>`;
      });
    } else if(p.script){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }
    if(p.passage){ left += `<div class="passage">${p.passage}</div>`; }

    p.questions.forEach((q,i)=>{
      const num = startNum + i;
      const cls = paged ? `q paged-q${i===0?' show':''}` : 'q';
      const dl = paged ? ` data-local="${i}"` : '';
      right += `<div class="${cls}"${dl}>${renderStim(q)}<div class="stem">${num}. ${q.stem}</div>`;
      q.options.forEach((o,j)=>{
        right += `<label class="opt"><input type="radio" name="${qid(idx,i)}" value="${j}"> ${String.fromCharCode(65+j)}) ${o}</label>`;
      });
      right += `</div>`;
    });
    if(twoCol && (p.passage || left)){
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    body = left + right;
  }

  else if(p.type === 'match'){
    let left = '', right = '';
    // Gapped-text detection: passage contains numbered (N)____ markers
    const isGappedText = p.passage && /\(\d+\)____/.test(p.passage);
    // When the part lists named people/sources, the dropdown shows their NAMES
    // (the value stays the letter, so scoring is unchanged), and the redundant
    // "Options" box at the top is omitted — the names already label each source.
    const hasSources = p.sources && p.sources.length;
    // "People are options" (A2 style): the sources ARE the answer choices, so the
    // dropdown shows their names. Otherwise (B1 people→A–H options, or gapped text)
    // the dropdown shows the LETTER and the option texts are listed in a box.
    const peopleAreOptions = hasSources && p.bank && p.bank.labels && p.bank.labels.length === p.sources.length;
    const opts = (p.bank ? p.bank.labels : []).map((l,i)=>{
      const display = peopleAreOptions ? (p.bank.texts[i] || l) : l;
      return `<option value="${l}">${display}</option>`;
    }).join('');

    if(p.script){
      left += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }

    if(isGappedText){
      // Embed inline dropdowns in the passage at each (N)____ marker
      let passageHtml = p.passage;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const qidStr = qid(idx,i);
        const sel = `<select class="gapped-select" name="${qidStr}" onchange="this.classList.toggle('answered', !!this.value); if(window._updateProgress) window._updateProgress();"><option value="">${num}</option>${opts}</select>`;
        passageHtml = passageHtml.split(placeholder).join(sel);
      });
      left += `<div class="passage">${passageHtml}</div>`;
    } else {
      if(p.passage){ left += `<div class="passage">${p.passage}</div>`; }
      if(p.sources && p.sources.length){
        p.sources.forEach(s=>{
          if(s.avatar){
            left += `<div class="source-row"><div class="avatar">${s.avatar}</div><div class="source-body"><strong>${s.label}${s.name?(' — '+s.name):''}</strong>\n${s.text}</div></div>`;
          } else {
            left += `<div class="passage"><strong>${s.label}${s.name?(' — '+s.name):''}</strong>\n${s.text}</div>`;
          }
        });
      }
    }

    // Show the "Options" bank box for gapped text AND for B1-style people→A–H
    // tasks (distinct option bank). Hidden only when the sources themselves are
    // the options (A2 style), where it would be redundant.
    if(p.bank && p.bank.labels && (!hasSources || !peopleAreOptions)){
      right += `<div class="bank"><strong>Options:</strong><ul>`;
      p.bank.labels.forEach((l,i)=>{
        right += `<li><strong>${l}</strong> — ${p.bank.texts[i]}</li>`;
      });
      right += `</ul></div>`;
    }

    // For non-gapped match parts, render separate numbered dropdowns
    if(!isGappedText){
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        right += `<div class="q"><div class="stem">${num}. ${q.stem||''}</div>
          <select name="${qid(idx,i)}"><option value="">— choose —</option>${opts}</select>
        </div>`;
      });
    }

    if(twoCol){
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    body = left + right;
  }

  else if(p.type === 'clozeMC' || p.type === 'clozeOpen' || p.type === 'wordform'){
    if(p.title){ body += `<h3>${p.title}</h3>`; }
    if(p.script){
      body += `<div class="player">
        <span class="lbl">Audio for this part:</span>
        <button onclick="speak(${escAttr(p.script)})">&#9658; Play</button>
        <button class="ghost" onclick="stopTTS()">&#9632; Stop</button>
      </div>`;
    }
    // Inspera-style inline cloze: small numbered pill that opens a popup of options.
    if(p.type === 'clozeMC' && p.body){
      let bodyHtml = p.body;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const qidStr = qid(idx,i);
        const optsJson = JSON.stringify(q.options).replace(/"/g,'&quot;');
        const btn = `<button type="button" class="gap-pill" data-options="${optsJson}" data-num="${num}" onclick="window._showGap(this, '${qidStr}')">${num}</button><input type="hidden" name="${qidStr}" value="">`;
        bodyHtml = bodyHtml.split(placeholder).join(btn);
      });
      body += `<div class="passage">${bodyHtml}</div>`;
      return `<div class="partbox">${head}${instr}${body}</div>`;
    }
    // Inspera-style inline open cloze: text inputs embedded in the text
    if(p.type === 'clozeOpen' && p.body){
      let bodyHtml = p.body;
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        const placeholder = `(${num})____`;
        const inp = `<input class="cloze-input" type="text" name="${qid(idx,i)}" autocomplete="off" oninput="if(window._updateProgress) window._updateProgress();">`;
        bodyHtml = bodyHtml.split(placeholder).join('('+num+') '+inp);
      });
      body += `<div class="passage">${bodyHtml}</div>`;
      return `<div class="partbox">${head}${instr}${body}</div>`;
    }
    if(p.type === 'wordform' && p.rows){
      // Two-column layout, one line per grid row. The root word appears in the
      // right column on the same line that contains the gap.
      body += `<div class="wordform-grid">`;
      let qi = 0;
      p.rows.forEach(row=>{
        const txt = row.text || '';
        const hasGap = txt.includes('____');
        if(hasGap){
          const replaced = txt.replace('____', `<input class="gap-inline" type="text" name="${qid(idx,qi)}" autocomplete="off">`);
          body += `<div class="wf-text">${replaced}</div><div class="wf-root">${row.root||''}</div>`;
          qi++;
        } else {
          body += `<div class="wf-text">${txt || '&nbsp;'}</div><div></div>`;
        }
      });
      body += `</div>`;
    } else {
      if(p.body){ body += `<div class="passage">${p.body}</div>`; }
      p.questions.forEach((q,i)=>{
        const num = startNum + i;
        if(p.type==='clozeMC'){
          body += `<div class="q"><div class="stem">${num}.</div>`;
          q.options.forEach((o,j)=>{
            body += `<label class="opt"><input type="radio" name="${qid(idx,i)}" value="${j}"> ${String.fromCharCode(65+j)}) ${o}</label>`;
          });
          body += `</div>`;
        } else if(p.type==='clozeOpen'){
          body += `<div class="q"><div class="stem">${num}.</div>
            <input class="gapinput" type="text" name="${qid(idx,i)}" autocomplete="off"></div>`;
        } else { // wordform fallback (old body format)
          body += `<div class="q"><div class="stem">${num}. &nbsp; Root: <strong>${q.root}</strong></div>
            <input class="gapinput" type="text" name="${qid(idx,i)}" autocomplete="off"></div>`;
        }
      });
    }
  }

  else if(p.type === 'transform'){
    // Shown one question at a time (Cambridge key-word transformation behaviour)
    // Word range matches the level: C1 uses 3–6 words, B2 uses 2–5.
    const wr = /three and six/i.test(p.instructions||'') ? '3–6' : '2–5';
    body += `<div class="paged-counter"></div>`;
    p.questions.forEach((q,i)=>{
      const num = startNum + i;
      const parts = q.after.split('___');
      const before = parts[0] || '';
      const after  = parts[1] || '';
      body += `<div class="q transform-q paged-q${i===0?' show':''}" data-local="${i}">
        <div class="stem">${num}. ${q.before}</div>
        <div class="kw-line">${q.keyword}</div>
        <div class="transform-second">${before}<input class="gap-inline-wide" type="text" name="${qid(idx,i)}" placeholder="${wr} words" autocomplete="off">${after}</div>
        <div class="transform-hint">Write ${wr} words, including the key word.</div>
      </div>`;
    });
  }

  else if(p.type === 'writing'){
    const box = (i)=>`<div class="writing-wrap"><textarea class="writing-box" name="${qid(idx,i)}" placeholder="Write your answer here." oninput="wcUpdate(this)"></textarea><div class="word-count">Words: 0</div></div>`;
    if(p.pictures){
      // Picture-story (Part 7): full width — drawings on top, big box below.
      let bodyW = renderStoryPics(p.pictures);
      p.prompts.forEach((pr,i)=>{
        bodyW += box(i);
      });
      return `<div class="partbox">${bodyW}</div>`;
    }
    if(writingHasBullets(p)){
      // Email task: two columns — task on the left, writing box on the right.
      let left = '', right = '';
      p.prompts.forEach((pr,i)=>{
        left += `<div class="writing-task">${formatWritingTask(writingTaskOf(p, pr))}</div>`;
        right += box(i);
      });
      return `<div class="col-left">${left}</div><div class="col-right">${right}</div>`;
    }
    // Plain story/essay task with no pictures: full width, task on top, box below.
    let bodyW = '';
    p.prompts.forEach((pr,i)=>{
      bodyW += `<div class="writing-task">${formatWritingTask(writingTaskOf(p, pr))}</div>` + box(i);
    });
    return `<div class="partbox">${bodyW}</div>`;
  }

  return `<div class="partbox">${head}${instr}${body}</div>`;
}

/* ---------------- Writing rubric (offline auto-assessment) ----------------
   Cambridge-style subscales (Content, Organisation, Language), each 0–5.
   This is an automatic estimate based on measurable signals (coverage of the
   required points, length, sentence/linking structure, vocabulary range and
   basic accuracy). It is meant as instant feedback, not a substitute for a
   teacher's judgement. */
function getWritingBullets(p){
  const t = writingTaskOf(p);
  const lead = t.match(/\b(Say|In your (?:email|message)|Tell (?:him|her|them)|Ask)\s*:/i);
  if(!lead) return [];
  let rest = t.slice(lead.index + lead[0].length).trim();
  const tm = rest.match(/(?:^|[.\n])\s*(Write[^.]*words?[^.]*\.?)\s*$/i);
  if(tm) rest = rest.slice(0, tm.index).trim();
  return (rest.includes(' / ') ? rest.split(' / ') : rest.split(/\s*,\s*/))
    .map(s=>s.replace(/\.$/,'').trim()).filter(Boolean);
}
function scoreWriting(opts){
  const text = (opts.text||'').trim();
  const minWords = opts.minWords || 25;
  const isEmail = !!opts.isEmail;
  const bullets = opts.bulletItems || [];
  if(!text){
    return {band:0, max:5, wordCount:0, criteria:[
      {name:'Content', score:0, max:5, note:'No answer was written.'},
      {name:'Organisation', score:0, max:5, note:'—'},
      {name:'Language', score:0, max:5, note:'—'}
    ], feedback:'No response was written, so this task scores zero. Remember to attempt every part of the exam.'};
  }
  const words = text.split(/\s+/).filter(Boolean);
  const wc = words.length;
  const sentences = Math.max(1, (text.match(/[.!?]+/g)||[]).length);
  const lower = words.map(w=>w.toLowerCase().replace(/[^a-z']/g,'')).filter(Boolean);
  const variety = wc ? new Set(lower).size / wc : 0;
  const connList = ['and','then','but','because','so','after','before','when','while','first','next','finally','also','however','although','that','which'];
  const conns = connList.filter(c=>lower.includes(c)).length;

  // Content
  let content, contentNote;
  if(isEmail && bullets.length){
    let covered = 0;
    bullets.forEach(it=>{
      const keys = it.toLowerCase().split(/\s+/).filter(w=>w.length>3);
      if(keys.some(k=>text.toLowerCase().includes(k))) covered++;
    });
    content = Math.max(1, Math.round((covered/bullets.length)*5));
    contentNote = `Addressed about ${covered} of ${bullets.length} required content points.`;
  } else {
    const lengthOK = wc >= minWords;
    content = lengthOK ? (sentences>=3?5:4) : (wc >= minWords*0.6 ? 3 : 2);
    contentNote = lengthOK ? 'Develops a complete short text on the task.' : 'Shorter than expected — develop the ideas further.';
  }
  // Organisation
  let organisation = 2;
  if(sentences>=2) organisation++;
  if(conns>=1) organisation++;
  if(sentences>=3 && conns>=2) organisation = 5;
  organisation = Math.min(5, organisation);
  // Language
  let language = 2;
  if(wc>=minWords) language++;
  if(variety>=0.6) language++;
  const capStart = /^[A-Z"']/.test(text), endsPunc = /[.!?]["']?\s*$/.test(text);
  if(capStart && endsPunc) language++;
  language = Math.min(5, language);

  const band = Math.round((content+organisation+language)/3);
  const fb = [];
  if(wc < minWords) fb.push(`Aim for at least ${minWords} words (you wrote ${wc}).`);
  if(isEmail && content<5) fb.push('Make sure every required point is clearly covered.');
  if(conns<2) fb.push('Use more linking words (and, then, because, so) to join your ideas.');
  if(!capStart || !endsPunc) fb.push('Check capital letters at the start and full stops at the end.');
  if(!fb.length) fb.push('Well done — clear, complete and nicely organised.');

  return {band, max:5, wordCount:wc, criteria:[
    {name:'Content', score:content, max:5, note:contentNote},
    {name:'Organisation', score:organisation, max:5, note:`${sentences} sentence(s), ${conns} linking word(s).`},
    {name:'Language', score:language, max:5, note:`${wc} words; vocabulary variety ${Math.round(variety*100)}%.`}
  ], feedback:fb.join(' ')};
}

/* ---------------- Scorer ---------------- */
function scoreExam(ex){
  let correct=0, total=0;
  const detail=[];
  const writing=[];
  const partsMap = {};
  let counter = 1;
  ex.parts.forEach((p,idx)=>{
    if(p.type === 'writing'){
      // Writing is NOT given a final grade to the student and does NOT count
      // toward the Reading score. We still capture the answers (and a provisional
      // automatic estimate) so the teacher can mark them manually.
      const partName = p.part.replace(/\s*—\s*not auto-scored/i,'');
      const isEmail = writingHasBullets(p);
      const bullets = getWritingBullets(p);
      p.prompts.forEach((pr,i)=>{
        const num = counter + i;
        const ta = document.querySelector(`textarea[name="${qid(idx,i)}"]`);
        const text = ta ? ta.value : '';
        const task = writingTaskOf(p, pr);
        const m = task.match(/(\d+)\s*(?:[–-]\s*\d+)?\s*words?/i);
        const minWords = m ? parseInt(m[1]) : 25;
        const wcOnly=(text||'').trim()? (text.trim().split(/\s+/).length):0;
        // Writing is NOT auto-graded — capture text only; the teacher marks it.
        writing.push({part:partName, q:num, prompt:(typeof pr==='string'?pr:''), task, text, wordCount:wcOnly});
      });
      counter += p.prompts.length;
      return;
    }
    if(!partsMap[p.part]) partsMap[p.part] = {name:p.part, correct:0, total:0};
    p.questions.forEach((q,i)=>{
      const num = counter + i;
      total++;
      partsMap[p.part].total++;
      let user, ok, correctAns;
      if(p.type === 'mc' || p.type === 'clozeMC'){
        let val = -1;
        if(p.type === 'clozeMC'){
          // Inline gap-pill puts the chosen index in a hidden input
          const inp = document.querySelector(`input[name="${qid(idx,i)}"]`);
          if(inp && inp.value !== '') val = parseInt(inp.value);
        } else {
          const sel = document.querySelector(`input[name="${qid(idx,i)}"]:checked`);
          if(sel) val = parseInt(sel.value);
        }
        user = val;
        ok = user === q.answer;
        correctAns = `${String.fromCharCode(65+q.answer)}) ${q.options[q.answer]}`;
        user = (user===-1 ? '<em>no answer</em>' : `${String.fromCharCode(65+user)}) ${q.options[user]}`);
      } else if(p.type === 'match'){
        const sel = document.querySelector(`select[name="${qid(idx,i)}"]`);
        user = sel ? sel.value : '';
        ok = user === q.answer;
        // For people-matching parts, show the name instead of the bare letter
        const hasSources = p.sources && p.sources.length;
        const nameOf = (L)=>{ if(hasSources && p.bank){ const k=p.bank.labels.indexOf(L); if(k>=0) return p.bank.texts[k]; } return L; };
        correctAns = nameOf(q.answer);
        user = user ? nameOf(user) : '<em>no answer</em>';
      } else if(p.type === 'clozeOpen' || p.type === 'wordform' || p.type === 'transform'){
        const inp = document.querySelector(`input[name="${qid(idx,i)}"]`);
        user = inp ? inp.value : '';
        ok = openCorrect(user, q.accept);
        correctAns = q.accept.join(' / ');
        user = user || '<em>no answer</em>';
      }
      if(ok){ correct++; partsMap[p.part].correct++; }
      const stem = q.stem || q.before || '';
      detail.push({part:p.part, q:num, ok, user, correctAns, stem});
    });
    counter += p.questions.length;
  });
  const parts = Object.values(partsMap).map(p=>({
    ...p, pct: p.total ? Math.round(p.correct/p.total*100) : 0
  }));
  return {correct, total, detail, parts, writing};
}

      <p class="sub">${off.name}. Two full mock exams in the authentic Cambridge (Inspera-style) format. Auto-scored with timer and CEFR analysis.</p>

      ${(MOCK01[state.level]) ? `
      <div class="card">
        <h2>📝 MOCK 1</h2>
        <p>A complete ${off.name}-format ${state.skill.toLowerCase()} mock exam, written to mirror the official paper and pitched at the harder end of the level. Authentic Cambridge part structure and task types.</p>
        <div class="row" style="margin-top:14px"><button id="mock01Btn">Start MOCK 1 &rarr;</button></div>
      </div>
      ` : `<div class="card"><h2>📝 MOCK 1</h2><p class="sub">Coming soon for ${state.level}.</p></div>`}

      ${(MOCK02[state.level]) ? `
      <div class="card">
        <h2>📝 MOCK 2</h2>
        <p>A second complete ${off.name}-format ${state.skill.toLowerCase()} mock — fresh texts and tasks, same authentic Cambridge structure and difficulty.</p>
        <div class="row" style="margin-top:14px"><button id="mock02Btn">Start MOCK 2 &rarr;</button></div>
      </div>
      ` : `<div class="card"><h2>📝 MOCK 2</h2><p class="sub">Coming soon for ${state.level}.</p></div>`}

      ${(MOCK03[state.level]) ? `
      <div class="card">
        <h2>📝 MOCK 3</h2>
        <p>A third complete ${off.name}-format ${state.skill.toLowerCase()} mock — brand-new passages and tasks, same authentic Cambridge structure and difficulty.</p>
        <div class="row" style="margin-top:14px"><button id="mock03Btn">Start MOCK 3 &rarr;</button></div>
      </div>
      ` : `<div class="card"><h2>📝 MOCK 3</h2><p class="sub">Coming soon for ${state.level}.</p></div>`}

      <div class="official" style="margin-top:6px">
        <strong>Want the official ${off.name} sample too?</strong><br>
        <a class="link" href="${off.url}" target="_blank" rel="noopener">Open Cambridge's official ${state.skill} sample test &nearr;</a>
      </div>

      <div class="row" style="margin-top:18px"><button class="ghost" onclick="go('category')">&larr; Back</button></div>`;
    const mock01Btn = document.getElementById('mock01Btn');
    if(mock01Btn) mock01Btn.onclick=()=>{ state.examType='mock01'; state.answers={}; state._tabSwitches=0; go('exam'); };
    const mock02Btn = document.getElementById('mock02Btn');
    if(mock02Btn) mock02Btn.onclick=()=>{ state.examType='mock02'; state.answers={}; state._tabSwitches=0; go('exam'); };
    const mock03Btn = document.getElementById('mock03Btn');
    if(mock03Btn) mock03Btn.onclick=()=>{ state.examType='mock03'; state.answers={}; state._tabSwitches=0; go('exam'); };
  },

  exam(){
    const ex = currentExam();
    const dur = (DURATIONS[state.level] && DURATIONS[state.level][state.skill]) || 45;
    const label = state.examType === 'mock01' ? 'MOCK 1' : state.examType === 'mock02' ? 'MOCK 2' : state.examType === 'mock03' ? 'MOCK 3' : state.examType === 'practice2' ? 'Practice 2' : state.examType === 'practice3' ? 'Practice 3' : 'Practice';
    state.currentPart = 0;

    // Precompute per-part starting question number and length
    const partInfo = [];
    let counter = 1;
    ex.parts.forEach((p,i)=>{
      const qs = (p.type === 'writing') ? p.prompts.length : p.questions.length;
      partInfo.push({startNum:counter, count:qs});
      counter += qs;
    });

    // Build Inspera shell
    let html = `
      <div class="inspera-shell">
        <header class="inspera-header">
          <a class="brand" href="quizzes.html" title="Nordic International School of Lima"><img src="nordic-logo-h.svg" alt="Nordic"></a>
          <div class="candidate">Candidate: <strong>${state.name}</strong> · ${state.grade}</div>
          <div class="tools">
            <div class="fs-group" title="Adjust text size">
              <button type="button" onclick="window._fontSize(-1)">A−</button>
              <span class="fs-label" id="fsLabel">100%</span>
              <button type="button" onclick="window._fontSize(1)">A+</button>
            </div>
            <button type="button" class="tool-btn" data-tool="highlight" onclick="window._toggleHighlight()" title="Highlight text in the passage">🖍 Highlight</button>
            <button type="button" class="tool-btn" data-tool="notes" onclick="window._toggleNotes()" title="Open notes panel">📝 Notes</button>
          </div>
          <div class="right">
            <div class="timer" id="timer">00:00</div>
            <button id="quitBtn">Exit</button>
            <button class="finish-btn" id="submitBtn">Submit ✓</button>
          </div>
        </header>

        <main class="inspera-main">
          <div class="inspera-main-inner">
            <div class="inspera-title">
              <h1>${ex.title} — ${label}</h1>
            </div>`;

    const isTwoCol = (p) => (
      (p.type === 'mc' && p.passage) ||
      (p.type === 'match' && (p.passage || (p.sources && p.sources.length))) ||
      (p.type === 'writing' && !p.pictures && writingHasBullets(p))
    );
    // Parts shown one question at a time: key-word transformation, and
    // standalone multiple-choice parts (signs/notices) with no shared passage.
    const isPaged = (p) => (
      p.type === 'transform' ||
      (p.type === 'mc' && !p.passage)
    );

    ex.parts.forEach((p,i)=>{
      const info = partInfo[i];
      const range = info.count > 1 ? `${info.startNum}–${info.startNum + info.count - 1}` : `${info.startNum}`;
      const qWord = info.count > 1 ? 'Questions' : 'Question';
      const twoCol = isTwoCol(p);
      const paged = isPaged(p);
      // For writing parts the full task lives in the body, so the subheading
      // shows only a short "Write N words" note (extracted from the task text).
      let subInstr = p.instructions || '';
      if(p.type === 'writing'){
        const taskTxt = writingTaskOf(p);
        const wc = taskTxt.match(/(\d+(?:\s*[–-]\s*\d+)?)\s*words?(\s*or more)?/i);
        subInstr = wc ? ('Write ' + wc[1].replace(/\s+/g,'') + ' words' + (wc[2] ? ' or more' : '')) : 'Write your answer in the box provided.';
      }
      html += `<section class="part-pane${i===0?' active':''}" data-part="${i}"${paged?' data-paged="1"':''}>
        <div class="inspera-instruction">
          <strong>${qWord} ${range}</strong>
          <p>${subInstr}</p>
        </div>
        <div class="inspera-content${twoCol?' two-col':''}">
          ${renderPart(p, i, info.startNum, twoCol, paged)}
        </div>
      </section>`;
    });

    html += `</div></main>

        <footer class="inspera-footer">
          <div class="part-tabs">`;

    ex.parts.forEach((p,i)=>{
      const info = partInfo[i];
      let qnums = '';
      for(let j=0;j<info.count;j++){
        qnums += `<button type="button" class="qnum" id="qn-${i}-${j}" onclick="event.stopPropagation(); window._goToQuestion(${i},${j})">${info.startNum + j}</button>`;
      }
      html += `<div class="part-tab${i===0?' active':''}" data-part="${i}" onclick="window._goToQuestion(${i},0)">
        <div class="pname">Part ${i+1}</div>
        <div class="pprog" id="prog-${i}">0 of ${info.count}</div>
        <div class="qnums">${qnums}</div>
      </div>`;
    });

    html += `</div>
          <div class="nav-arrows">
            <button id="prevBtn" onclick="window._navQuestion(-1)" title="Previous question">◀</button>
            <button id="nextBtn" onclick="window._navQuestion(1)" title="Next question">▶</button>
          </div>
        </footer>
      </div>`;

    app.innerHTML = html;

    // ---- Global question navigation model ----
    // Total questions and helpers to convert between a global 0-based index and (part, local).
    const totalQ = partInfo.reduce((a,p)=>a + p.count, 0);
    const globalOf = (part, local) => (partInfo[part].startNum - 1) + local;
    const decode = (gi) => {
      gi = Math.max(0, Math.min(totalQ - 1, gi));
      for(let i=0;i<partInfo.length;i++){
        const start = partInfo[i].startNum - 1;
        if(gi < start + partInfo[i].count) return {part:i, local: gi - start};
      }
      const last = partInfo.length - 1;
      return {part:last, local: partInfo[last].count - 1};
    };
    state.currentQ = 0;

    // Show a part's pane (low-level: just toggles which pane/tab is visible)
    window._showPart = function(idx){
      const total = ex.parts.length;
      idx = Math.max(0, Math.min(total - 1, idx));
      state.currentPart = idx;
      document.querySelectorAll('.part-pane').forEach((el,i)=>el.classList.toggle('active', i===idx));
      document.querySelectorAll('.part-tab').forEach((el,i)=>el.classList.toggle('active', i===idx));
      const main = document.querySelector('.inspera-main'); if(main) main.scrollTo({top:0});
    };
    // For "paged" parts, reveal only the current question; add a "Question N of M" counter
    window._applyPaged = function(){
      const cur = decode(state.currentQ);
      document.querySelectorAll('.part-pane[data-paged]').forEach(pane=>{
        const pi = +pane.getAttribute('data-part');
        const qs = pane.querySelectorAll('.paged-q');
        qs.forEach(el=>{
          const lq = +el.getAttribute('data-local');
          el.classList.toggle('show', pi === cur.part && lq === cur.local);
        });
        const counter = pane.querySelector('.paged-counter');
        if(counter && pi === cur.part) counter.textContent = `Question ${cur.local + 1} of ${qs.length}`;
      });
    };
    // Reflect the current global question on the footer (highlight + arrow state)
    window._syncCurrent = function(){
      const cur = decode(state.currentQ);
      document.querySelectorAll('.qnum.current').forEach(b=>b.classList.remove('current'));
      const btn = document.getElementById(`qn-${cur.part}-${cur.local}`);
      if(btn) btn.classList.add('current');
      const pb = document.getElementById('prevBtn'); if(pb) pb.disabled = (state.currentQ === 0);
      const nb = document.getElementById('nextBtn'); if(nb) nb.disabled = (state.currentQ === totalQ - 1);
    };
    // Jump straight to a question — used by the footer numbers, the part names, and the arrows
    window._goToQuestion = function(part, q){
      state.currentQ = globalOf(part, q);
      window._showPart(part);
      window._applyPaged();
      const name = qid(part, q);
      let el = document.querySelector(`[name="${name}"]`);
      // Inline clozeMC stores its answer in a hidden input — scroll to the visible gap-pill instead
      if(el && el.type === 'hidden'){
        const pill = document.querySelector(`.gap-pill[onclick*="'${name}'"]`);
        if(pill) el = pill;
      }
      if(el){
        const block = el.closest('.q') || el;
        block.scrollIntoView({behavior:'smooth', block:'center'});
        block.classList.remove('q-flash'); void block.offsetWidth; block.classList.add('q-flash');
        setTimeout(()=>block.classList.remove('q-flash'), 1200);
        if(el.focus && el.type !== 'hidden'){ try{ el.focus({preventScroll:true}); }catch(e){} }
      }
      window._syncCurrent();
    };
    // Green arrows: advance / go back ONE question, crossing part boundaries
    window._navQuestion = function(delta){
      const cur = decode(state.currentQ + delta);
      window._goToQuestion(cur.part, cur.local);
    };
    window._navPart = window._navQuestion; // back-compat alias
    window._updateProgress = function(){
      ex.parts.forEach((p,i)=>{
        let done = 0;
        const items = (p.type==='writing') ? p.prompts : p.questions;
        const total = items.length;
        items.forEach((q,j)=>{
          const name = qid(i,j);
          let answered = false;
          if(p.type === 'writing'){
            const el = document.querySelector(`[name="${name}"]`);
            answered = !!(el && el.value && el.value.trim());
          } else if(p.type === 'mc'){
            answered = !!document.querySelector(`input[name="${name}"]:checked`);
          } else if(p.type === 'clozeMC'){
            const inp = document.querySelector(`input[name="${name}"]`);
            answered = !!(inp && inp.value !== '');
          } else if(p.type === 'match'){
            const sel = document.querySelector(`select[name="${name}"]`);
            answered = !!(sel && sel.value);
          } else {
            const inp = document.querySelector(`[name="${name}"]`);
            answered = !!(inp && inp.value && inp.value.trim());
          }
          if(answered) done++;
          const btn = document.getElementById(`qn-${i}-${j}`);
          if(btn) btn.classList.toggle('answered', answered);
        });
        const el = document.getElementById('prog-'+i);
        if(el) el.textContent = done + ' of ' + total;
      });
    };

    const finalize = ()=>{
      if(!confirm('Submit your answers and finish the exam?')) return;
      stopTimer(); stopTTS(); acStop();
      const result = scoreExam(ex);
      state.answers = result;
      go('result');
    };
    document.getElementById('submitBtn').onclick = finalize;
    document.getElementById('quitBtn').onclick = ()=>{
      if(!confirm('Exit without submitting? Your answers will be lost.')) return;
      stopTimer(); stopTTS(); acStop(); go('category');
    };

    // Listen for any input/change anywhere in the shell to update progress
    const shell = document.querySelector('.inspera-shell');
    shell.addEventListener('input', window._updateProgress);
    shell.addEventListener('change', window._updateProgress);
    // Clicking/focusing directly in the text makes that question the "current" one,
    // so the green arrows continue from where the student is working.
    shell.addEventListener('focusin', (e)=>{
      const name = e.target && e.target.getAttribute && e.target.getAttribute('name');
      const m = name && name.match(/^p(\d+)q(\d+)$/);
      if(m){ state.currentQ = globalOf(+m[1], +m[2]); window._syncCurrent(); }
    });

    // Init buttons, paging & progress
    state.currentQ = 0;
    window._showPart(0);
    window._applyPaged();
    window._syncCurrent();
    window._updateProgress();

    state.startTime = Date.now();
    acStart();   // ← activate anti-cheat (translate block, tab detection, etc.)
    startTimer(dur, ()=>{
      // Time expired: notify the student, but DO NOT auto-submit.
      // Students can keep working; the timer now counts overtime in red.
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:14px 28px;border-radius:10px;font-weight:700;z-index:5000;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:"Montserrat",sans-serif';
      banner.textContent = '⏰ Time is up. You may finish what you are doing, then press Submit.';
      document.body.appendChild(banner);
      setTimeout(()=>banner.style.transition='opacity .5s', 50);
      setTimeout(()=>{ banner.style.opacity = '0'; }, 6000);
      setTimeout(()=>banner.remove(), 6700);
    });
  },

  result(){
    stopTimer();
    const ex = currentExam();
    const r = state.answers;
    const pct = r.total ? Math.round(r.correct/r.total*100) : 0;
    const ce = interpret(state.level, pct);

    // Strengths & weaknesses
    const strengths = r.parts.filter(p=>p.pct >= 75);
    const weaknesses = r.parts.filter(p=>p.pct < 50);

    // Detailed per-question review grouped by part
    let detailHtml = '';
    let currentPart = '';
    r.detail.forEach(d=>{
      if(d.part !== currentPart){
        detailHtml += `<h3>${d.part}</h3>`;
        currentPart = d.part;
      }
      detailHtml += `<div class="result-line">
        <span>${d.q}. ${d.stem}</span>
        <span class="${d.ok?'correct':'wrong'}">${d.ok?'&#10004;':'&#10008;'}</span>
      </div>
      <div style="font-size:.85rem;color:var(--muted);padding:2px 0 10px">
        Your answer: ${d.user} &nbsp;|&nbsp; Correct: <span class="correct">${d.correctAns}</span>
      </div>`;
    });

    // Per-part visual bars
    const partsHtml = r.parts.map(p=>{
      const cls = p.pct >= 75 ? 'good' : (p.pct >= 50 ? 'warn' : 'bad');
      const meta = p.writing ? `Writing band ${p.correct} / ${p.total}` : `${p.correct} of ${p.total} correct`;
      return `<div class="part-bar ${cls}">
        <div>
          <div class="name">${p.name}</div>
          <div class="meta">${meta}</div>
        </div>
        <div class="pct-num">${p.pct}%</div>
        <div class="bar-wrap"><div class="bar" style="width:${p.pct}%"></div></div>
      </div>`;
    }).join('');

    // Listening transcripts
    let transcripts = '';
    if(state.skill === 'Listening'){
      transcripts += `<div class="card"><h2>Transcripts (for self-checking)</h2>`;
      ex.parts.forEach(p=>{
        if(p.script){
          transcripts += `<h3>${p.part}</h3><div class="passage">${p.script}</div>`;
        } else if(p.scripts){
          transcripts += `<h3>${p.part}</h3>`;
          p.scripts.forEach((s,i)=>{
            transcripts += `<div class="passage"><strong>Recording ${i+1}</strong>\n${s}</div>`;
          });
        }
      });
      transcripts += `</div>`;
    }

    const firstName = (state.name||'Student').split(' ')[0];
    const motivText = motivational(firstName, pct, state.level);
    const durationMin = state.startTime ? Math.max(1, Math.round((Date.now() - state.startTime)/60000)) : null;

    // Gather any writing-task responses for inclusion in the report
    const writingAnswers = [];
    ex.parts.forEach((p,i)=>{
      if(p.type === 'writing'){
        p.prompts.forEach((pr,j)=>{
          const ta = document.querySelector(`textarea[name="${qid(i,j)}"]`);
          if(ta) writingAnswers.push({part:p.part, prompt:pr, text:ta.value||'', wordCount:(ta.value||'').trim().split(/\s+/).filter(Boolean).length});
        });
      }
    });

    app.innerHTML = `
      ${topbar('Results')}
      <h1>Exam results</h1>
      <p class="sub">${ex.title}</p>

      <div class="motivation-card">
        <h2>🎉 ${pct>=60?'Congratulations':'Keep going'}, ${firstName}!</h2>
        <p>${motivText}</p>
      </div>

      <div class="pdf-actions">
        <button onclick="downloadResultPDF('NIS-${state.level}-${(state.name||'').replace(/\\s+/g,'_')}.pdf')">⬇ Download PDF</button>
        <button class="email" id="sendEmailBtn">📧 Send to my email</button>
      </div>
      <div class="send-status" id="sendStatus" style="display:none"></div>

      <div id="pdfTarget">
        <div class="pdf-brand" style="text-align:center;padding:8px 0 14px;border-bottom:2px solid #4987c6;margin-bottom:14px">
          <img src="nordic-logo-h.svg" alt="Nordic" style="height:50px;width:auto">
          <div style="color:#636465;font-size:.82rem;margin-top:4px;letter-spacing:1px;font-weight:600">CAMBRIDGE-FORMAT READING REPORT</div>
        </div>
        <div class="result-header">
          <div class="grid">
            <div><label>Student</label>${state.name}</div>
            <div><label>Email</label>${state.email||'—'}</div>
            <div><label>Grade / Class</label>${state.grade}</div>
            <div><label>Exam level</label>${state.level} · ${LEVEL_NAMES[state.level]||''}</div>
            <div><label>Skill</label>${state.skill}</div>
            <div><label>Exam</label>${state.examType==='mock01'?'MOCK 1':state.examType==='mock02'?'MOCK 2':state.examType==='mock03'?'MOCK 3':'Practice'}</div>
            <div><label>Date</label>${new Date().toLocaleString()}</div>
            <div><label>Time spent</label>${durationMin?durationMin+' min':'—'}</div>
            <div style="${(state._tabSwitches||0)>0?'background:#fef3c7;border-color:#f59e0b':''}"><label>Tab / window switches</label><span style="${(state._tabSwitches||0)>0?'color:#b45309;font-weight:700':'color:var(--good)'}">${state._tabSwitches||0} ${(state._tabSwitches||0)===0?'✓ (none detected)':'⚠ detected'}</span></div>
          </div>
        </div>

        <div class="score-card">
          <div class="big">${r.correct} / ${r.total}</div>
          <div class="pct">${pct}%</div>
          <div class="cefr ${ce.tier}">${ce.label}</div>
          <div class="verdict">${ce.text}</div>
        </div>

        <div class="card">
          <h2>Score by part</h2>
          <p class="sub" style="margin-bottom:6px">How you performed in each section of the exam.</p>
          ${partsHtml}
        </div>

        <div class="card">
          <h2>Analysis — strengths &amp; weaknesses</h2>
          ${strengths.length ? `
            <p><strong style="color:var(--good)">Strongest parts (≥ 75%):</strong></p>
            <div>${strengths.map(p=>`<span class="chip good">${p.name} — ${p.pct}%</span>`).join('')}</div>
          ` : ''}
          ${weaknesses.length ? `
            <p style="margin-top:12px"><strong style="color:var(--bad)">Areas to review (&lt; 50%):</strong></p>
            <div>${weaknesses.map(p=>`<span class="chip bad">${p.name} — ${p.pct}%</span>`).join('')}</div>
          ` : ''}
          ${(!strengths.length && !weaknesses.length) ? `<p>Consistent performance across all parts — no specific section is dragging your score down.</p>` : ''}
          <p style="margin-top:14px;color:var(--muted);font-size:.88rem">
            Cambridge passing standard is approximately 60%. This score covers the auto-marked Reading parts only. Any Writing tasks are <strong>not graded automatically</strong> — they are sent to your teacher to mark by hand.
          </p>
        </div>

        <div class="card">
          <h2>Detailed question review</h2>
          ${detailHtml}
        </div>

        ${(r.writing&&r.writing.length)?`
        <div class="card">
          <h2>Writing tasks — sent for teacher review</h2>
          <p class="sub" style="margin-bottom:10px">Your writing is <strong>not graded automatically</strong>. It has been sent to your teacher, who will read it and give you a mark by hand. Below is a copy of what you wrote.</p>
          ${r.writing.map(w=>`
            <div style="border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <strong>${w.part}</strong>
                <span style="color:var(--muted);font-size:.85rem">${w.wordCount} words</span>
              </div>
              <div class="passage" style="margin-top:8px;white-space:pre-wrap">${(w.text||'<em>No response written.</em>').replace(/</g,'&lt;')}</div>
            </div>
          `).join('')}
        </div>`:''}

        ${transcripts}
      </div>

      <div class="row">
        <a class="btn" style="text-decoration:none" href="https://bacman2000.github.io/nis-portal/">🏫 Volver al Portal → siguiente destreza</a>
        <button class="ghost" onclick="go('category')">Try another exam</button>
        <button class="ghost" onclick="go('level')">Change level</button>
        <a class="link" style="align-self:center;margin-left:6px" href="quizzes.html">All quizzes &nearr;</a>
      </div>`;

    // Auto-POST the result to the configured Apps Script webhook
    const payload = {
      timestamp: new Date().toISOString(),
      name: state.name,
      firstName: firstName,
      email: state.email,
      grade: state.grade,
      skill: state.skill,
      level: state.level,
      levelName: LEVEL_NAMES[state.level]||'',
      examType: state.examType,
      examTitle: ex.title,
      score: r.correct,
      total: r.total,
      percent: pct,
      cefrLabel: ce.label,
      cefrTier: ce.tier,
      verdict: ce.text,
      motivation: motivText,
      durationMinutes: durationMin,
      tabSwitches: state._tabSwitches || 0,
      parts: r.parts,
      detail: r.detail,
      writingAnswers: writingAnswers,
      writingEvaluation: r.writing || [],
      teacherEmail: CONFIG.teacherEmail,
      schoolName: CONFIG.schoolName
    };
    try{ if(window.NIS) window.NIS.save({skill:payload.skill, level:payload.level, examType:payload.examType, score:payload.score, total:payload.total, percent:payload.percent, duration_min:payload.durationMinutes, breakdown:{parts:payload.parts, detail:payload.detail}, answers:payload.writingAnswers||null}); }catch(e){}
    sendResultToWebhook(payload).then(res=>{
      const st = document.getElementById('sendStatus');
      if(!st) return;
      if(res.skipped){
        st.style.display = 'block';
        st.classList.remove('err');
        st.textContent = '⚠ No webhook configured — use ⬇ Download PDF to save your report.';
      } else if(res.sent){
        st.style.display = 'block';
        st.classList.remove('err');
        st.textContent = '✓ Result sent. Check your email shortly for your PDF report.';
      } else {
        st.style.display = 'block';
        st.classList.add('err');
        st.textContent = '⚠ Could not reach the report server. You can still download the PDF locally.';
      }
    });

    // Manual "Send to my email" button
    document.getElementById('sendEmailBtn').onclick = async ()=>{
      const btn = document.getElementById('sendEmailBtn');
      const st = document.getElementById('sendStatus');
      btn.disabled = true; btn.textContent = '⌛ Sending...';
      const res = await sendResultToWebhook(payload);
      btn.disabled = false; btn.textContent = '📧 Send to my email';
      st.style.display = 'block';
      if(res.skipped){ st.classList.add('err'); st.textContent = '⚠ No webhook configured. Ask your teacher to set up CONFIG.webhookUrl.'; }
      else if(res.sent){ st.classList.remove('err'); st.textContent = '✓ Result resent to '+state.email+'.'; }
      else { st.classList.add('err'); st.textContent = '⚠ Could not send. Try ⬇ Download PDF.'; }
    };
  }
};

/* Auto-skip sign-in when logged into Portal NIS (shared session) → go to level. */
(async function(){
  try{
    if(window.NIS){
      const s = await window.NIS.currentStudent();
      if(s){ state.name = s.full_name || ''; state.grade = s.grade || ''; state.email = s.email || ''; state.skill = 'Reading'; go('level'); return; }
    }
  }catch(e){}
  go('welcome');
})();
</script>
