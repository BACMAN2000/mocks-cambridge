<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Auto-version: always load the latest deployed version without the student
     having to clear the browser cache. On load we read version.json (never
     cached) and, if the page's ?v= does not match, reload pointing at the
     current version — a fresh URL the browser cannot have cached. -->
<script>
(function(){
  try{
    var params = new URLSearchParams(location.search);
    var loadedV = params.get('v');
    fetch('version.json?t=' + Date.now(), {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(data){
        if(!data || !data.version) return;
        if(loadedV !== data.version){
          params.set('v', data.version);
          location.replace(location.pathname + '?' + params.toString() + location.hash);
        }
      })
      .catch(function(){ /* offline or no version.json — just use the cached page */ });
  }catch(e){}
})();
</script>
<title>MOCKS CAMBRIDGE — Reading &amp; Use of English (A2 · B1 · B2 · C1)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Anti-translate: tells Chrome/Edge not to offer page translation -->
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="en">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
  :root{
    --bg:#f8fafc; --card:#ffffff; --accent:#4987c6; --accent2:#2d5a8d;
    --good:#16a34a; --bad:#ef4444; --text:#0f172a; --muted:#636465; --line:#e2e8f0;
    --soft:#d1d2ea;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Montserrat","Segoe UI",system-ui,sans-serif}
  body{background:linear-gradient(180deg,#d1d2ea 0%,#f8fafc 60%,#fff 100%);color:var(--text);min-height:100vh;padding:24px;line-height:1.55}
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:1.7rem;margin-bottom:4px}
  h2{font-size:1.25rem;margin:22px 0 10px;color:var(--accent2)}
  h3{font-size:1.05rem;margin:14px 0 8px}
  .sub{color:var(--muted);margin-bottom:22px}
  .card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  label{display:block;margin:12px 0 6px;font-weight:600}
  input,select,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:#ffffff;color:var(--text);font-size:1rem;font-family:inherit}
  /* Touch devices (iPad, tablets, phones, touchscreen laptops): make answer
     fields tap-responsive and fully editable so the on-screen keyboard opens. */
  input,select,textarea{touch-action:manipulation;-webkit-user-select:text;user-select:text;-webkit-tap-highlight-color:rgba(73,135,198,.18)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--soft)}
  textarea{min-height:90px;resize:vertical}
  button{cursor:pointer;border:none;border-radius:10px;padding:12px 20px;font-size:1rem;font-weight:600;background:var(--accent);color:#06283d;transition:transform .08s, opacity .15s}
  button:hover{transform:translateY(-1px)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  button.warn{background:#f59e0b;color:#1a1300}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:640px){.grid2,.grid4{grid-template-columns:1fr 1fr}}
  .tile{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:30px 16px;text-align:center;cursor:pointer;transition:.15s}
  .tile:hover{border-color:var(--accent);transform:translateY(-3px)}
  .tile .ico{font-size:3.2rem;display:block;margin-bottom:10px}
  .tile h3{font-size:1.2rem}
  .tile p{color:var(--muted);font-size:.85rem;margin-top:6px}
  .lvl{font-size:1.6rem;font-weight:800;color:var(--accent2)}
  .badge{display:inline-block;background:#f8fafc;border:1px solid var(--line);padding:4px 10px;border-radius:999px;font-size:.78rem;color:var(--muted)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
  .crumbs{color:var(--muted);font-size:.88rem}
  .passage{background:#f8fafc;border:1px solid var(--line);border-left:4px solid var(--accent);padding:16px;border-radius:8px;line-height:1.65;margin:8px 0 16px;white-space:pre-line;font-family:Georgia,"Times New Roman",serif;color:var(--text)}
  .notice{background:#fef3c7;border:1px dashed #f59e0b;color:#7c2d12;padding:10px 14px;border-radius:8px;margin-bottom:8px;font-style:italic}
  .player{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;margin:6px 0 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .player .lbl{flex:1;color:var(--muted);font-size:.9rem}
  .q{border-top:1px dashed var(--line);padding:14px 0;margin:0}
  .q:first-of-type{border-top:none}
  .q .stem{font-weight:600;margin-bottom:8px}
  .opt{display:block;padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin:6px 0;cursor:pointer}
  .opt:hover{border-color:var(--accent)}
  .opt input{width:auto;margin-right:10px}
  .gapinput{display:inline-block;width:130px;padding:4px 8px;margin:0 4px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:var(--text)}
  .transrow{display:grid;grid-template-columns:1fr 110px 1fr;gap:8px;align-items:center;margin:10px 0}
  .transrow .kw{text-align:center;font-weight:700;color:var(--accent2);background:#f8fafc;border:1px solid var(--line);border-radius:6px;padding:6px}
  .bank{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:8px 0 14px}
  .bank ul{list-style:none;display:grid;grid-template-columns:1fr;gap:8px}
  .result-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b;gap:8px}
  .correct{color:var(--good)} .wrong{color:var(--bad)}
  .score{font-size:2.4rem;font-weight:800;text-align:center;margin:10px 0}
  a.link{color:var(--accent)}
  .official{background:#f8fafc;border:1px dashed #475569;border-radius:12px;padding:18px;margin-top:12px}
  .partbox{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;margin:14px 0}
  .partbox > .parthead{font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;font-size:.85rem}
  .miss{color:var(--muted);font-style:italic}
  /* Stimulus cards for Part 1 — mimic the look of the Cambridge sample PDFs */
  .stim{margin:4px 0 14px;max-width:460px}
  .stim-context{color:var(--muted);font-size:.92rem;margin:8px 0 6px;font-style:italic}
  .stim-cap{font-size:.72rem;letter-spacing:1px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase}
  /* Source rows with avatar (A2 Part 2 etc.) */
  .source-row{display:flex;gap:14px;background:#f8fafc;border-left:4px solid var(--accent);padding:14px;border-radius:8px;margin:8px 0;line-height:1.6;font-family:Georgia,"Times New Roman",serif;align-items:flex-start;white-space:pre-line}
  .source-row .avatar{flex:0 0 72px;width:72px;height:72px;border-radius:8px;overflow:hidden;border:2px solid var(--line);background:#fff}
  .source-row .avatar svg,.source-row .avatar img{display:block;width:100%;height:100%;object-fit:cover}
  /* Word-formation two-column layout: each row is a line of text; root word appears in the right column on the line containing the gap */
  .wordform-grid{display:grid;grid-template-columns:auto max-content;justify-content:start;gap:2px 14px;background:#f8fafc;border-left:4px solid var(--accent);padding:18px 22px;border-radius:8px;margin:8px 0;font-family:Georgia,"Times New Roman",serif;line-height:1.85;align-items:baseline}
  .wordform-grid > .wf-text{min-height:1.6em}
  .wordform-grid > .wf-root{text-align:left;font-weight:700;color:var(--accent2);font-family:"Montserrat","Segoe UI",sans-serif;letter-spacing:1.2px;font-size:.92rem;white-space:nowrap}
  .wordform-grid input.gap-inline{display:inline-block;width:150px;margin:0 4px;padding:2px 8px;border:none;border-bottom:1.5px dashed var(--muted);background:transparent;color:var(--text);font-family:inherit;font-size:1rem;text-align:center}
  .wordform-grid input.gap-inline:focus{outline:none;border-bottom-color:var(--accent)}
  @media(max-width:560px){.wordform-grid{grid-template-columns:auto max-content;gap:2px 10px}.wordform-grid input.gap-inline{width:110px}}
  /* Key-word transformation: stem, key word alone on its own line, then the second sentence with the inline gap */
  .transform-q{font-family:Georgia,"Times New Roman",serif;line-height:1.75}
  .transform-q > .stem{font-family:inherit;font-weight:400;margin-bottom:8px}
  .kw-line{font-weight:700;letter-spacing:1.5px;color:var(--accent2);margin:8px 0;padding-left:28px;font-family:"Montserrat","Segoe UI",sans-serif;font-size:1rem}
  .transform-second{padding-left:0}
  .transform-second input.gap-inline-wide{display:inline-block;width:240px;margin:0 6px;padding:4px 8px;border:none;border-bottom:1.5px dashed var(--muted);background:transparent;color:var(--text);font-family:inherit;font-size:1rem;text-align:center}
  .transform-second input.gap-inline-wide:focus{outline:none;border-bottom-color:var(--accent)}
  .transform-hint{font-family:"Montserrat","Segoe UI",sans-serif;font-size:.82rem;color:var(--muted);margin-top:8px}
  .source-row .source-body{flex:1;white-space:pre-line}
  .stim-sign{border:3px double #f1f5f9;background:#f8fafc;color:#f1f5f9;padding:20px 18px;text-align:center;font-weight:700;letter-spacing:.6px;font-family:Impact,"Arial Narrow",sans-serif;line-height:1.4;max-width:380px}
  .stim-sign .stim-cap{color:#94a3b8;text-align:center}
  .stim-notice{border:2px solid #cbd5e1;background:#f8fafc;color:#f1f5f9;padding:16px 18px;text-align:center;line-height:1.55;max-width:420px}
  .stim-notice .stim-cap{text-align:center;color:#94a3b8}
  .stim-phone{background:#0f172a;border:3px solid #cbd5e1;border-radius:24px;padding:14px;max-width:280px;position:relative}
  .stim-phone:before{content:"";display:block;width:46px;height:5px;background:#475569;border-radius:3px;margin:-4px auto 8px}
  .stim-phone .stim-cap{color:#cbd5e1;text-align:center;border-bottom:1px solid #475569;padding-bottom:6px;margin-bottom:8px;letter-spacing:.5px}
  .stim-phone .bubble{background:#1e3a8a;color:#fff;border-radius:14px;padding:10px 12px;line-height:1.4}
  .stim-note{background:#fde68a;color:#1a1300;padding:16px 18px;max-width:320px;box-shadow:3px 5px 12px rgba(0,0,0,.45);transform:rotate(-1.2deg);font-family:"Comic Sans MS","Segoe Script",cursive,sans-serif;line-height:1.5}
  .stim-note .stim-cap{color:#854d0e}
  .stim-email{background:#ffffff;color:#111;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;max-width:460px}
  .stim-email .hdr{background:#f1f5f9;padding:10px 12px;border-bottom:1px solid #cbd5e1;font-size:.88rem}
  .stim-email .hdr div{display:flex;gap:8px;margin:2px 0}
  .stim-email .hdr strong{min-width:64px;color:#475569;font-weight:600}
  .stim-email .body{padding:14px;line-height:1.55}
  /* Welcome / hero screen */
  .hero{background:var(--card);border-radius:18px;padding:36px 28px;text-align:center;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  .hero .hero-logo{display:block;margin:0 auto 10px;height:72px;width:auto}
  .hero .logo{font-size:3.4rem;line-height:1;margin-bottom:8px}
  .hero h1{font-size:2rem;margin-bottom:6px}
  .hero .qr{display:inline-block;background:#fff;padding:10px;border-radius:14px;margin:14px 0}
  .hero .qr img{display:block;width:200px;height:200px}
  .hero .qr-help{color:var(--muted);font-size:.88rem;max-width:340px;margin:6px auto 18px}
  .hero .opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:520px;margin:18px auto 0}
  @media(max-width:540px){.hero .opts{grid-template-columns:1fr}}
  /* Sticky exam timer */
  .timer-bar{position:sticky;top:0;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px;z-index:10;margin-bottom:14px}
  .timer-bar .label{color:var(--muted);font-size:.88rem}
  .timer{font-family:"Segoe UI Mono",Consolas,monospace;font-size:1.5rem;font-weight:800;color:var(--accent);background:#0f172a;border:2px solid var(--accent);border-radius:10px;padding:6px 16px;letter-spacing:3px;min-width:120px;text-align:center}
  .timer.warn{color:#f59e0b;border-color:#f59e0b}
  .timer.danger{color:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  /* Results redesign */
  .result-header{background:var(--card);border-radius:16px;padding:18px;margin-bottom:18px}
  .result-header .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.95rem}
  @media(max-width:520px){.result-header .grid{grid-template-columns:1fr}}
  .result-header .grid > div{padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid var(--line)}
  .result-header label{display:block;color:var(--muted);font-size:.72rem;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;font-weight:700}
  .score-card{background:var(--card);border-radius:18px;padding:32px 24px;text-align:center;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
  .score-card .big{font-size:3.8rem;font-weight:800;line-height:1;letter-spacing:-1px}
  .score-card .pct{color:var(--muted);font-size:1.25rem;margin-top:2px}
  .score-card .cefr{display:inline-block;font-weight:800;padding:8px 22px;border-radius:999px;letter-spacing:2px;margin-top:14px;font-size:1.05rem}
  .score-card .cefr.good{background:var(--good);color:#062a14}
  .score-card .cefr.warn{background:#f59e0b;color:#1a1300}
  .score-card .cefr.bad{background:var(--bad);color:#2a0606}
  .score-card .verdict{margin-top:14px;color:var(--text);line-height:1.5;max-width:560px;margin-left:auto;margin-right:auto}
  .part-bar{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:10px 0;display:grid;grid-template-columns:1fr auto;gap:6px 14px;align-items:center}
  .part-bar .name{font-weight:700}
  .part-bar .meta{font-size:.82rem;color:var(--muted);margin-top:2px}
  .part-bar .pct-num{font-family:Consolas,monospace;font-weight:800;font-size:1.15rem}
  .part-bar .bar-wrap{grid-column:1/-1;background:#1e293b;border-radius:6px;overflow:hidden;height:8px;margin-top:6px}
  .part-bar .bar{height:100%;background:var(--accent);transition:width .6s}
  .part-bar.good .pct-num,.part-bar.good .name{color:var(--good)}
  .part-bar.good .bar{background:var(--good)}
  .part-bar.warn .pct-num,.part-bar.warn .name{color:#f59e0b}
  .part-bar.warn .bar{background:#f59e0b}
  .part-bar.bad .pct-num,.part-bar.bad .name{color:var(--bad)}
  .part-bar.bad .bar{background:var(--bad)}
  .chip{display:inline-block;background:#f8fafc;border:1px solid var(--line);padding:5px 12px;border-radius:999px;font-size:.85rem;margin:3px 4px 3px 0}
  .chip.good{border-color:var(--good);color:var(--good)}
  .chip.bad{border-color:var(--bad);color:var(--bad)}
  /* ============================================================
     INSPERA-STYLE EXAM RUNNER (light theme, single-part display
     with bottom Part navigation — mirrors the visual layout of the
     official Cambridge digital exam player).
  ============================================================ */
  .inspera-shell{position:fixed;inset:0;background:#f1f5f9;color:#0f172a;z-index:1000;font-family:"Montserrat","Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column}
  .inspera-shell *{box-sizing:border-box}
  .inspera-header{background:#fff;border-bottom:1px solid #cbd5e1;padding:12px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .inspera-header .brand{display:inline-flex;align-items:center;text-decoration:none}
  .inspera-header .brand img{display:block;height:36px;width:auto}
  .inspera-header .candidate{color:#64748b;font-size:.85rem}
  .inspera-header .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .inspera-header .timer{font-family:Consolas,"Segoe UI Mono",monospace;font-size:1.05rem;font-weight:800;color:#4987c6;background:#d1d2ea;padding:6px 14px;border-radius:8px;letter-spacing:2px;min-width:90px;text-align:center}
  .inspera-header .timer.warn{color:#b45309;background:#fef3c7}
  .inspera-header .timer.danger{color:#b91c1c;background:#fee2e2;animation:pulse 1s infinite}
  .inspera-header .timer.overtime{color:#ffffff;background:#dc2626;border-color:#b91c1c;animation:pulse 1.2s infinite}
  .inspera-header button{background:#fff;color:#475569;border:1px solid #cbd5e1;padding:6px 14px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer}
  .inspera-header button.finish-btn{background:#4987c6;color:#fff;border-color:#4987c6}
  .inspera-header button:hover{filter:brightness(0.97)}
  .inspera-main{flex:1;overflow-y:auto;padding:18px 22px 30px;width:100%}
  .inspera-main-inner{max-width:1000px;margin:0 auto}
  .inspera-title{margin:6px 0 10px}
  .inspera-title h1{font-size:1.35rem;margin:0;font-weight:700;color:#0f172a}
  .inspera-title p{color:#64748b;font-size:.9rem;margin:4px 0 0}
  .inspera-instruction{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:14px 18px;margin:14px 0}
  .inspera-instruction strong{display:block;color:#0f172a;font-size:1rem;margin-bottom:4px;font-weight:700}
  .inspera-instruction p{color:#475569;font-size:.92rem;margin:0;line-height:1.5}
  .inspera-content{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:24px 28px;font-family:Georgia,"Times New Roman",serif;line-height:1.85;color:#0f172a;font-size:1rem}
  /* Two-column layout: passage(s) on the left, questions on the right, each scrolls independently. */
  .inspera-content.two-col{padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden}
  .inspera-content.two-col > .col-left{padding:22px 24px;border-right:1px solid #e2e8f0;overflow-y:auto;max-height:calc(100vh - 290px)}
  .inspera-content.two-col > .col-right{padding:22px 24px;overflow-y:auto;max-height:calc(100vh - 290px);background:#fafafa}
  @media(max-width:780px){.inspera-content.two-col{display:block}.inspera-content.two-col > .col-left{border-right:none;border-bottom:1px solid #e2e8f0;max-height:none}.inspera-content.two-col > .col-right{max-height:none}}
  .inspera-content h3{font-family:"Montserrat","Segoe UI",sans-serif;font-size:1.18rem;margin:0 0 14px;font-weight:700;color:#0f172a}
  .inspera-content .passage{background:transparent;border:none;padding:0;border-radius:0;color:#0f172a;font-family:Georgia,"Times New Roman",serif;font-size:1rem;line-height:1.85;white-space:pre-line;margin:0 0 18px}
  .inspera-content .notice{background:#f8fafc;border:1px solid #e2e8f0;color:#475569;padding:10px 14px;border-radius:8px;font-style:italic;margin-bottom:12px;font-size:.92rem;font-family:"Montserrat","Segoe UI",sans-serif}
  .inspera-content .partbox{background:transparent;border:none;border-radius:0;padding:0;margin:0}
  .inspera-content .parthead{display:none}
  /* Writing parts: Cambridge two-column layout — task on the left, writing box on the right */
  .writing-task{color:#0f172a;font-size:var(--exam-fs,1rem);line-height:1.6}
  .writing-task p{margin:0 0 14px}
  .writing-task ul{margin:6px 0 14px 22px;padding:0}
  .writing-task li{margin:5px 0}
  textarea.writing-box{width:100%;min-height:360px;resize:vertical;padding:16px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#0f172a;font-family:inherit;font-size:1rem;line-height:1.6}
  textarea.writing-box:focus{outline:none;border-color:#4987c6;box-shadow:0 0 0 3px #d1d2ea}
  .writing-wrap{margin-top:4px}
  .word-count{text-align:right;font-size:.85rem;color:#64748b;margin-top:6px;font-family:"Montserrat","Segoe UI",sans-serif}
  /* Picture-story (Part 7): three drawings in a row above the writing box */
  .story-pics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:6px 0 18px}
  .story-pics figure{margin:0;border:1px solid #cbd5e1;border-radius:8px;background:#fff;overflow:hidden}
  .story-pics svg{display:block;width:100%;height:auto;background:#fff}

/* Timer machinery. Counts DOWN to zero, then keeps counting UP as
   overtime (+MM:SS in red) until the student presses Submit. The exam
   is never auto-submitted; the timer is informational. */
let timerInterval = null;
function startTimer(minutes, onExpire){
  stopTimer();
  let remaining = minutes * 60;
  let expiredFired = false;
  const el = document.getElementById('timer');
  function paint(){
    if(!el) return;
    const over = remaining < 0;
    const abs = Math.abs(remaining);
    const m = Math.floor(abs/60), s = abs%60;
    const txt = (over ? '+' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    el.textContent = txt;
    el.classList.toggle('warn', !over && remaining <= 5*60 && remaining > 60);
    el.classList.toggle('danger', !over && remaining <= 60 && remaining > 0);
    el.classList.toggle('overtime', over);
  }
  paint();
  timerInterval = setInterval(()=>{
    remaining--;
    paint();
    if(remaining === 0 && !expiredFired){
      expiredFired = true;
      if(typeof onExpire === 'function') onExpire();
    }
  }, 1000);
}
function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }

  A2:"A2 Key (Elementary)",
  B1:"B1 Preliminary (Intermediate)",
  B2:"B2 First (Upper-Intermediate)",
  C1:"C1 Advanced (Advanced)"
};
function interpret(level, pct){
  const name = LEVEL_NAMES[level] || level;
  if(pct >= 80) return {tier:'good', label:'Strong pass — '+level, text:'Strong performance at '+name+'. You are comfortably at this level and ready to begin practising at the next one.'};
  if(pct >= 60) return {tier:'good', label:'Pass — '+level, text:'Pass at '+name+' (Cambridge passing standard is approximately 60%). Solid performance — keep practising to consolidate.'};
  if(pct >= 40) return {tier:'warn', label:'Approaching '+level, text:'You are approaching '+name+'. Keep practising at this level — focus on the weakest parts below.'};
  return {tier:'bad', label:'Below '+level, text:'Below '+name+'. More practice is recommended at this level before attempting the official exam.'};
}

  const u = norm(user);

      { type:"mc", part:"Part 5", instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The strange comfort of bad weather

There is a particular kind of pleasure, which I suspect is more common than people admit, in being safely indoors while the weather outside is doing its worst. A storm against the window seems to push the walls of any room slightly closer, and a quiet pleasure — almost a kind of smugness — settles over those of us lucky enough to be inside. We did not invite the storm, of course; but once it has arrived, we are quite happy for it to stay.

Writers have noticed this feeling for centuries, even if they have rarely tried to give it a name. The English language has at least a hundred words for fine weather and a generous supply for terrible weather, but nothing precise for that quiet, contented mood of being warm and dry while everything outside is cold and wet. It is, perhaps, too small a feeling to deserve a single word.

What interests me is how unreliable this pleasure has become in the modern home. Storms used to be loud, and houses were thin; the contrast between inside and outside was unmistakable. Today, with well-sealed windows and central heating, even the most violent weather sounds like a polite cough on the other side of the glass. We have removed, almost by accident, the very thing that made the contrast pleasurable in the first place. The pleasure depends on hearing what we are escaping.

I have noticed, perhaps a little guiltily, that my own appreciation of bad weather grows stronger whenever I visit my parents, who still live in their old, drafty house. There, the storm is not background music; it is a performer that takes the room hostage for an hour or two. Tea tastes better. Books read more slowly. The conversation, once everyone has stopped complaining, becomes the kind of conversation that no one really has any more.

Perhaps this is why my visits there always end with a small reluctance to leave. It is not, I should be clear, the house I miss, which is in many ways uncomfortable and increasingly hard for my parents to heat. It is the rare experience of being unable to ignore the weather, and of having no good reason to try. A storm against the windows of my own modern flat is, by comparison, a faint memory of itself — present in principle, but mostly walled out, like a guest who has been allowed only as far as the doormat.`,

      { type:"mc", part:"Part 5",
        instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The discreet authority of the chair

Few objects in a home work harder, or attract less notice, than the chair. We sit on them, drag them, lean back in them, and only rarely consider what they imply. Yet anthropologists have long argued that a society's chairs, more than its tables, reveal who is expected to speak and who is expected merely to listen.

Consider the office chair, that small bureaucratic throne. Its height can be adjusted, its back can be tilted, its arms folded discreetly out of the way. None of these features exists for the comfort of a visitor; the visitor's chair, you will notice, has no such options. A meeting between unequals begins long before anyone has spoken, and is half-decided by the time both parties sit down.

The history of the chair, viewed from this angle, becomes a quiet history of authority. In medieval halls, only the host was actually entitled to sit; everyone else stood or perched on benches. The arrival of the personal chair was, in effect, the arrival of personal status. To this day, the language of seating — taking the chair, vacating the chair, addressing the chair — preserves traces of this old idea, though most speakers have entirely forgotten it.

What complicates the picture is that the chair, having begun as a marker of difference, was eventually democratised. Mass production in the nineteenth century made the individual chair almost universal. One might think that this would have stripped the object of its symbolic charge, but the opposite has happened. The fact that everyone now has a chair only makes the slight differences between them — the unspoken hierarchy of leather and plastic, ergonomic and rigid, soft and hard — more, not less, meaningful. We have not abolished the throne; we have multiplied it, and made its grading harder to read.

This grading is most clearly visible in the workplace, where chairs continue to perform their old role with very little embarrassment. The executive chair, in any large company, is taller, deeper and more adjustable than the chair given to the junior employee, even when the two people will spend roughly the same number of hours sitting in them. Visitors, by contrast, are usually offered something low and rigid, on which the act of leaning back is physically awkward. None of these distinctions is ever explained, and indeed most of us would deny that we register them at all. They are nonetheless registered, and they quietly shape what we feel able to say.

Outside the office, the same logic operates in subtler ways. The dining-room chair at the head of the table is, almost always, slightly larger than the others. The armchair in the family room, the one positioned to give a clear view of both the television and the door, is occupied — sometimes silently, sometimes by long habit — by whoever, in the household, is treated as the senior figure. To say that this person has chosen the best chair is to invert the relationship. The chair, by repetition, has come to mean that person, and visitors who, without thinking, sit there are committing a small, mostly unconscious transgression. It is in such moments, easily missed and never named, that the chair quietly does its oldest work.`,

          {label:"A", text:"Reviewer A. Carter's new book is at its strongest when it forgets, for a chapter at a time, that it is supposed to be making an argument. The descriptions of small coastal towns in October — the closed cafés, the careful walks of elderly couples — are some of the finest English prose published this year. Where it falters is in the closing essays, in which the author returns rather doggedly to political arguments she has made better elsewhere, and which sit uneasily next to the more meditative passages. The transitions, in particular, feel forced: a paragraph that has just shown us, with great delicacy, how a fisherman folds his nets at dusk gives way to a paragraph that announces, with no particular grace, what the local council ought to do about housing policy. The two voices are both Carter's; they have, however, been allowed to share the same chapter when one of them ought to have waited."},
          {label:"B", text:"Reviewer B. There is, no question, beautiful writing here, but the book as a whole suffers from a curious confusion of purpose. Is it a memoir, a polemic, or a quiet travelogue? Carter tries to do all three and, in trying, sacrifices the cumulative power that each would have on its own. The final political chapters, which other reviewers have found weak, struck me as the only sections in which her arguments achieved any real edge. The descriptive writing, which has been generally praised, is technically faultless and yet leaves curiously little behind. It is the kind of prose one admires while one is reading it and forgets, in detail, within an hour of putting the book down — an experience worth flagging because it has become, for me, the central limitation of an otherwise very gifted writer."},

`The map in our heads

I have always been bad at directions, a weakness I used to blame on a poor memory. Recently, however, I have come to suspect that the fault lies not with my memory but with the way I have allowed a small glowing rectangle to do my remembering for me. For the last ten years, like most people I know, I have outsourced the entire business of finding my way to a phone.

The change crept up on me. At first I used the map only in unfamiliar cities, the way one might ask a local for help. Then I began using it in my own town, then on streets I had walked a hundred times. The voice in my ear was so calm, so certain, that resisting it felt almost rude. Why strain to remember a route when a machine would remember it for me, flawlessly, every single time?

The trouble is that a route remembered by a machine is not a route remembered at all. Scientists who study navigation have a useful distinction between two ways of finding our way. The first, which they call "route knowledge", is a simple list of instructions: turn left at the bakery, right at the church. The second, "survey knowledge", is something richer — a kind of mental map, in which we understand how all the parts of a place fit together. Only the second kind allows us to improvise when a road is closed, or to take a shortcut we have never been shown. And only the second kind, it turns out, is built by the effort of getting a little lost.

What worries the researchers is not that we are lazy, but that the two systems may be connected to deeper abilities. The same brain regions that build these mental maps are heavily involved in memory more generally. There is no firm proof yet that a lifetime of following blue arrows weakens the memory as a whole, but the possibility is taken seriously enough that several studies are now under way.

      { type:"mc", part:"Part 5",
        instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The honest dishonesty of maps

Every map is a lie, and the best maps are the most honest about it. This is not the paradox it first appears. A map that tried to tell the whole truth — every kerbstone, every parked car, every change in the colour of the grass — would be exactly as large and as useless as the territory it described. Usefulness, in cartography, begins with the courage to leave almost everything out.

What a map chooses to remove is therefore far more revealing than what it keeps. The famous diagram of the London Underground, for instance, is geographically wrong in nearly every detail. Distances are distorted, the river is straightened into a tidy zigzag, and stations that sit miles apart on the surface appear as comfortable neighbours. Yet it is precisely these deliberate falsehoods that make the map work. A passenger underground does not care how far apart two stations are in metres; she cares only about the order of the stops and where to change trains. The map tells her exactly that, and refuses to tell her anything else.

The danger, of course, is that we forget the map is a map. The clean lines acquire an authority the messy world never had, and we begin to trust the diagram more than the ground beneath our feet. Tourists have been known to walk for an hour between two Underground stations that the map shows as adjacent, never suspecting that the surface route is a five-minute stroll. The map did not lie to them about this; it simply never claimed to be telling that particular truth. The error was in the reading, not the drawing.

This points to a deeper principle that extends well beyond cartography. Every model of the world — a scientific theory, a financial forecast, a medical diagnosis — is a kind of map, useful precisely because it ignores most of reality. The competent practitioner knows which details her model leaves out, and remains alert to the moments when those discarded details suddenly matter. The incompetent one mistakes the model for the world, and is genuinely astonished when reality, full of everything the map omitted, declines to behave as the diagram promised.

If there is a lesson here, it is a modest and slightly uncomfortable one. We cannot think without simplifying, and to simplify is to distort. The goal is not the impossible one of a perfect, complete picture, but the achievable one of knowing, at every moment, the particular shape of our own ignorance. The best thinkers, like the best maps, are not those that claim to show everything, but those that are clearest about precisely what they have chosen not to show.`,

      { type:"mc", part:"Part 5", instructions:"Read the text and choose the best answer (A, B, C or D) for each question.",
        passage:
`The last bookshop on the street

When the big chain bookshop two doors down finally closed, everyone assumed that Margaret's tiny second-hand shop would be the next to go. The opposite happened. Six months later, hers was the only bookshop left on the street, and busier than it had been in years. The explanation, which she gives reluctantly and only when pressed, says a great deal about why some small businesses survive while larger ones fail.

Margaret has never tried to compete on price, range or speed, the three battlegrounds on which the chains fought and, in the end, lost. She cannot stock the latest titles as cheaply, nor can she offer them by tomorrow morning. What she offers instead is something the algorithms have never quite worked out how to sell: the experience of being known. She remembers what her customers have bought, what they enjoyed and, more importantly, what they regretted. She is unafraid to tell a regular that a much-praised new novel is, in her honest opinion, not worth his money.

This last quality — a willingness to lose a sale in the interest of a relationship — is precisely what the larger shops, with their targets and their incentives, could never permit their staff to show. A bookseller paid by commission cannot afford to be honest about a bad book; Margaret, who pays only herself, can afford nothing else. Her customers, sensing this, trust her recommendations in a way they would never trust a screen, and that trust, slowly accumulated over decades, turns out to be the most valuable thing in the shop.

There is a deeper lesson here that extends well beyond bookselling. We are repeatedly told that the future belongs to scale, to the businesses large enough to drive their costs down and their convenience up. And for many products this is plainly true; nobody wants a hand-crafted, locally sourced phone charger. But for a whole class of goods and services — those bound up with taste, judgement and trust — scale is not an advantage but a quiet handicap. The bigger an organisation grows, the harder it becomes for it to behave like a person, and it is precisely person-like behaviour that these customers are paying for.

Margaret, who is now in her seventies, says she will keep the shop open as long as her legs allow. She has no website, no app and no plans for either. When I asked whether she worried about what would happen to her customers when she eventually retired, she gave a small smile and said that this, more than the rent or the competition, was the only thing that genuinely kept her awake at night.`,

        passage:
`The tyranny of the comfortable chair

There is a particular kind of meeting that never seems to end, and I have come to suspect that the furniture is largely to blame. The modern conference room, with its deep, padded, gently reclining chairs, was designed, no doubt, with the comfort of its occupants in mind. What its designers failed to anticipate is that a comfortable body has no urgent reason to reach a decision. We sink into those chairs as into a warm bath, and, like a warm bath, they encourage us to linger far longer than is good for us.

The historical evidence, such as it is, points the same way. The most famously efficient decision-making bodies have often been those that conducted their business standing up, or perched on hard benches that grew steadily more uncomfortable as the hours passed. Discomfort, it turns out, is a powerful editor. A person whose back has begun to ache develops a sudden and admirable talent for distinguishing the essential from the merely interesting. The aching back is, in its way, a guardian of everyone's time.

This is not an argument for cruelty, and I am aware of how it might sound. I am not proposing that we conduct our affairs in physical agony, nor that comfort is somehow morally suspect. The point is narrower and, I think, more interesting. It is that comfort and urgency are, in this specific setting, quietly at war with one another, and that we have, without quite noticing, allowed comfort to win every battle. The result is not greater happiness but longer meetings, which is surely the worst of both worlds.

What makes the situation faintly comic is that everyone involved would, if asked, claim to want shorter meetings. The desire is universal and sincere. And yet we continue to furnish our meeting rooms as though the goal were to keep people in them for as long as possible. We have, in effect, designed our environment to defeat our own stated intentions, and then we express surprise, week after week, when our intentions duly lose.

The solution, if there is one, is unlikely to be popular. It would involve, at a minimum, removing the most comfortable chairs from the rooms where decisions are supposed to be made, and reserving them strictly for the rooms where we go to relax. A meeting, on this view, is not a place to be comfortable; it is a place to be finished with as efficiently as possible, so that one can go and be comfortable somewhere else. Until we are willing to act on that simple distinction, I suspect our meetings will continue, gently and expensively, to expand to fill the generous space our furniture so kindly provides.`,

    "passage": "The unfashionable virtue of patience\n\nFew qualities are praised more often, and practised less, than patience. Parents urge it on children, employers list it among the traits they value, and self-help books return to it with reliable frequency. Yet the very technologies that fill our days have been designed, at considerable expense, to require less of it from us each year. A film begins almost the instant a finger touches a screen; a meal arrives twenty minutes after the thought of it crosses our mind. We say we admire patience, in other words, while constructing a world in which it becomes almost impossible to develop.\n\nThis would matter less if patience were a luxury, a polite addition to an otherwise complete character. The evidence is awkwardly clear that it is not. Long-running studies of children who learn, very early, to wait for something they want — the famous experiment with marshmallows is only the best known — suggest that the small capacity to delay reward predicts a striking range of later outcomes, from school results to physical health. The connection is not magical. The child who can sit out a few uncomfortable minutes for a larger reward is, in miniature, doing what every difficult adult task quietly demands.\n\nIf this is even half right, the steady removal of small frustrations from daily life should worry us. Each individual convenience is, taken on its own, a small mercy. Multiplied across childhood, however, they may amount to a quiet weakening of the very habit they claim to support. A generation that has never had to wait for the next episode, or to argue patiently for a parent's attention, may arrive at adulthood with skills well suited to the present and oddly ill-suited to its own future.\n\nNot every commentator agrees. Some argue, plausibly, that the situation is the opposite of what it seems: that patience is being redistributed rather than lost. The teenager who cannot bear a slow internet connection, they point out, will happily practise the same chord on a guitar for an hour. The capacity to wait, on this view, has not vanished; it has merely become more selective, attaching itself to whatever the individual cares about and quietly abandoning the rest. There is something to this argument, although it does not quite explain why patience should be available for chosen pleasures and almost completely absent for ordinary inconveniences.\n\nWhat seems clear, in any case, is that patience is not a single, fixed quantity. It is more like a small skill, trainable in the way other skills are trainable, and rather like them in needing regular practice. The remedy is unlikely to come from grand resolutions. The people who appear to manage best report, instead, a series of unspectacular habits: putting the phone in another room while reading, choosing the slower route home occasionally, sitting through a meal without entertainment. Each is, in itself, almost embarrassingly modest. Together, they amount to a quiet refusal of the assumption that every minute must be filled, and to a steady rebuilding of a faculty whose disappearance would impoverish us in ways we are only beginning to measure.",

    "passage": "The honest case for boredom\n\nThere are few experiences modern adults have worked harder to abolish than boredom. The smartphone is, among other things, an unrivalled device for ensuring that no moment of restlessness ever lasts long enough to become troublesome. A queue, a bus stop, a five-minute wait at the dentist: each is now reliably swallowed by a quick descent into a feed of some kind. The result, broadly welcomed, is that the dull patches of ordinary life have been smoothed away. What is less often noticed is that something else, harder to name, has gone with them.\n\nPsychologists who study attention have begun to argue, in increasingly confident tones, that boredom was performing useful work. The mind, left briefly without an external task, does not actually sit idle. It wanders, in the technical sense — drifting through memories, half-formed plans and stray associations in a manner that, while it feels like nothing in particular, appears to be quietly important. The same studies that have made this case have also identified the specific neural state involved, and noted, somewhat awkwardly, that it is precisely the state suppressed by the routine reaching for a screen. We have not merely entertained ourselves more; we have, almost by accident, eliminated a category of mental activity we did not realise we needed.\n\nThe writer wishes to be careful here. The argument is not that boredom is, in itself, a pleasant or noble condition. It plainly is not. Long stretches of unrelieved tedium are corrosive, and there is nothing romantic about the kind of crushing dullness that can settle over an under-stimulated life. The case is much narrower: short, frequent, low-grade boredom — the kind we used to encounter dozens of times a day — seems to function less as wasted time than as a regular maintenance cycle for the imagination. When it disappears, the loss is not immediately obvious, because no single occasion of mild restlessness ever felt like much in the first place.\n\nThere is a complication that the more thoughtful commentators have begun to acknowledge. Telling people to simply put their phones down is, in practice, almost useless. The pull of the device is engineered to defeat exactly that kind of plain resolution, and the moralising tone often adopted by would-be reformers tends, if anything, to be counterproductive. The more honest approach is structural. Spaces where the device is genuinely awkward to use — long walks, certain kinds of manual work, deliberately phone-free hours at home — appear to do more, in practice, than any quantity of resolutions about willpower. The point is to make the alternative cheap and the temptation costly, rather than the other way round.\n\nWhat makes this an unusually difficult problem to talk about is that the costs are diffuse and the benefits of constant entertainment are immediate. A long, slow afternoon of nothing in particular very occasionally produces a new idea, a buried memory, an unexpected connection; far more often it produces nothing identifiable at all. A scroll through a feed, by contrast, reliably produces a small jolt of interest within seconds. In any honest accounting, the feed wins almost every individual exchange. The argument for the slow afternoon depends on a kind of accumulation that no individual afternoon can ever quite demonstrate.\n\nThe consequence is that the case for protecting boredom will probably always sound a little eccentric. It runs against the grain of how we instinctively evaluate our own time, which is to say in small, immediate units. Yet a growing body of work, much of it sober and well controlled, suggests that we may have been quietly impoverishing ourselves in a way that is real but difficult to feel — the kind of slow loss that, by the time it becomes obvious, is already extremely hard to reverse. None of this requires us to romanticise tedium. It requires only that we admit, against our own preferences, that something useful was happening in the gaps we have so efficiently abolished.",

"passage": "The case for struggling\n\nThere is a widespread belief, shared by many well-meaning parents and teachers, that good learning should feel smooth. If a child grasps a new idea quickly and without distress, we tend to conclude that the teaching was excellent; if the child struggles, frowns, and gets things wrong, we suspect that something has gone amiss. This intuition is powerful, comforting, and, according to a large body of research, almost exactly backwards.\n\nStudies of how people actually acquire skills point to an uncomfortable truth: the conditions that make learning feel easy are often the very conditions that make it fail to last. When information is presented clearly, reviewed immediately, and practised in a predictable order, students feel confident and perform well in the lesson itself. Yet when they are tested weeks later, that confidence turns out to have been an illusion. The material, so easily absorbed, has slipped away almost as easily.\n\nThe opposite approach, which researchers have given the deliberately unappealing name of 'desirable difficulties', produces the reverse pattern. When learners are forced to retrieve information from memory rather than simply reread it, when practice is spaced out over time rather than crammed, and when different topics are mixed together rather than tackled in neat blocks, the lessons feel noticeably harder. Students make more mistakes and report feeling less sure of themselves. And yet, tested later, they remember far more. The struggle, it appears, is not a sign that learning is failing but a sign that it is working.\n\nWhy should difficulty help? The explanation seems to lie in the effort of retrieval. Each time we successfully drag a fact back into consciousness — rather than having it handed to us — we strengthen the mental pathway that leads to it, making the fact easier to reach next time. Rereading a passage creates a comforting sense of familiarity, but familiarity is not the same as knowledge. Testing yourself, by contrast, is uncomfortable precisely because it exposes what you do not yet know, and it is that exposure that drives learning forward.\n\nThe implications reach beyond the classroom. The finding suggests that our instinctive judgements about our own learning are systematically unreliable. We prefer methods that feel productive — highlighting, rereading, listening again — over methods that feel effortful, and in doing so we consistently choose the weaker option. The feeling of fluency, of everything making easy sense, is seductive, but it is a poor guide to whether anything is actually being retained.\n\nNone of this is an argument for making education needlessly painful. Difficulty for its own sake helps no one, and a learner who is hopelessly lost will simply give up. The point is subtler: that a certain kind of productive struggle, carefully judged, is not an obstacle to be removed but an ingredient to be preserved. The best teachers, perhaps without knowing the research, have always understood this. They resist the temptation to make everything too easy, because they know that the mind, like the body, grows stronger only against resistance.",

t the bottom of a well-known hierarchy that environmentalists have promoted for decades, one that begins with two far more powerful steps: reduce and reuse. Using less in the first place, and using things again before discarding them, prevent waste rather than merely processing it. Yet these are the steps we hear least about, precisely because they demand something of us. Recycling asks only that we sort our rubbish correctly; reducing asks that we consume less, which is a harder message to sell and an unwelcome one to hear.\n\nThe convenient truth is that recycling has become a way of feeling responsible without being inconvenienced. It has allowed manufacturers to keep producing disposable goods and consumers to keep buying them, each side reassured that the resulting mountain of packaging will somehow be taken care of. Real progress, the critics suggest, will begin only when we stop treating recycling as the answer and start treating it as what it actually is: a last resort, useful but limited, for the waste we failed to prevent.",

"passage": "Why we love a cover version\n\nThere is a moment, familiar to anyone who follows music, when a song you thought you knew completely is suddenly transformed. A different voice, a slower tempo, an unexpected instrument, and a piece that had grown invisible through overfamiliarity is made strange and vivid again. The cover version — one artist's reinterpretation of another's song — is often dismissed as a lesser form, the resort of performers without ideas of their own. This is a serious misjudgement, and it rests on a misunderstanding of what a song actually is.\n\nWe tend to assume that a song belongs, in some deep sense, to whoever recorded it first, and that every later version is merely a copy of that original. But a song is not the same thing as a recording. A song is a structure — a melody, a set of chords, a lyric — capable of supporting an almost limitless number of realisations, in the same way that a play can be staged in a thousand different ways without any single production being the 'real' one. The first recording is simply the first interpretation to reach our ears. It has the advantage of arriving before the others, but that is an accident of timing, not a claim to ownership.\n\nOnce this is understood, the finest cover versions can be seen for what they are: not imitations but arguments. A great reinterpretation makes a case about the song, revealing a meaning that the original had left hidden. A cheerful pop tune, sung slowly and quietly, may turn out to contain a sadness nobody had noticed. A mournful ballad, given a driving beat, may reveal an unexpected defiance. The cover does not compete with the original so much as converse with it, and the listener who knows both is rewarded with a kind of dialogue between two visions of the same thing.\n\nThis is why the most memorable covers are rarely the most faithful ones. A version that merely reproduces the original, changing nothing, has nothing to say; it is karaoke, however skilful. The versions that endure are those that take a risk, that impose a strong and particular reading, even at the cost of upsetting listeners attached to the version they grew up with. Some of these reinterpretations have become so successful that they have eclipsed the originals entirely, and many listeners are astonished to learn that a song they consider definitive was in fact written and first recorded by somebody else.\n\nThere is a lesson here that reaches beyond music. We are quick to assume that whatever we encountered first is the authentic version of a thing, and to treat later variations as departures from a truth. But originality and priority are not the same. The first version of anything — a song, a story, an idea — is not necessarily the best or the truest; it is merely the earliest. To love a cover version is, in a small way, to accept that a thing can be remade, that meaning is not fixed at the moment of creation, and that sometimes the second, or the tenth, attempt is the one that finally gets it right.",

"passage": "Why we are so bad at judging risk\n\nHuman beings are, by almost any measure, remarkably poor at estimating danger. We lie awake worrying about the rare and dramatic — the plane crash, the shark attack, the terrorist — while cheerfully ignoring the mundane hazards that are far more likely to harm us, such as an unhealthy diet or a short car journey without a seatbelt. This mismatch between what frightens us and what actually threatens us is one of the best-documented quirks of the human mind, and understanding it turns out to be surprisingly useful.\n\nThe root of the problem lies in how we form our sense of what is dangerous. We do not, as a rule, consult statistics. Instead, we judge how likely something is by how easily examples of it come to mind. A hazard that is vivid, recent or heavily reported feels common, regardless of how rare it truly is. A plane crash is spectacular and dominates the news for days; the thousands of safe flights that take off the same afternoon are, by definition, not news at all. The result is a picture of the world badly distorted in favour of the memorable over the frequent.\n\nThis tendency is made worse by our reaction to control. We are far more tolerant of risks we feel we have chosen and can steer than of those imposed on us by others. Most people are more nervous as a passenger than as a driver, even though the driver bears more responsibility for the outcome, simply because holding the wheel provides a comforting, and often illusory, sense of command. The same logic explains why we fear the exotic new threat more than the familiar old one: what is unfamiliar feels uncontrollable in a way that the everyday, however deadly, does not.\n\nNone of this would matter much if our misjudgements stayed private. But they do not. Frightened populations demand action, and governments, eager to be seen to respond, pour resources into countering the dangers people fear rather than the ones that actually kill them. Money and attention flow towards the dramatic and away from the dull, with the perverse result that the greatest threats to public health are often the least well funded, precisely because they are too ordinary to frighten anyone.\n\nThe encouraging news is that this bias, once understood, can be resisted. We cannot switch off the instinct that makes the vivid feel likely, but we can learn to distrust it, to pause and ask whether our fear is proportionate to the actual odds. It is a modest mental discipline, but a powerful one, and it applies far beyond questions of physical safety. Wherever we are tempted to judge how probable something is by how easily we can picture it, the same correction is worth making.",

"passage": "The automation paradox\n\nThere is a comforting story we like to tell ourselves about machines and work. In it, the tedious, dangerous or repetitive parts of a job are handed over to a device, leaving the human free to concentrate on the interesting, high-level tasks that only a person can perform. The reality, as anyone who has studied automated systems closely will attest, is a good deal stranger, and it goes by the name of the automation paradox: the more reliable a machine becomes, the more dangerous the human operator's role grows, not less.\n\nThe logic is uncomfortable but difficult to escape. When a system handles a task well ninety-nine times out of a hundred, the operator's job is reduced to monitoring — watching a process that almost never goes wrong, waiting for a failure that almost never comes. Human beings are spectacularly ill-suited to this kind of vigilance. Attention, deprived of anything to engage it, simply wanders; after twenty minutes of watching a flawless process, the mind is elsewhere. And it is precisely at the moment the machine finally falters that the human is least prepared to intervene, having spent hours or years being lulled into the assumption that intervention would never be required.\n\nThe aviation industry learned this lesson the hard way. As autopilot systems grew more capable, a new category of accident began to appear — not crashes caused by the technology failing, but crashes caused by pilots who, when the automation abruptly handed control back to them in an emergency, had lost the fine-grained flying skills that constant practice once maintained. The very competence of the machine had quietly eroded the competence of the person supposed to supervise it. Skills that are not exercised do not merely stagnate; they decay.\n\nThere is a further twist. Because the automated system performs so well for so long, organisations come to trust it, and trust breeds complacency. Maintenance budgets are trimmed, training is shortened, the number of human supervisors is reduced — all apparently justified by the machine's excellent record. The system's very reliability thus creates the conditions for a catastrophe, hollowing out the human expertise and institutional caution that would be needed to manage one. The safer the system appears, the more thoroughly the organisation dismantles its own defences.\n\nWhat, then, is to be done? The naive response is to demand more automation still — to remove the fallible human from the loop entirely. In some narrow domains, where every possible situation can be foreseen, this may be feasible. But most of the world is not like that. It is messy, surprising and full of situations no designer anticipated, and in such a world the human capacity for improvisation remains indispensable precisely when things go wrong. The challenge is not to eliminate the operator but to keep them genuinely engaged — to design systems that, paradoxically, are a little less helpful than they could be, so that the person retains the skill and the alertness to act when it matters.\n\nSome engineers now speak of this as designing for 'meaningful human control', and it represents a quiet revolution in thinking. Instead of asking how much of a task a machine can take over, the better question is how much a human must retain in order to remain competent. Sometimes the answer is inconvenient. It may mean requiring pilots to fly manually for portions of a routine flight, or asking a driver to keep their hands on the wheel even when the car could steer itself perfectly well. Such measures look, on the surface, like a refusal to reap the full benefit of the technology. In fact they are an insurance policy against the moment the technology reaches the edge of its competence and, as it always eventually will, hands the problem back to us.\n\nThe deeper lesson extends well beyond cockpits and control rooms. Every time we delegate a capacity to a machine, we should ask not only what we gain but what, through disuse, we stand quietly to lose.",

"instructions": "Read the text and choose the best answer (A, B, C or D) for each question.",
"passage": "The trouble with pristine\n\nThere is a word that recurs, almost reflexively, in the way we talk about the natural world: pristine. We speak of pristine forests, pristine coral reefs, pristine wilderness, and the word carries an unmistakable moral charge. Pristine means untouched, unspoiled, as nature intended before human beings arrived to interfere. It is, on the face of it, a harmless piece of vocabulary. In fact, a growing number of ecologists and historians argue, it is one of the most misleading ideas in the whole of environmental thought, and clinging to it has led conservation repeatedly astray.\n\nThe first problem is factual. The landscapes we most readily describe as pristine turn out, on closer inspection, to have been shaped by human hands for thousands of years. The great forests that European settlers encountered in the Americas, and took to be primeval, were in many cases the product of careful management by the people who had lived there for millennia — burned, cleared and cultivated in ways that a casual observer, unfamiliar with the practices involved, simply failed to recognise. What looked like untouched wilderness was in truth an inhabited, worked and deeply humanised place. To call it pristine was not to describe it accurately but to erase the people who had made it.\n\nThe second problem is that the ideal of the pristine sets a standard that can never be met, and in doing so it can paralyse action. If the goal of conservation is to restore a landscape to some imagined condition before human contamination, then almost any actual intervention looks like a compromise, a falling-short, a failure. Purists may object to reintroducing a species because the ecosystem it would enter is no longer 'natural', or oppose active management because tampering, of any kind, offends the ideal of the untouched. The result, too often, is a preference for doing nothing — for fencing off a degraded area and hoping it will heal itself — when active, frankly artificial intervention would do far more good.\n\nThere is, moreover, a subtle arrogance buried in the concept. To divide the world into the pristine and the spoiled is to place human beings permanently outside nature, as a contaminating force whose every touch diminishes. This is a peculiar and, on reflection, rather bleak philosophy. It implies that there is no such thing as a beneficial human relationship with a landscape, that the best we can ever do is to withdraw and leave nature alone. Yet the historical record is full of examples of exactly the opposite: of human practices that enriched biodiversity, that created habitats which would not otherwise have existed, that wove people and place into a single flourishing system.\n\nNone of this is an argument for complacency about environmental destruction, and it would be a serious misreading to take it as one. The damage humans have done to the living world is real, vast and, in many cases, accelerating. The point is narrower but important. It is that the mental image of a pristine nature, from which humanity is necessarily excluded, is a poor guide to repairing that damage. A more useful goal is not the untouched but the flourishing — a landscape rich in life, resilient and diverse, whether or not human beings are part of it, and very often precisely because they are.\n\nThis shift of emphasis, from purity to flourishing, sounds abstract, but it has thoroughly practical consequences. It licenses the gardener's mindset over the curator's: a willingness to intervene, to experiment, to accept that a managed landscape is not a lesser thing than an unmanaged one, merely a different one. It asks not whether a place is untouched but whether it is alive. And by that measure, some of the most heavily managed landscapes on Earth are triumphs, while some carefully fenced-off 'wildernesses', left rigidly alone, are quietly dying.",

"passage": "In praise of forgetting\n\nWe are, as a culture, obsessed with remembering. Memory-improvement courses promise to make our recall infallible; anxious articles warn of the mental decline that awaits us if we let our powers of retention slip; and the loss of memory, in old age or illness, is rightly counted among the cruellest of human misfortunes. Against this background, it can seem almost perverse to suggest that forgetting is not a flaw in the system but one of its most vital functions. Yet that is precisely what a growing body of research now indicates, and the implications are more consoling than they first appear.\n\nConsider what a life of perfect memory would actually be like. There exist a small number of individuals who cannot forget — who retain, in vivid detail, virtually every day they have ever lived. One might imagine this to be a gift, and in certain respects it is. But those who possess it describe the experience in strikingly ambivalent terms. Every slight, every embarrassment, every grief remains as raw as the day it was first felt, unsoftened by the merciful blurring that time grants the rest of us. They cannot let go of the past because the past will not release them. Forgetting, it emerges, is not merely the absence of memory but an active and necessary process, one that clears space, dulls old pain, and allows a person to move on.\n\nThe usefulness of forgetting extends well beyond emotional comfort. A mind that retained everything indiscriminately would drown in trivia. The precise arrangement of the crockery at a breakfast eaten years ago, the number plate of a car glimpsed once in traffic, the exact wording of a thousand forgotten conversations — a memory that held all of this with equal fidelity would be useless, cluttered beyond the point of function. What we call forgetting is, in large part, the mind's method of separating the significant from the negligible, discarding the vast bulk of experience so that the small, important remainder can be found when it is needed. Far from being a failure of memory, this pruning is what makes memory work at all.\n\nThere is also a subtler point, concerning the relationship between forgetting and thought itself. To think abstractly is, in essence, to forget the particular — to let go of the specific instances so that the general pattern can emerge. A child who has seen many dogs forms the concept 'dog' precisely by forgetting the individual features of each one and retaining only what they share. Memory that clung too tightly to detail would frustrate this process, trapping the mind in an endless catalogue of particulars from which no generalisation could ever be drawn. In this sense, forgetting is not the enemy of understanding but its precondition.\n\nWhy, then, do we fear it so? Part of the answer lies in a confusion between two very different things: the ordinary, healthy forgetting that serves us well, and the pathological loss of memory caused by disease. The two are not points on a single scale but distinct phenomena, and dreading the former because we fear the latter is a category error. The everyday failure to remember where we left our keys is not an early symptom of catastrophe; it is, far more often, the sign of a mind sensibly declining to waste its resources on the trivial.\n\nNone of this is to romanticise genuine memory loss, which can be devastating, nor to counsel carelessness about the things that truly matter. The argument is more modest, and more hopeful. It is that the mind's tendency to let go — of the painful, the trivial, the merely particular — is not a defect to be fought at every turn but a faculty to be understood and, on occasion, even to be grateful for. We are shaped as much by what we release as by what we retain.",

"passage": "The myth of the lone genius\n\nWe love a good origin story, and few are more seductive than the one about the lone genius. A solitary figure, misunderstood by their contemporaries, labours in isolation until a flash of unaided brilliance changes the world. It is a story we tell about scientists, artists and inventors alike, and it is almost entirely false. The more closely historians examine the great breakthroughs of the past, the more crowded the picture becomes, until the solitary hero all but disappears into the crowd that made the work possible.\n\nConsider the way we credit invention. The light bulb, the telephone, the aeroplane — each is popularly attached to a single name, yet each was in fact the culmination of decades of incremental work by dozens of people, many of them arriving at strikingly similar solutions at almost the same moment. The famous figure was often less the sole originator than the one who assembled existing pieces most effectively, or simply the one who happened to secure the patent first. History, needing a face for its stories, quietly edits out the supporting cast.\n\nWhy, then, does the myth persist so stubbornly? Part of the answer is that it flatters us. The idea that genius is a rare and inborn gift, granted to a chosen few, relieves the rest of us of any obligation to try. If breakthroughs are the work of superhuman individuals, then our own ordinariness is excused. The myth also makes for a far better story than the truth, which tends to involve committees, gradual refinement and a great deal of unglamorous collaboration. A tale of one heroic mind is simply more memorable than an accurate account of many.\n\nThe consequences of believing the myth are not trivial. Organisations that go hunting for a single visionary to solve their problems often overlook the collaborative conditions in which good ideas actually form. Individuals, meanwhile, may abandon promising work the moment it fails to arrive in a single blinding f /* ============================================================
   ANTI-CHEAT — flat functions (no object / no 'this' binding).
   acStart() is always safe to call multiple times — it fully
   resets itself before attaching new listeners, so stale state
   from a previous exam never blocks a new one.

   Detection strategy:
   • visibilitychange ONLY — fires when the tab is hidden (switched,
     minimised, or another app covers the window). This is the only
     reliable signal that doesn't produce false positives.
     NOTE: window.blur is intentionally NOT used because native
     browser dialogs (confirm/alert) steal focus and fire blur without
     the tab actually being hidden, causing false positives every time
     a student clicks Submit or Quit.
============================================================ */
/* Touch devices only: when a field gains focus, the on-screen keyboard opens —
   scroll the field into view so it is not hidden behind the keyboard. */
(function(){
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouch) return;
  document.addEventListener('focusin', function(e){
    const t = e.target;
    if(t && /^(TEXTAREA|INPUT)$/.test(t.tagName) && t.type !== 'radio' && t.type !== 'checkbox' && t.type !== 'hidden'){
      setTimeout(function(){ try{ t.scrollIntoView({block:'center', behavior:'smooth'}); }catch(_){} }, 300);
    }
  });
})();

/* ============================================================
   ANTI-CHEAT (criterio unificado del Portal NIS, modo examen)
   3 vidas: salida 1 → aviso; salida 2 → reporte al docente;
   salida 3 → el examen se ENTREGA automáticamente con lo respondido
   (sin nota C automática — el docente decide). Detecta cambio de
   pestaña/app (visibilitychange) Y pérdida de foco de la ventana
   (dos ventanas lado a lado), confirmada con document.hasFocus() y
   con un margen de 3s para no contar el confirm() de Submit/Quit ni
   micro-parpadeos. Bloquea copiar/pegar/clic-derecho y traductor.
   acStart() reinicia las vidas en cada examen (por intento). ========= */
let _AC_on = false;
let _AC_n  = 0;            // contador de salidas en este examen
const _AC_MAX = 3;
let _AC_paused = false, _AC_force = false;
let _AC_away = false, _AC_awaySrc = '', _AC_awayT = 0, _AC_origConfirm = null;
const _AC_ACT = 'mock-reading', _AC_LABEL = 'MOCK · Reading & UoE';

function acStart(){
  acStop();                  // always tear down any previous session first
  _AC_on = true; _AC_n = 0; _AC_away = false; state._tabSwitches = 0;

  const sh = document.querySelector('.inspera-shell');
  if(sh){ sh.setAttribute('translate','no'); sh.classList.add('notranslate'); }
  document.documentElement.setAttribute('translate','no');

  document.addEventListener('visibilitychange', _acOnVis, true);
  window.addEventListener  ('blur',  _acOnBlur);
  window.addEventListener  ('focus', _acOnFocus);
  window.addEventListener  ('beforeunload', _acOnLeave);
  document.addEventListener('contextmenu', _acOnMenu, true);
  ['copy','cut','paste','dragstart','drop'].forEach(ev=>document.addEventListener(ev,_acBlock,true));

  // Pausa la detección mientras hay un confirm()/alert() nativo (Submit/Quit/Clear),
  // que roba el foco sin que el alumno haya salido de verdad.
  _AC_origConfirm = window.confirm;
  window.confirm = function(m){ if(_AC_force) return true; _AC_paused = true;
    try{ return _AC_origConfirm.call(window, m); } finally{ setTimeout(()=>{ _AC_paused = false; }, 500); } };
}

function acStop(){
  _AC_on = false; _AC_away = false;
  document.removeEventListener('visibilitychange', _acOnVis, true);
  window.removeEventListener  ('blur',  _acOnBlur);
  window.removeEventListener  ('focus', _acOnFocus);
  window.removeEventListener  ('beforeunload', _acOnLeave);
  document.removeEventListener('contextmenu', _acOnMenu, true);
  ['copy','cut','paste','dragstart','drop'].forEach(ev=>document.removeEventListener(ev,_acBlock,true));
  if(_AC_origConfirm){ window.confirm = _AC_origConfirm; _AC_origConfirm = null; }
  const ov = document.getElementById('acOverlay'); if(ov) ov.remove();
  const sh = document.querySelector('.inspera-shell'); if(sh) sh.classList.remove('notranslate');
}

function _acBlock(e){ if(!_AC_on) return; e.preventDefault(); e.stopPropagation(); return false; }

/* --- detección de salida: pestaña/app (hidden) y ventana (blur+hasFocus) --- */
function _acBeginAway(src){ if(!_AC_on || _AC_paused || _AC_away) return; _AC_away = true; _AC_awaySrc = src; _AC_awayT = Date.now(); }
function _acEndAway(){
  if(!_AC_away) return; _AC_away = false;
  const dt = Date.now() - _AC_awayT;
  const min = (_AC_awaySrc === 'blur') ? 3000 : 1200;   // ventana 3s, pestaña 1.2s
  if(dt < min) return;
  _acStrike(Math.round(dt/100)/10);
}
function _acOnVis(){ if(!_AC_on) return; if(document.hidden) _acBeginAway('hidden'); else _acEndAway(); }
function _acOnBlur(){ if(!_AC_on) return; setTimeout(()=>{ if(_AC_on && !_AC_paused && !document.hasFocus()) _acBeginAway('blur'); }, 250); }
function _acOnFocus(){ if(_AC_on) _acEndAway(); }
function _acOnLeave(e){ e.preventDefault(); e.returnValue = ''; }
function _acOnMenu(e){ if(e.target.closest('input,textarea,select')) return; e.preventDefault(); }

/* --- vidas / escalada --- */
function _acStrike(secs){
  _AC_n++; state._tabSwitches = _AC_n;
  const left = _AC_MAX - _AC_n;
  if(left <= 0){ _acReport('locked', secs); _acShowWarn('locked'); _acAutoSubmit(); }
  else if(left === 1){ _acReport('reported', secs); _acShowWarn('reported'); }
  else { _acShowWarn('warn'); }
}

/* Entrega automática: reusa el botón Submit del examen, saltando el confirm. */

  if(!btn){ return; }
  _AC_force = true;
  try{ btn.click(); }catch(e){}
  setTimeout(()=>{ _AC_force = false; }, 80);
}

/* ---- Font size scaling ---- */
const FS_SCALE = [0.85, 0.92, 1.0, 1.08, 1.18, 1.3, 1.45];
let _fsStep = 2;  // index into FS_SCALE; 2 = 1.0 (default)
window._fontSize = function(delta){
  _fsStep = Math.max(0, Math.min(FS_SCALE.length - 1, _fsStep + delta));
  const shell = document.querySelector('.inspera-shell');
  if(shell) shell.style.setProperty('--exam-fs', FS_SCALE[_fsStep] + 'rem');
  const lbl = document.getElementById('fsLabel');
  if(lbl) lbl.textContent = Math.round(FS_SCALE[_fsStep] * 100) + '%';
};

/* ---- Highlighter ---- */
window._toggleHighlight = function(){
  const on = document.body.classList.toggle('highlight-mode');
  const btn = document.querySelector('.tool-btn[data-tool="highlight"]');
  if(btn){
    btn.classList.toggle('active', on);
    btn.textContent = on ? '🖍 Highlight ON' : '🖍 Highlight';
  }
};
document.addEventListener('mouseup', function(e){
  if(!document.body.classList.contains('highlight-mode')) return;
  // Ignore clicks on form controls
  if(e.target.closest('input,select,textarea,button')) return;
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const startEl = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
  const passage = startEl && startEl.closest && startEl.closest('.passage, .source-row');
  if(!passage) return;
  const mark = document.createElement('mark');
  mark.className = 'user-highlight';
  try {
    range.surroundContents(mark);
  } catch(err){
    try {
      const frag = range.extractContents();
      mark.appendChild(frag);
      range.insertNode(mark);
    } catch(e2){ /* skip if cannot wrap */ }
  }
  sel.removeAllRanges();
});
document.addEventListener('click', function(e){
  // Clicking on a highlight always removes it — highlight mode does not need to be on.
  if(e.target && e.target.classList && e.target.classList.contains('user-highlight')){
    const node = e.target;
    const parent = node.parentNode;
    while(node.firstChild) parent.insertBefore(node.firstChild, node);
    parent.removeChild(node);
    parent.normalize(); // merge adjacent text nodes left by the removal
  }
});
