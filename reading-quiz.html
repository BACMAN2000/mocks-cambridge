  exam(){
    const ex = currentExam();
    const dur = (DURATIONS[state.level] && DURATIONS[state.level][state.skill]) || 45;
    const label = state.examType === 'mock01' ? 'MOCK 1' : state.examType === 'mock02' ? 'MOCK 2' : 'Practice';
    state.currentPart = 0;

    // Precompute per-part starting question number and length
    const partInfo = [];
    let counter = 1;
    ex.parts.forEach((p,i)=>{
      const qs = (p.type === 'writing') ? p.prompts.length : p.questions.length;
      partInfo.push({startNum:counter, count:qs});
      counter += qs;
    });

    // Build Inspera shell
    let html = `
      <div class="inspera-shell">
        <header class="inspera-header">
          <a class="brand" href="quizzes.html" title="Nordic International School of Lima"><img src="nordic-logo-h.svg" alt="Nordic"></a>
          <div class="candidate">Candidate: <strong>${state.name}</strong> · ${state.grade}</div>
          <div class="tools">
            <div class="fs-group" title="Adjust text size">
              <button type="button" onclick="window._fontSize(-1)">A−</button>
              <span class="fs-label" id="fsLabel">100%</span>
              <button type="button" onclick="window._fontSize(1)">A+</button>
            </div>
            <button type="button" class="tool-btn" data-tool="highlight" onclick="window._toggleHighlight()" title="Highlight text in the passage">🖍 Highlight</button>
            <button type="button" class="tool-btn" data-tool="notes" onclick="window._toggleNotes()" title="Open notes panel">📝 Notes</button>
          </div>
          <div class="right">
            <div class="timer" id="timer">00:00</div>
            <button id="quitBtn">Exit</button>
            <button class="finish-btn" id="submitBtn">Submit ✓</button>
          </div>
        </header>

        <main class="inspera-main">
          <div class="inspera-main-inner">
            <div class="inspera-title">
              <h1>${ex.title} — ${label}</h1>
            </div>`;

    const isTwoCol = (p) => (
      (p.type === 'mc' && p.passage) ||
      (p.type === 'match' && (p.passage || (p.sources && p.sources.length))) ||
      (p.type === 'writing' && !p.pictures && writingHasBullets(p))
    );
    // Parts shown one question at a time: key-word transformation, and
    // standalone multiple-choice parts (signs/notices) with no shared passage.
    const isPaged = (p) => (
      p.type === 'transform' ||
      (p.type === 'mc' && !p.passage)
    );

    ex.parts.forEach((p,i)=>{
      const info = partInfo[i];
      const range = info.count > 1 ? `${info.startNum}–${info.startNum + info.count - 1}` : `${info.startNum}`;
      const qWord = info.count > 1 ? 'Questions' : 'Question';
      const twoCol = isTwoCol(p);
      const paged = isPaged(p);
      // For writing parts the full task lives in the body, so the subheading
      // shows only a short "Write N words" note (extracted from the task text).
      let subInstr = p.instructions || '';
      if(p.type === 'writing'){
        const taskTxt = writingTaskOf(p);
        const wc = taskTxt.match(/(\d+(?:\s*[–-]\s*\d+)?)\s*words?(\s*or more)?/i);
        subInstr = wc ? ('Write ' + wc[1].replace(/\s+/g,'') + ' words' + (wc[2] ? ' or more' : '')) : 'Write your answer in the box provided.';
      }
      html += `<section class="part-pane${i===0?' active':''}" data-part="${i}"${paged?' data-paged="1"':''}>
        <div class="inspera-instruction">
          <strong>${qWord} ${range}</strong>
          <p>${subInstr}</p>
        </div>
        <div class="inspera-content${twoCol?' two-col':''}">
          ${renderPart(p, i, info.startNum, twoCol, paged)}
        </div>
      </section>`;
    });

    html += `</div></main>

        <footer class="inspera-footer">
          <div class="part-tabs">`;

    ex.parts.forEach((p,i)=>{
      const info = partInfo[i];
      let qnums = '';
      for(let j=0;j<info.count;j++){
        qnums += `<button type="button" class="qnum" id="qn-${i}-${j}" onclick="event.stopPropagation(); window._goToQuestion(${i},${j})">${info.startNum + j}</button>`;
      }
      html += `<div class="part-tab${i===0?' active':''}" data-part="${i}" onclick="window._goToQuestion(${i},0)">
        <div class="pname">Part ${i+1}</div>
        <div class="pprog" id="prog-${i}">0 of ${info.count}</div>
        <div class="qnums">${qnums}</div>
      </div>`;
    });

    html += `</div>
          <div class="nav-arrows">
            <button id="prevBtn" onclick="window._navQuestion(-1)" title="Previous question">◀</button>
            <button id="nextBtn" onclick="window._navQuestion(1)" title="Next question">▶</button>
          </div>
        </footer>
      </div>`;

    app.innerHTML = html;

    // ---- Global question navigation model ----
    // Total questions and helpers to convert between a global 0-based index and (part, local).
    const totalQ = partInfo.reduce((a,p)=>a + p.count, 0);
    const globalOf = (part, local) => (partInfo[part].startNum - 1) + local;
    const decode = (gi) => {
      gi = Math.max(0, Math.min(totalQ - 1, gi));
      for(let i=0;i<partInfo.length;i++){
        const start = partInfo[i].startNum - 1;
        if(gi < start + partInfo[i].count) return {part:i, local: gi - start};
      }
      const last = partInfo.length - 1;
      return {part:last, local: partInfo[last].count - 1};
    };
    state.currentQ = 0;

    // Show a part's pane (low-level: just toggles which pane/tab is visible)
    window._showPart = function(idx){
      const total = ex.parts.length;
      idx = Math.max(0, Math.min(total - 1, idx));
      state.currentPart = idx;
      document.querySelectorAll('.part-pane').forEach((el,i)=>el.classList.toggle('active', i===idx));
      document.querySelectorAll('.part-tab').forEach((el,i)=>el.classList.toggle('active', i===idx));
      const main = document.querySelector('.inspera-main'); if(main) main.scrollTo({top:0});
    };
    // For "paged" parts, reveal only the current question; add a "Question N of M" counter
    window._applyPaged = function(){
      const cur = decode(state.currentQ);
      document.querySelectorAll('.part-pane[data-paged]').forEach(pane=>{
        const pi = +pane.getAttribute('data-part');
        const qs = pane.querySelectorAll('.paged-q');
        qs.forEach(el=>{
          const lq = +el.getAttribute('data-local');
          el.classList.toggle('show', pi === cur.part && lq === cur.local);
        });
        const counter = pane.querySelector('.paged-counter');
        if(counter && pi === cur.part) counter.textContent = `Question ${cur.local + 1} of ${qs.length}`;
      });
    };
    // Reflect the current global question on the footer (highlight + arrow state)
    window._syncCurrent = function(){
      const cur = decode(state.currentQ);
      document.querySelectorAll('.qnum.current').forEach(b=>b.classList.remove('current'));
      const btn = document.getElementById(`qn-${cur.part}-${cur.local}`);
      if(btn) btn.classList.add('current');
      const pb = document.getElementById('prevBtn'); if(pb) pb.disabled = (state.currentQ === 0);
      const nb = document.getElementById('nextBtn'); if(nb) nb.disabled = (state.currentQ === totalQ - 1);
    };
    // Jump straight to a question — used by the footer numbers, the part names, and the arrows
    window._goToQuestion = function(part, q){
      state.currentQ = globalOf(part, q);
      window._showPart(part);
      window._applyPaged();
      const name = qid(part, q);
      let el = document.querySelector(`[name="${name}"]`);
      // Inline clozeMC stores its answer in a hidden input — scroll to the visible gap-pill instead
      if(el && el.type === 'hidden'){
        const pill = document.querySelector(`.gap-pill[onclick*="'${name}'"]`);
        if(pill) el = pill;
      }
      if(el){
        const block = el.closest('.q') || el;
        block.scrollIntoView({behavior:'smooth', block:'center'});
        block.classList.remove('q-flash'); void block.offsetWidth; block.classList.add('q-flash');
        setTimeout(()=>block.classList.remove('q-flash'), 1200);
        if(el.focus && el.type !== 'hidden'){ try{ el.focus({preventScroll:true}); }catch(e){} }
      }
      window._syncCurrent();
    };
    // Green arrows: advance / go back ONE question, crossing part boundaries
    window._navQuestion = function(delta){
      const cur = decode(state.currentQ + delta);
      window._goToQuestion(cur.part, cur.local);
    };
    window._navPart = window._navQuestion; // back-compat alias
    window._updateProgress = function(){
      ex.parts.forEach((p,i)=>{
        let done = 0;
        const items = (p.type==='writing') ? p.prompts : p.questions;
        const total = items.length;
        items.forEach((q,j)=>{
          const name = qid(i,j);
          let answered = false;
          if(p.type === 'writing'){
            const el = document.querySelector(`[name="${name}"]`);
            answered = !!(el && el.value && el.value.trim());
          } else if(p.type === 'mc'){
            answered = !!document.querySelector(`input[name="${name}"]:checked`);
          } else if(p.type === 'clozeMC'){
            const inp = document.querySelector(`input[name="${name}"]`);
            answered = !!(inp && inp.value !== '');
          } else if(p.type === 'match'){
            const sel = document.querySelector(`select[name="${name}"]`);
            answered = !!(sel && sel.value);
          } else {
            const inp = document.querySelector(`[name="${name}"]`);
            answered = !!(inp && inp.value && inp.value.trim());
          }
          if(answered) done++;
          const btn = document.getElementById(`qn-${i}-${j}`);
          if(btn) btn.classList.toggle('answered', answered);
        });
        const el = document.getElementById('prog-'+i);
        if(el) el.textContent = done + ' of ' + total;
      });
    };

    const finalize = ()=>{
      if(!confirm('Submit your answers and finish the exam?')) return;
      stopTimer(); stopTTS(); acStop();
      const result = scoreExam(ex);
      state.answers = result;
      go('result');
    };
    document.getElementById('submitBtn').onclick = finalize;
    document.getElementById('quitBtn').onclick = ()=>{
      if(!confirm('Exit without submitting? Your answers will be lost.')) return;
      stopTimer(); stopTTS(); acStop(); go('examPick');
    };

    // Listen for any input/change anywhere in the shell to update progress
    const shell = document.querySelector('.inspera-shell');
    shell.addEventListener('input', window._updateProgress);
    shell.addEventListener('change', window._updateProgress);
    // Clicking/focusing directly in the text makes that question the "current" one,
    // so the green arrows continue from where the student is working.
    shell.addEventListener('focusin', (e)=>{
      const name = e.target && e.target.getAttribute && e.target.getAttribute('name');
      const m = name && name.match(/^p(\d+)q(\d+)$/);
      if(m){ state.currentQ = globalOf(+m[1], +m[2]); window._syncCurrent(); }
    });

    // Init buttons, paging & progress
    state.currentQ = 0;
    window._showPart(0);
    window._applyPaged();
    window._syncCurrent();
    window._updateProgress();

    state.startTime = Date.now();
    acStart();   // ← activate anti-cheat (translate block, tab detection, etc.)
    startTimer(dur, ()=>{
      // Time expired: notify the student, but DO NOT auto-submit.
      // Students can keep working; the timer now counts overtime in red.
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:14px 28px;border-radius:10px;font-weight:700;z-index:5000;box-shadow:0 8px 32px rgba(0,0,0,.3);font-family:"Montserrat",sans-serif';
      banner.textContent = '⏰ Time is up. You may finish what you are doing, then press Submit.';
      document.body.appendChild(banner);
      setTimeout(()=>banner.style.transition='opacity .5s', 50);
      setTimeout(()=>{ banner.style.opacity = '0'; }, 6000);
      setTimeout(()=>banner.remove(), 6700);
    });
  },

  result(){
    stopTimer();
    const ex = currentExam();
    const r = state.answers;
    const pct = r.total ? Math.round(r.correct/r.total*100) : 0;
    const ce = interpret(state.level, pct);

    // Strengths & weaknesses
    const strengths = r.parts.filter(p=>p.pct >= 75);
    const weaknesses = r.parts.filter(p=>p.pct < 50);

    // Detailed per-question review grouped by part
    let detailHtml = '';
    let currentPart = '';
    r.detail.forEach(d=>{
      if(d.part !== currentPart){
        detailHtml += `<h3>${d.part}</h3>`;
        currentPart = d.part;
      }
      detailHtml += `<div class="result-line">
        <span>${d.q}. ${d.stem}</span>
        <span class="${d.ok?'correct':'wrong'}">${d.ok?'&#10004;':'&#10008;'}</span>
      </div>
      <div style="font-size:.85rem;color:var(--muted);padding:2px 0 10px">
        Your answer: ${d.user} &nbsp;|&nbsp; Correct: <span class="correct">${d.correctAns}</span>
      </div>`;
    });

    // Per-part visual bars
    const partsHtml = r.parts.map(p=>{
      const cls = p.pct >= 75 ? 'good' : (p.pct >= 50 ? 'warn' : 'bad');
      const meta = p.writing ? `Writing band ${p.correct} / ${p.total}` : `${p.correct} of ${p.total} correct`;
      return `<div class="part-bar ${cls}">
        <div>
          <div class="name">${p.name}</div>
          <div class="meta">${meta}</div>
        </div>
        <div class="pct-num">${p.pct}%</div>
        <div class="bar-wrap"><div class="bar" style="width:${p.pct}%"></div></div>
      </div>`;
    }).join('');

    // Listening transcripts
    let transcripts = '';
    if(state.skill === 'Listening'){
      transcripts += `<div class="card"><h2>Transcripts (for self-checking)</h2>`;
      ex.parts.forEach(p=>{
        if(p.script){
          transcripts += `<h3>${p.part}</h3><div class="passage">${p.script}</div>`;
        } else if(p.scripts){
          transcripts += `<h3>${p.part}</h3>`;
          p.scripts.forEach((s,i)=>{
            transcripts += `<div class="passage"><strong>Recording ${i+1}</strong>\n${s}</div>`;
          });
        }
      });
      transcripts += `</div>`;
    }

    const firstName = (state.name||'Student').split(' ')[0];
    const motivText = motivational(firstName, pct, state.level);
    const durationMin = state.startTime ? Math.max(1, Math.round((Date.now() - state.startTime)/60000)) : null;

    // Gather any writing-task responses for inclusion in the report
    const writingAnswers = [];
    ex.parts.forEach((p,i)=>{
      if(p.type === 'writing'){
        p.prompts.forEach((pr,j)=>{
          const ta = document.querySelector(`textarea[name="${qid(i,j)}"]`);
          if(ta) writingAnswers.push({part:p.part, prompt:pr, text:ta.value||'', wordCount:(ta.value||'').trim().split(/\s+/).filter(Boolean).length});
        });
      }
    });

    app.innerHTML = `
      ${topbar('Results')}
      <h1>Exam results</h1>
      <p class="sub">${ex.title}</p>

      <div class="motivation-card">
        <h2>🎉 ${pct>=60?'Congratulations':'Keep going'}, ${firstName}!</h2>
        <p>${motivText}</p>
      </div>

      <div class="pdf-actions">
        <button onclick="downloadResultPDF('NIS-${state.level}-${(state.name||'').replace(/\\s+/g,'_')}.pdf')">⬇ Download PDF</button>
        <button class="email" id="sendEmailBtn">📧 Send to my email</button>
      </div>
      <div class="send-status" id="sendStatus" style="display:none"></div>

      <div id="pdfTarget">
        <div class="pdf-brand" style="text-align:center;padding:8px 0 14px;border-bottom:2px solid #4987c6;margin-bottom:14px">
          <img src="nordic-logo-h.svg" alt="Nordic" style="height:50px;width:auto">
          <div style="color:#636465;font-size:.82rem;margin-top:4px;letter-spacing:1px;font-weight:600">CAMBRIDGE-FORMAT READING REPORT</div>
        </div>
        <div class="result-header">
          <div class="grid">
            <div><label>Student</label>${state.name}</div>
            <div><label>Email</label>${state.email||'—'}</div>
            <div><label>Grade / Class</label>${state.grade}</div>
            <div><label>Exam level</label>${state.level} · ${LEVEL_NAMES[state.level]||''}</div>
            <div><label>Skill</label>${state.skill}</div>
            <div><label>Exam</label>${state.examType==='mock01'?'MOCK 1':state.examType==='mock02'?'MOCK 2':'Practice'}</div>
            <div><label>Date</label>${new Date().toLocaleString()}</div>
            <div><label>Time spent</label>${durationMin?durationMin+' min':'—'}</div>
            <div style="${(state._tabSwitches||0)>0?'background:#fef3c7;border-color:#f59e0b':''}"><label>Tab / window switches</label><span style="${(state._tabSwitches||0)>0?'color:#b45309;font-weight:700':'color:var(--good)'}">${state._tabSwitches||0} ${(state._tabSwitches||0)===0?'✓ (none detected)':'⚠ detected'}</span></div>
          </div>
        </div>

        <div class="score-card">
          <div class="big">${r.correct} / ${r.total}</div>
          <div class="pct">${pct}%</div>
          <div class="cefr ${ce.tier}">${ce.label}</div>
          <div class="verdict">${ce.text}</div>
        </div>

        <div class="card">
          <h2>Score by part</h2>
          <p class="sub" style="margin-bottom:6px">How you performed in each section of the exam.</p>
          ${partsHtml}
        </div>

        <div class="card">
          <h2>Analysis — strengths &amp; weaknesses</h2>
          ${strengths.length ? `
            <p><strong style="color:var(--good)">Strongest parts (≥ 75%):</strong></p>
            <div>${strengths.map(p=>`<span class="chip good">${p.name} — ${p.pct}%</span>`).join('')}</div>
          ` : ''}
          ${weaknesses.length ? `
            <p style="margin-top:12px"><strong style="color:var(--bad)">Areas to review (&lt; 50%):</strong></p>
            <div>${weaknesses.map(p=>`<span class="chip bad">${p.name} — ${p.pct}%</span>`).join('')}</div>
          ` : ''}
          ${(!strengths.length && !weaknesses.length) ? `<p>Consistent performance across all parts — no specific section is dragging your score down.</p>` : ''}
          <p style="margin-top:14px;color:var(--muted);font-size:.88rem">
            Cambridge passing standard is approximately 60%. This score covers the auto-marked Reading parts only. Any Writing tasks are <strong>not graded automatically</strong> — they are sent to your teacher to mark by hand.
          </p>
        </div>

        <div class="card">
          <h2>Detailed question review</h2>
          ${detailHtml}
        </div>

        ${(r.writing&&r.writing.length)?`
        <div class="card">
          <h2>Writing tasks — sent for teacher review</h2>
          <p class="sub" style="margin-bottom:10px">Your writing is <strong>not graded automatically</strong>. It has been sent to your teacher, who will read it and give you a mark by hand. Below is a copy of what you wrote.</p>
          ${r.writing.map(w=>`
            <div style="border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <strong>${w.part}</strong>
                <span style="color:var(--muted);font-size:.85rem">${w.wordCount} words</span>
              </div>
              <div class="passage" style="margin-top:8px;white-space:pre-wrap">${(w.text||'<em>No response written.</em>').replace(/</g,'&lt;')}</div>
            </div>
          `).join('')}
        </div>`:''}

        ${transcripts}
      </div>

      <div class="row">
        <button onclick="go('examPick')">Try the other exam</button>
        <button class="ghost" onclick="go('level')">Change level</button>
        <button class="ghost" onclick="go('welcome')">&#127968; Home</button>
        <a class="link" style="align-self:center;margin-left:6px" href="quizzes.html">All quizzes &nearr;</a>
      </div>`;

    // Auto-POST the result to the configured Apps Script webhook
    const payload = {
      timestamp: new Date().toISOString(),
      name: state.name,
      firstName: firstName,
      email: state.email,
      grade: state.grade,
      skill: state.skill,
      level: state.level,
      levelName: LEVEL_NAMES[state.level]||'',
      examType: state.examType,
      examTitle: ex.title,
      score: r.correct,
      total: r.total,
      percent: pct,
      cefrLabel: ce.label,
      cefrTier: ce.tier,
      verdict: ce.text,
      motivation: motivText,
      durationMinutes: durationMin,
      tabSwitches: state._tabSwitches || 0,
      parts: r.parts,
      detail: r.detail,
      writingAnswers: writingAnswers,
      writingEvaluation: r.writing || [],
      teacherEmail: CONFIG.teacherEmail,
      schoolName: CONFIG.schoolName
    };
    sendResultToWebhook(payload).then(res=>{
      const st = document.getElementById('sendStatus');
      if(!st) return;
      if(res.skipped){
        st.style.display = 'block';
        st.classList.remove('err');
        st.textContent = '⚠ No webhook configured — use ⬇ Download PDF to save your report.';
      } else if(res.sent){
        st.style.display = 'block';
        st.classList.remove('err');
        st.textContent = '✓ Result sent. Check your email shortly for your PDF report.';
      } else {
        st.style.display = 'block';
        st.classList.add('err');
        st.textContent = '⚠ Could not reach the report server. You can still download the PDF locally.';
      }
    });

    // Manual "Send to my email" button
    document.getElementById('sendEmailBtn').onclick = async ()=>{
      const btn = document.getElementById('sendEmailBtn');
      const st = document.getElementById('sendStatus');
      btn.disabled = true; btn.textContent = '⌛ Sending...';
      const res = await sendResultToWebhook(payload);
      btn.disabled = false; btn.textContent = '📧 Send to my email';
      st.style.display = 'block';
      if(res.skipped){ st.classList.add('err'); st.textContent = '⚠ No webhook configured. Ask your teacher to set up CONFIG.webhookUrl.'; }
      else if(res.sent){ st.classList.remove('err'); st.textContent = '✓ Result resent to '+state.email+'.'; }
      else { st.classList.add('err'); st.textContent = '⚠ Could not send. Try ⬇ Download PDF.'; }
    };
  }
};

go('welcome');
</script>
</body>
</html>
